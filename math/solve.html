  const subLtx=subRaw||'n=1';
  const supLtx=rawToLatex(supRaw)||'\\infty';
  const exprLtx=rawToLatex(exprRaw)||'f(n)';
  const scope={pi:Math.PI, e:Math.E};

  steps.push({lbl:'المجموع', expr:`\\sum_{${subLtx}}^{${supLtx}} \\left(${exprLtx}\\right)`});

  // كشف نوع المتسلسلة
  let seriesType='general';
  try {
    const fn=k=>math.evaluate(exprN,{...scope,[varN]:k});
    const s0=fn(1),s1=fn(2),s2=fn(3);
    if(isFinite(s0)&&isFinite(s1)&&isFinite(s2)&&s0!==0){
      const r1=s1/s0,r2=s2/s1;
      const d1=s1-s0,d2=s2-s1;
      if(Math.abs(r1-r2)<1e-9&&isFinite(r1)) seriesType='geometric';
      else if(Math.abs(d1-d2)<1e-9) seriesType='arithmetic';
    }
  } catch(e){}

  if(seriesType==='geometric') steps.push({lbl:'النوع',expr:'\\text{متسلسلة هندسية}',note:'geometric'});
  else if(seriesType==='arithmetic') steps.push({lbl:'النوع',expr:'\\text{متسلسلة حسابية}',note:'arithmetic'});

  // عرض أول الحدود
  try {
    const startV=math.evaluate(startN,scope);
    const isInf=supRaw.includes('∞')||supRaw.toLowerCase().includes('inf');
    if(!isInf){
      const endV=math.evaluate(endN,scope);
      if(isFinite(startV)&&isFinite(endV)){
        const fn=k=>math.evaluate(exprN,{...scope,[varN]:k});
        if(endV-startV<=6){
          const terms=[];
          for(let k=startV;k<=endV;k++) terms.push(fmtN(fn(k)));
          steps.push({lbl:'الحدود',expr:terms.join(' + '),note:`${varN}=${startV}..${endV}`});
        } else {
          const t1=fmtN(fn(startV)),t2=fmtN(fn(startV+1)),t3=fmtN(fn(startV+2)),tN=fmtN(fn(endV));
          steps.push({lbl:'الحدود',expr:`${t1} + ${t2} + ${t3} + \\cdots + ${tN}`});
        }
      }
    } else {
      const fn=k=>math.evaluate(exprN,{...scope,[varN]:k});
      const t1=fmtN(fn(startV)),t2=fmtN(fn(startV+1)),t3=fmtN(fn(startV+2)),t4=fmtN(fn(startV+3));
      steps.push({lbl:'الحدود',expr:`${t1} + ${t2} + ${t3} + ${t4} + \\cdots`});
    }
  } catch(e){}

  // الحساب
  try {
    const startV=math.evaluate(startN,scope);
    const isInf=supRaw.includes('∞')||supRaw.toLowerCase().includes('inf');
    if(isInf){
      let sum=0,prev=0,converged=false;
      for(let k=startV;k<=startV+100000;k++){
        const val=math.evaluate(exprN,{...scope,[varN]:k});
        if(!isFinite(val)) break;
        sum+=val;
        if(k>startV+100&&Math.abs(sum-prev)<1e-12){converged=true;break;}
        if(k%1000===0) prev=sum;
      }
      if(converged&&isFinite(sum)){
        const r=formatNiceResult(sum);
        steps.push({lbl:'تقارب',expr:`\\sum_{${subLtx}}^{\\infty}\\left(${exprLtx}\\right) \\approx ${r}`,note:'converges'});
        steps.push({lbl:'النتيجة',expr:`\\sum_{${subLtx}}^{\\infty}\\left(${exprLtx}\\right) = ${r}`,isResult:true});
      } else {
        steps.push({lbl:'تحذير',expr:'\\text{المتسلسلة تتباعد}',note:'diverges'});
        steps.push({lbl:'النتيجة',expr:`\\sum_{${subLtx}}^{\\infty}\\left(${exprLtx}\\right) = \\infty`,isResult:true});
      }
    } else {
      const endV=math.evaluate(endN,scope);
      if(!isFinite(startV)||!isFinite(endV)) throw new Error('حدود غير صحيحة');
      const count=Math.round(endV-startV)+1;
      if(count>1e6) throw new Error('النطاق كبير جداً');
      let sum=0;
      for(let k=startV;k<=endV;k++){
        const val=math.evaluate(exprN,{...scope,[varN]:k});
        if(!isFinite(val)) throw new Error('قيمة غير محدودة');
        sum+=val;
      }
      const resTex=formatNiceResult(sum);
      if(seriesType==='arithmetic'){
        const a1=math.evaluate(exprN,{...scope,[varN]:startV});
        const aN=math.evaluate(exprN,{...scope,[varN]:endV});
        steps.push({lbl:'صيغة مغلقة',
          expr:`S = \\dfrac{n}{2}(a_1+a_n) = \\dfrac{${count}}{2}(${fmtN(a1)}+${fmtN(aN)})`,note:'arithmetic'});
      } else if(seriesType==='geometric'){
        const a1=math.evaluate(exprN,{...scope,[varN]:startV});
        const r=math.evaluate(exprN,{...scope,[varN]:startV+1})/a1;
        if(Math.abs(r-1)>1e-9)
          steps.push({lbl:'صيغة مغلقة',
            expr:`S = a_1\\cdot\\dfrac{1-r^n}{1-r} = ${fmtN(a1)}\\cdot\\dfrac{1-${fmtN(r)}^{${count}}}{1-${fmtN(r)}}`,note:'geometric'});
      }
      steps.push({lbl:'الناتج',expr:`\\sum_{${subLtx}}^{${supLtx}}\\left(${exprLtx}\\right) = ${fmtN(sum)}`});
      steps.push({lbl:'النتيجة',expr:`= ${resTex}`,isResult:true});
    }
  } catch(e){
    steps.push({lbl:'خطأ',expr:`\\text{${esc(String(e.message).slice(0,80))}}`,isResult:true});
  }
  return {steps, type:'summation'};
}

function parseAndSolve(raw){
  const s=raw.trim();if(!s) return null;
  const type=detectType(s);
  let solveData=null;
  switch(type){
    case 'dblintegral':     solveData=solveDblIntegral(s);break;
    case 'defintegral':     solveData=solveDefIntegral(s);break;
    case 'integral':        solveData=solveIntegral(s);break;
    case 'contourintegral': solveData=solveContourIntegral(s);break;
    case 'summation':       solveData=solveSummation(s);break;
    case 'derivative':      solveData=solveDeriv(s);break;
    case 'sqrt':            solveData=solveSqrt(s);break;
    case 'equation':        solveData=solveEq(s);break;
    case 'fraction':        solveData=solveFraction(s);break;
    case 'limit':           solveData=solveLimit(s);break;
    default:                solveData=solveEval(s);break;
  }
  return {solveData,understood:rawToLatex(s)};
}

// ═══════════════════════════════════════════════
// BUILD RESPONSE HTML
// ═══════════════════════════════════════════════
function K(latex,block){
  const el=document.createElement('span');
  try{katex.render(latex,el,{throwOnError:false,displayMode:block,strict:false});}
  catch(e){el.textContent=latex;}
  return el.outerHTML;
}

function buildHTML(result){
  if(!result||!result.solveData){
    return `<div class="ebox">⚠ Could not parse expression.<br><span style="font-size:.65rem;color:var(--td)">Examples: √(144) · 2x^2+5=0 · ∫(x^3) · ∫[0]^[π](sin(x)) · ∬ with ∬ button · ∂(sin(x))</span></div>`;
  }
  const {solveData,understood}=result;
  // For double integral use display mode for header
  const headerBlock=solveData.type==='dblintegral'||solveData.type==='defintegral'||solveData.type==='integral'||solveData.type==='contourintegral'||solveData.type==='summation';
  let html=`<div class="psw">${K(understood,headerBlock)}</div><div class="sblk">`;
  let n=0;
  solveData.steps.forEach(step=>{
    if(step.isResult){
      html+=`<div class="rbox"><div class="rl">// RESULT</div>${K(step.expr,true)}</div>`;
    } else {
      n++;
      html+=`<div class="sl"><span class="sn">${String(n).padStart(2,'0')}.</span><span class="slb">${esc(step.lbl)}</span><span class="se">${K(step.expr,false)}</span>${step.note?`<span class="snote">← ${esc(step.note)}</span>`:''}</div>`;
    }
  });
  return html+'</div>';
}

// ═══════════════════════════════════════════════
// SESSIONS
// ═══════════════════════════════════════════════
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function newChat(){const id=Date.now();sessions.unshift({id,title:'New Session',messages:[]});curSess=id;clearInput();renderMsgs();renderHist();closeBar();notif('New session','i');}
function delChat(id){sessions=sessions.filter(s=>s.id!==id);if(curSess===id)curSess=sessions[0]?.id||null;renderMsgs();renderHist();}
function loadChat(id){curSess=id;renderMsgs();renderHist();closeBar();}
function renderHist(){
  const el=document.getElementById('ch');
  if(!sessions.length){el.innerHTML='<div style="padding:12px;font-size:.65rem;color:var(--td);text-align:center">No sessions</div>';return;}
  el.innerHTML=sessions.map(s=>`<div class="ci${curSess===s.id?' active':''}" onclick="loadChat(${s.id})"><span style="color:var(--nb);font-size:.75rem">∑</span><span class="ci-t">${esc(s.title)}</span><button class="ci-d" onclick="event.stopPropagation();delChat(${s.id})">✕</button></div>`).join('');
}
document.getElementById('stg').addEventListener('click',()=>{
  const sb=document.getElementById('sb');
  if(window.innerWidth<=640){sb.classList.toggle('open');}
  else{sb.classList.add('collapsed');document.getElementById('sbOpenTab').classList.add('visible');}
});
function openSidebar(){
  const sb=document.getElementById('sb');
  sb.classList.remove('collapsed');sb.classList.remove('open');
  document.getElementById('sbOpenTab').classList.remove('visible');
}
function closeBar(){if(window.innerWidth<=640)document.getElementById('sb').classList.remove('open');}
document.getElementById('msgs').addEventListener('click',closeBar);

// ═══════════════════════════════════════════════
// RENDER MESSAGES
// ═══════════════════════════════════════════════
function renderMsgs(){
  const cont=document.getElementById('msgs');
  const sess=sessions.find(s=>s.id===curSess);
  if(!sess||!sess.messages.length){
    cont.innerHTML=`<div class="wlc" id="wlcEl">
      <div style="font-size:2.8rem;text-shadow:var(--gb)">∫∂∑</div>
      <div class="wt">EQUATION SOLVER</div>
      <div class="ws">Professional engine — integrals · derivatives · equations · expressions · trig</div>
      <div class="wg">
        <div class="wc" onclick="insEx('∫[0]^[π](sin(x))')"><div class="wci">∫ᵃᵇ</div><div class="wct">DEFINITE INTEGRAL</div><div class="wce">∫₀^π sin(x) dx</div></div>
        <div class="wc" onclick="insDoubleIntEx()"><div class="wci">∫∫</div><div class="wct">DOUBLE INTEGRAL</div><div class="wce">∫∫₀¹₀¹ (x²+y²) dy dx</div></div>
        <div class="wc" onclick="insEx('∂(x^4+3*x^2*sin(x))')"><div class="wci">d/dx</div><div class="wct">DERIVATIVE</div><div class="wce">d/dx(x⁴+3x²sin(x))</div></div>
        <div class="wc" onclick="insEx('3x^2-7x+2=0')"><div class="wci">x²</div><div class="wct">EQUATION</div><div class="wce">3x²−7x+2=0</div></div>
      </div>
    </div>`;return;
  }
  cont.innerHTML=sess.messages.map(m=>`
    <div class="msg ${m.role}">
      <div class="mav">${m.role==='ai'?'AI':'U'}</div>
      <div style="flex:1;min-width:0">
        <div class="mb">${m.content}</div>
        <div class="mt">${m.time}</div>
      </div>
    </div>`).join('');
  cont.scrollTop=cont.scrollHeight;
}

// ═══════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════
async function sendMsg(){
  const text=txt.trim();if(!text)return;
  if(!curSess)newChat();
  const sess=sessions.find(s=>s.id===curSess);if(!sess)return;
  const cleanTitle=text.replace(/[∫∫]/g,'∫∫').slice(0,50);
  if(!sess.messages.length)sess.title=cleanTitle.length>28?cleanTitle.slice(0,28)+'…':cleanTitle;
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  // User message: show only LaTeX (no raw with slot markers)
  let latexHtml='';
  try{latexHtml=K(rawToLatex(text),true);}catch(e){latexHtml=esc(cleanTitle);}
  const userContent=`<div style="direction:ltr"><div class="user-latex">${latexHtml}</div></div>`;
  sess.messages.push({role:'user',content:userContent,time:t});
  clearInput();renderMsgs();renderHist();
  const cont=document.getElementById('msgs');
  const tdEl=document.createElement('div');tdEl.className='msg ai';
  tdEl.innerHTML=`<div class="mav">AI</div><div><div class="mb"><div class="ty show"><div class="td2"></div><div class="td2"></div><div class="td2"></div></div></div></div>`;
  cont.appendChild(tdEl);cont.scrollTop=9999;
  await new Promise(r=>setTimeout(r,500));tdEl.remove();
  const result=parseAndSolve(text);
  const html=buildHTML(result);
  const t2=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  sess.messages.push({role:'ai',content:html,time:t2});
  renderMsgs();
  notif('Solution computed','s');
}

// ═══════════════════════════════════════════════
// NOTIF
// ═══════════════════════════════════════════════
function notif(msg,type='i'){const n=document.createElement('div');n.className=`nf ${type}`;n.textContent=`// ${msg}`;document.body.appendChild(n);setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity .5s';setTimeout(()=>n.remove(),500);},2500);}

// INIT
// ═══════════════════════════════════════════════
renderHist();renderMsgs();
document.addEventListener("click", function(e) {
  
  const keyboard = document.getElementById("kb");
  const input = document.getElementById("mi");
  
  if (
    !keyboard.contains(e.target) &&
    !input.contains(e.target)
  ) {
    keyboard.style.display = "none";
  }
  
});

document.getElementById("mi").addEventListener("click", function() {
  document.getElementById("kb").style.display = "block";
});
