<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORIVAN-MATH // Equation Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.js"></script>
<style>
:root{
  --nb:#00d4ff;--nr:#ff003c;--ng:#00ff88;--ny:#ffe600;--np:#bf00ff;
  --bd:#020408;--bp:#040c14;--bc:#071220;--bh:#0a1a2e;--bdr:#0a2a3a;
  --tm:#c8e8f8;--td:#4a7a9a;
  --gb:0 0 8px #00d4ff,0 0 20px rgba(0,212,255,.3);
  --gr:0 0 8px #ff003c,0 0 20px rgba(255,0,60,.3);
  --gg:0 0 8px #00ff88,0 0 20px rgba(0,255,136,.3);
  --gy:0 0 8px #ffe600,0 0 20px rgba(255,230,0,.3);
  --sw:280px;--hh:56px;
  --kh:46px;--kfs:.82rem;--kgap:4px;--kpad:9px 6px 12px;
  --kbfs:.65rem;--kmfs:.95rem;--krrad:5px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bd);color:var(--tm);font-family:'Share Tech Mono',monospace;user-select:none;-webkit-user-select:none;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);animation:scan 8s linear infinite;}
@keyframes scan{from{background-position:0 0}to{background-position:0 100px}}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:40px 40px;}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;width:100vw;}
header{height:var(--hh);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:linear-gradient(90deg,#020c18,#040d1c,#020c18);border-bottom:1px solid var(--nb);box-shadow:0 0 20px rgba(0,212,255,.2);flex-shrink:0;}
.logo{font-family:'Orbitron',sans-serif;font-size:clamp(.9rem,2vw,1.15rem);font-weight:900;letter-spacing:3px;color:var(--nb);text-shadow:var(--gb);display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;border:2px solid var(--nb);border-radius:4px;display:flex;align-items:center;justify-content:center;box-shadow:var(--gb);animation:lp 2s ease-in-out infinite;}
@keyframes lp{0%,100%{box-shadow:var(--gb)}50%{box-shadow:0 0 20px #00d4ff,0 0 40px rgba(0,212,255,.5)}}
.hstat{display:flex;gap:15px;align-items:center;}
.sdot{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--td);letter-spacing:1px;}
.dot{width:6px;height:6px;border-radius:50%;animation:blink 1.5s ease-in-out infinite;}
.dot.g{background:var(--ng);box-shadow:var(--gg);}
.dot.r{background:var(--nr);box-shadow:var(--gr);animation-delay:.5s;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main{flex:1;display:flex;overflow:hidden;min-height:0;}
aside{width:var(--sw);background:var(--bp);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .3s,transform .3s;}
.st{padding:12px;border-bottom:1px solid var(--bdr);}
.bnc{width:100%;padding:10px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(0,212,255,.05));border:1px solid var(--nb);color:var(--nb);font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:2px;cursor:pointer;border-radius:4px;text-shadow:var(--gb);box-shadow:var(--gb);display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.bnc:hover{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,212,255,.1));box-shadow:0 0 20px #00d4ff;}
.slbl{padding:12px 12px 6px;font-size:.6rem;letter-spacing:3px;color:var(--td);font-family:'Orbitron',sans-serif;}
.ch{flex:1;overflow-y:auto;padding:4px 8px;}
.ch::-webkit-scrollbar{width:3px;}
.ch::-webkit-scrollbar-thumb{background:var(--nb);}
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .2s;position:relative;overflow:hidden;}
.ci::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--nb);opacity:0;transition:opacity .2s;}
.ci:hover{background:var(--bh);border-color:var(--bdr);}
.ci:hover::before,.ci.active::before{opacity:1;}
.ci.active{background:rgba(0,212,255,.08);border-color:rgba(0,212,255,.2);}
.ci-t{flex:1;font-size:.7rem;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-d{opacity:0;cursor:pointer;color:var(--nr);font-size:.8rem;padding:2px 4px;background:none;border:none;transition:all .2s;flex-shrink:0;}
.ci:hover .ci-d{opacity:1;}
.ci-d:hover{text-shadow:var(--gr);}
.sftr{padding:10px;border-top:1px solid var(--bdr);font-size:.6rem;color:var(--td);text-align:center;}
.sftr span{color:var(--ng);}
.ca{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bd);}
.msgs{flex:1;overflow-y:auto;padding:clamp(12px,2.5vw,24px);display:flex;flex-direction:column;gap:clamp(10px,2vh,16px);min-height:0;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);}
.wlc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(12px,2.5vh,20px);text-align:center;padding:clamp(12px,3vw,24px);}
.wt{font-family:'Orbitron',sans-serif;font-size:clamp(1.1rem,3.5vw,2rem);font-weight:900;color:var(--nb);text-shadow:var(--gb);letter-spacing:4px;}
.ws{font-size:clamp(.65rem,1.5vw,.78rem);color:var(--td);letter-spacing:2px;max-width:480px;line-height:1.8;}
.wg{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(6px,1.5vw,12px);width:100%;max-width:560px;}
.wc{background:var(--bc);border:1px solid var(--bdr);border-radius:6px;padding:clamp(8px,1.5vw,14px);cursor:pointer;transition:all .2s;text-align:left;}
.wc:hover{border-color:var(--nb);box-shadow:var(--gb);background:var(--bh);}
.wci{font-size:clamp(1rem,2.5vw,1.4rem);margin-bottom:5px;}
.wct{font-size:clamp(.58rem,1.2vw,.68rem);font-family:'Orbitron',sans-serif;color:var(--nb);letter-spacing:1px;margin-bottom:4px;}
.wce{font-size:clamp(.55rem,1.1vw,.63rem);color:var(--td);}
.msg{display:flex;gap:8px;animation:mi .3s ease;}
@keyframes mi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.mav{width:clamp(28px,4vw,34px);height:clamp(28px,4vw,34px);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:clamp(.6rem,1.2vw,.72rem);font-family:'Orbitron',sans-serif;}
.msg.ai .mav{background:rgba(0,212,255,.1);border:1px solid var(--nb);color:var(--nb);box-shadow:var(--gb);}
.msg.user .mav{background:rgba(0,255,136,.1);border:1px solid var(--ng);color:var(--ng);box-shadow:var(--gg);}
.mb{max-width:clamp(85%,90%,94%);padding:clamp(8px,1.5vw,12px) clamp(10px,2vw,16px);border-radius:6px;font-size:clamp(.72rem,1.5vw,.85rem);line-height:1.8;}
.msg.ai .mb{background:linear-gradient(135deg,var(--bc),rgba(0,212,255,.04));border:1px solid rgba(0,212,255,.2);color:var(--tm);border-top-left-radius:0;}
.msg.user .mb{background:linear-gradient(135deg,rgba(0,255,136,.08),rgba(0,255,136,.02));border:1px solid rgba(0,255,136,.25);color:#e0fff4;border-top-right-radius:0;}
.mt{font-size:clamp(.5rem,.9vw,.56rem);color:var(--td);margin-top:4px;}
.user-raw{font-size:.62rem;color:var(--td);opacity:.6;margin-bottom:4px;direction:ltr;}
.user-latex{direction:ltr;}
.user-latex .katex{font-size:1rem !important;}
.user-latex .katex *{color:var(--ng) !important;}
.psw{color:var(--nb);font-size:.68rem;margin-bottom:8px;border-left:2px solid var(--nb);padding-left:8px;}
.psw .katex,.psw .katex *{color:var(--nb) !important;}
.sblk{margin-top:4px;}
.sl{display:flex;gap:8px;align-items:center;margin:2px 0;padding:5px 0;border-bottom:1px solid rgba(0,212,255,.05);flex-wrap:wrap;}
.sn{color:var(--nr);font-size:.58rem;font-family:'Orbitron',sans-serif;min-width:22px;flex-shrink:0;}
.slb{color:var(--td);font-size:.6rem;min-width:110px;flex-shrink:0;}
.se{flex:1;min-width:0;overflow-x:auto;}
.se .katex,.se .katex *{color:var(--ny) !important;}
.snote{color:var(--td);font-size:.56rem;font-style:italic;margin-left:4px;}
.rbox{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.35);border-radius:5px;padding:12px 16px;margin-top:8px;box-shadow:0 0 12px rgba(0,255,136,.08);}
.rl{font-family:'Orbitron',sans-serif;font-size:.52rem;color:var(--td);letter-spacing:2px;margin-bottom:8px;}
.rbox .katex,.rbox .katex *{color:var(--ng) !important;}
.ebox{background:rgba(255,0,60,.06);border:1px solid rgba(255,0,60,.3);border-radius:4px;padding:10px 14px;color:var(--nr);font-size:.75rem;}
.ty{display:none;gap:5px;align-items:center;}
.ty.show{display:flex;}
.td2{width:6px;height:6px;border-radius:50%;background:var(--nb);animation:tb 1s ease-in-out infinite;}
.td2:nth-child(2){animation-delay:.15s}.td2:nth-child(3){animation-delay:.3s}
@keyframes tb{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* INPUT + LATEX PREVIEW */
.ib{padding:clamp(6px,1.5vw,10px) clamp(8px,2vw,16px) clamp(8px,1.5vw,12px);background:var(--bp);border-top:1px solid var(--bdr);flex-shrink:0;}
#lprev{min-height:clamp(36px,5vh,48px);max-height:80px;overflow-x:auto;overflow-y:hidden;background:rgba(0,0,0,.4);border:1px solid rgba(0,212,255,.2);border-radius:6px 6px 0 0;border-bottom:none;padding:clamp(7px,1.2vw,10px) clamp(10px,1.8vw,14px);display:flex;align-items:center;cursor:text;transition:border-color .2s;}
#lprev::-webkit-scrollbar{height:2px;}
#lprev::-webkit-scrollbar-thumb{background:var(--nb);}
#lprev.empty::before{content:'// عرض LaTeX هنا...';color:var(--td);font-size:.7rem;font-family:'Share Tech Mono',monospace;opacity:.5;}
#lprev .katex{font-size:clamp(1rem,2.5vw,1.2rem);}
#lprev .katex,#lprev .katex *{color:var(--nb) !important;}
/* Cursor marker inside LaTeX preview */
.lcursor{
  display:inline-flex;flex-direction:column;align-items:center;
  vertical-align:middle;margin:0 1px;position:relative;
  animation:lcblink .9s ease-in-out infinite;
}
.lcursor-bar{width:2px;height:1.1em;border-radius:1px;background:currentColor;display:block;}
.lcursor-arrow{font-size:.55em;line-height:1;margin-top:1px;display:block;}
@keyframes lcblink{0%,100%{opacity:1}45%,55%{opacity:.15}}
.iw{display:flex;gap:8px;align-items:flex-end;background:rgba(4,12,20,.9);border:1px solid rgba(0,212,255,.2);border-radius:0 0 8px 8px;padding:clamp(5px,1vw,8px) clamp(8px,1.5vw,12px);transition:border-color .2s,box-shadow .2s;}
.iw.focused{border-color:rgba(0,212,255,.5);box-shadow:0 0 10px rgba(0,212,255,.15);}
#mi{flex:1;background:transparent;border:none;outline:none;color:rgba(0,212,255,.45);font-family:'Share Tech Mono',monospace;font-size:clamp(.68rem,1.5vw,.82rem);line-height:1.5;caret-color:var(--ng);resize:none;min-height:26px;max-height:70px;direction:ltr;text-align:left;overflow:auto;-webkit-user-select:text;user-select:text;}
#mi::placeholder{color:var(--td);font-size:clamp(.6rem,1.3vw,.72rem);}
.ia{display:flex;gap:6px;align-items:flex-end;flex-shrink:0;}
.bi{height:clamp(30px,4.5vh,38px);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:1px solid;transition:all .2s;background:none;padding:0 clamp(8px,1.5vw,12px);}
.bcl{border-color:rgba(255,0,60,.3);color:var(--nr);}
.bcl:hover{border-color:var(--nr);box-shadow:var(--gr);background:rgba(255,0,60,.1);}
.bsn{border-color:rgba(0,255,136,.4);color:var(--ng);font-family:'Orbitron',sans-serif;font-size:clamp(.52rem,1vw,.62rem);letter-spacing:1px;}
.bsn:hover{border-color:var(--ng);box-shadow:var(--gg);background:rgba(0,255,136,.1);}
.bsn:active{transform:scale(.97);}
#kb{background:linear-gradient(180deg,#030b14,#020810);border-top:1px solid var(--nb);box-shadow:0 -5px 30px rgba(0,212,255,.15);flex-shrink:0;padding:var(--kpad);position:relative;}
#kb::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--nb),transparent);box-shadow:var(--gb);}
.kbar{display:flex;gap:8px;margin-bottom:8px;justify-content:center;}
.kmb{padding:5px 18px;border-radius:4px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:1px;border:1px solid;transition:all .2s;background:none;}
.kmb.a{border-color:rgba(0,212,255,.3);color:var(--td);}
.kmb.a.on{border-color:var(--nb);color:var(--nb);box-shadow:var(--gb);background:rgba(0,212,255,.08);}
.kmb.m{border-color:rgba(255,230,0,.3);color:var(--td);}
.kmb.m.on{border-color:var(--ny);color:var(--ny);box-shadow:var(--gy);background:rgba(255,230,0,.08);}
.kp{display:none;flex-direction:column;gap:var(--kgap);}
.kp.show{display:flex;}
.kr{display:flex;gap:var(--kgap);justify-content:center;padding:0 2px;}
/* Base key — all sizes flow from --kh and --kfs */
.k{
  min-width:0;height:var(--kh);
  border-radius:var(--krrad);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:var(--kfs);font-family:'Share Tech Mono',monospace;
  transition:all .1s;border:1px solid;
  padding:0;flex:1;background:none;
  position:relative;overflow:hidden;
}
.k::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);pointer-events:none;}
.k:active{transform:scale(.92);}
.k.a{border-color:rgba(0,212,255,.2);color:var(--tm);background:rgba(7,18,32,.8);}
.k.a:hover{border-color:var(--nb);box-shadow:0 0 8px rgba(0,212,255,.3);background:rgba(0,212,255,.06);}
.k.m{border-color:rgba(255,230,0,.25);color:var(--ny);background:rgba(10,8,0,.8);font-size:var(--kmfs);}
.k.m:hover{border-color:var(--ny);box-shadow:0 0 8px rgba(255,230,0,.3);}
/* Long-press hint dot on trig keys */
.k.trig-key::after{
  content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;
  background:var(--np);box-shadow:0 0 4px var(--np);
  opacity:.7;pointer-events:none;
}
/* Long-press active state */
.k.trig-key.lp-active{
  border-color:var(--np) !important;
  box-shadow:0 0 14px rgba(191,0,255,.5) !important;
  background:rgba(191,0,255,.1) !important;
  color:var(--np) !important;
}
/* Division button long-press override (yellow glow) */
#btn-frac.lp-active{
  border-color:var(--ny) !important;
  box-shadow:0 0 14px rgba(255,230,0,.6) !important;
  background:rgba(255,230,0,.12) !important;
  color:var(--ny) !important;
}
#btn-frac::after{
  background:var(--ny) !important;
  box-shadow:0 0 4px var(--ny) !important;
}
/* Power button long-press override (cyan glow) */
#btn-pow.lp-active{
  border-color:var(--nb) !important;
  box-shadow:0 0 14px rgba(0,212,255,.6) !important;
  background:rgba(0,212,255,.12) !important;
  color:var(--nb) !important;
}
#btn-pow::after{
  background:var(--nb) !important;
  box-shadow:0 0 4px var(--nb) !important;
}
.k.sp{flex:3;color:var(--td);font-size:var(--kbfs);letter-spacing:1px;}
.k.bk{flex:1.5;color:var(--nr);border-color:rgba(255,0,60,.25);}
.k.bk:hover{border-color:var(--nr);}
.k.en{flex:2;color:var(--ng);border-color:rgba(0,255,136,.25);font-family:'Orbitron',sans-serif;font-size:calc(var(--kfs) * .7);letter-spacing:1px;}
.k.en:hover{border-color:var(--ng);}
.k.sh{flex:1.5;color:var(--np);border-color:rgba(191,0,255,.25);}
.k.sh.on{background:rgba(191,0,255,.12);border-color:var(--np);box-shadow:0 0 10px rgba(191,0,255,.4);}
.k.n3{flex:1.5;font-family:'Orbitron',sans-serif;font-size:calc(var(--kfs) * .6);color:var(--ny);border-color:rgba(255,230,0,.25);}
.k.ar{border-color:rgba(0,212,255,.2);color:var(--nb);flex:1;}
.cd{position:fixed;width:28px;height:28px;z-index:10;pointer-events:none;}
.cd.tl{top:0;left:0;border-top:2px solid var(--nb);border-left:2px solid var(--nb);}
.cd.tr{top:0;right:0;border-top:2px solid var(--nr);border-right:2px solid var(--nr);}
.cd.bl{bottom:0;left:0;border-bottom:2px solid var(--ng);border-left:2px solid var(--ng);}
.cd.br{bottom:0;right:0;border-bottom:2px solid var(--ny);border-right:2px solid var(--ny);}
/* Sidebar collapse arrow button */
.sbcol{display:flex;align-items:center;justify-content:center;width:30px;height:36px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.3);color:var(--nb);border-radius:4px;cursor:pointer;font-size:.75rem;flex-shrink:0;transition:all .2s;}
.sbcol:hover{background:rgba(0,212,255,.15);box-shadow:var(--gb);}
/* Tab to re-open sidebar when collapsed */
.sb-open-tab{display:none;position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:60;background:var(--bp);border:1px solid var(--nb);border-left:none;border-radius:0 6px 6px 0;width:22px;padding:14px 4px;cursor:pointer;color:var(--nb);font-size:.7rem;writing-mode:vertical-rl;letter-spacing:2px;box-shadow:3px 0 15px rgba(0,212,255,.2);transition:all .2s;}
.sb-open-tab:hover{background:rgba(0,212,255,.1);box-shadow:4px 0 20px rgba(0,212,255,.3);}
aside.collapsed ~ .sb-open-tab,.sb-open-tab.visible{display:flex;align-items:center;justify-content:center;}
.nf{position:fixed;top:60px;right:20px;z-index:1000;padding:8px 16px;border-radius:4px;font-size:.7rem;letter-spacing:1px;border:1px solid;animation:nfi .3s ease;pointer-events:none;}
@keyframes nfi{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.nf.s{border-color:var(--ng);color:var(--ng);background:rgba(0,255,136,.08);}
.nf.i{border-color:var(--nb);color:var(--nb);background:rgba(0,212,255,.08);}
.nf.e{border-color:var(--nr);color:var(--nr);background:rgba(255,0,60,.08);}
/* ── PHONE (≤ 480px) ─────────────────────────────── */
@media(max-width:480px){
  :root{
    --sw:240px;--hh:46px;
    --kh:40px;--kfs:.72rem;--kgap:3px;--kpad:6px 4px 8px;
    --kbfs:.55rem;--kmfs:.85rem;--krrad:4px;
  }
  header{padding:0 10px;}
  .logo{font-size:.9rem;letter-spacing:2px;}
  .logo-icon{width:26px;height:26px;font-size:.8rem;}
  .logo-text{display:none;}
  .hstat .sdot:last-child{display:none;}
  #clk{display:none;}
  aside{position:fixed;left:0;top:var(--hh);bottom:0;z-index:50;transform:translateX(-100%);}
  aside.open{transform:translateX(0);box-shadow:5px 0 30px rgba(0,0,0,.8);}
  .msgs{padding:12px 8px;gap:10px;}
  .mb{max-width:96%;padding:8px 10px;font-size:.75rem;}
  .ib{padding:6px 8px 8px;}
  #lprev{min-height:38px;padding:7px 10px;}
  #lprev .katex{font-size:1rem;}
  .iw{padding:5px 8px;}
  .bi{height:32px;padding:0 8px;font-size:.75rem;}
  .bsn{font-size:.52rem;}
  .wg{grid-template-columns:1fr 1fr;gap:6px;}
  .wc{padding:8px;}

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let sessions=[],curSess=null,isShift=false,txt='',caret=0;
let ctxState='normal',rootStart=-1,intStart=-1,derivStart=-1;

// ═══════════════════════════════════════════════
// NEW DOUBLE INTEGRAL SYSTEM
// Format: ∫∫[a]^[b][c]^[d](expr) dy dx
// 5 regions: slot0=[a], slot1=[b], slot2=[c], slot3=[d], slot4=(expr)
// Cursor color cycles on cross-slot jumps
// ═══════════════════════════════════════════════
const DBL_CURSOR_COLORS=['#00d4ff','#00ff88','#ffe600','#ff003c','#bf00ff'];
let dblCursorColorIdx=0;

function isDblInt(){
  // Check if txt contains ∫∫ pattern
  return /∫∫/.test(txt);
}

function getDblIntInfo(){
  // Parse ∫∫[a]^[b][c]^[d](expr)
  // Returns {start, s0o,s0c, s1o,s1c, s2o,s2c, s3o,s3c, s4o,s4c} (open/close indices of each bracket content)
  const idx = txt.indexOf('∫∫');
  if(idx === -1) return null;
  let p = idx + 2; // after ∫∫ (∫∫ is 2 chars but each ∫ is 3 bytes in JS — let's use indexOf carefully)
  // Actually each ∫ is one JS char (U+222B), so ∫∫ = 2 chars
  // slot0: [...]
  if(txt[p] !== '[') return null;
  const s0o = p; const s0c = findMatchClose(txt, p, '[', ']'); if(s0c===-1) return null;
  p = s0c + 1;
  // ^
  if(txt[p] !== '^') return null; p++;
  // slot1: [...]
  if(txt[p] !== '[') return null;
  const s1o = p; const s1c = findMatchClose(txt, p, '[', ']'); if(s1c===-1) return null;
  p = s1c + 1;
  // slot2: [...]
  if(txt[p] !== '[') return null;
  const s2o = p; const s2c = findMatchClose(txt, p, '[', ']'); if(s2c===-1) return null;
  p = s2c + 1;
  // ^
  if(txt[p] !== '^') return null; p++;
  // slot3: [...]
  if(txt[p] !== '[') return null;
  const s3o = p; const s3c = findMatchClose(txt, p, '[', ']'); if(s3c===-1) return null;
  p = s3c + 1;
  // slot4: (...)
  if(txt[p] !== '(') return null;
  const s4o = p; const s4c = findMatchingClose(txt, p); if(s4c===-1) return null;

  return {start:idx, s0o,s0c, s1o,s1c, s2o,s2c, s3o,s3c, s4o,s4c,
          end: s4c + 1};
}

// Which slot (0-4) is caret in? -1 = outside
function dblCurrentSlot(info){
  if(!info) return -1;
  if(caret > info.s0o && caret <= info.s0c) return 0;
  if(caret > info.s1o && caret <= info.s1c) return 1;
  if(caret > info.s2o && caret <= info.s2c) return 2;
  if(caret > info.s3o && caret <= info.s3c) return 3;
  if(caret > info.s4o && caret <= info.s4c) return 4;
  return -1;
}

function cycleCursorColor(){
  dblCursorColorIdx = (dblCursorColorIdx + 1) % DBL_CURSOR_COLORS.length;
  const col = DBL_CURSOR_COLORS[dblCursorColorIdx];
  document.getElementById('mi').style.caretColor = col;
}

function hasDblSlots(){return false;} // legacy — disabled

// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
(function clk(){const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');document.getElementById('clk').textContent=`${h}:${m}:${s}`;setTimeout(clk,1000);})();

// ═══════════════════════════════════════════════
// INPUT SETUP
// ═══════════════════════════════════════════════
const inp=document.getElementById('mi');
const lprev=document.getElementById('lprev');
inp.addEventListener('focus',()=>document.getElementById('iw').classList.add('focused'));
inp.addEventListener('blur',()=>{document.getElementById('iw').classList.remove('focused');setTimeout(()=>inp.focus(),80);});
['keydown','keyup','keypress','paste','cut','input','compositionstart'].forEach(e=>inp.addEventListener(e,ev=>ev.preventDefault()));
inp.addEventListener('click',e=>{e.preventDefault();inp.focus({preventScroll:true});});
setTimeout(()=>inp.focus(),400);

// ═══════════════════════════════════════════════
// RAW → LATEX CONVERTER (for display)
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// SMART FRACTION CONVERTER  (a)/(b) → \dfrac{a}{b}
// Handles nested parens and chained fractions recursively
// ═══════════════════════════════════════════════
function findMatchingClose(s, openIdx) {
  // Find closing ')' matching '(' at openIdx
  let d = 1, i = openIdx + 1;
  while (i < s.length && d > 0) {
    if (s[i] === '(') d++;
    else if (s[i] === ')') d--;
    i++;
  }
  return d === 0 ? i - 1 : -1;
}

function convertFractions(s) {
  // Repeatedly convert leftmost (num)/(den) pattern until no more found
  // Works left-to-right so chained fracs are handled naturally
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '(') {
      // Find matching close of this group
      const numClose = findMatchingClose(s, i);
      if (numClose !== -1 && s[numClose + 1] === '/') {
        // Check if next is '('
        const slashIdx = numClose + 1;
        if (slashIdx + 1 < s.length && s[slashIdx + 1] === '(') {
          const denOpen = slashIdx + 1;
          const denClose = findMatchingClose(s, denOpen);
          if (denClose !== -1) {
            // Extract numerator and denominator content (strip outer parens)
            const numContent = s.slice(i + 1, numClose);
            const denContent = s.slice(denOpen + 1, denClose);
            // Recursively convert inner fractions in both parts
            const numLatex = convertFractions(numContent);
            const denLatex = convertFractions(denContent);
            result += `\\dfrac{${numLatex}}{${denLatex}}`;
            i = denClose + 1;
            continue;
          }
        }
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// ═══════════════════════════════════════════════
// SQRT LATEX CONVERTER — handles nested parens inside √[n](...)
// ═══════════════════════════════════════════════
function findBracketClose(s, openIdx, openCh, closeCh) {
  let d = 1, i = openIdx + 1;
  while (i < s.length && d > 0) {
    if (s[i] === openCh) d++;
    else if (s[i] === closeCh) d--;
    i++;
  }
  return d === 0 ? i - 1 : -1;
}

// Convert ∫(...) with nested parens support → \int\!\left(...\right)\,dx
function convertIntegrals(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    const ch = s[i];
    if ((ch === '∫' || ch === '∮') && s[i+1] === '(') {
      // Not a definite integral (those have [ after ∫)
      const pOpen = i + 1;
      const pClose = findBracketClose(s, pOpen, '(', ')');
      if (pClose !== -1) {
        const inner = s.slice(pOpen+1, pClose);
        // Recursively convert inner content (may have fractions, sqrts, etc.)
        const innerLatex = convertFractions(convertSqrts(inner));
        const intCmd = ch === '∮' ? '\\oint' : '\\int';
        result += `${intCmd}\\!\\left(${innerLatex}\\right)\\,dx`;
        i = pClose + 1;
        continue;
      }
    }
    result += ch;
    i++;
  }
  return result;
}

function convertSqrts(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '√' && s[i+1] === '[') {
      // Parse degree [...]
      const degOpen = i + 1;
      const degClose = findBracketClose(s, degOpen, '[', ']');
      if (degClose !== -1 && s[degClose+1] === '(') {
        const radOpen = degClose + 1;
        const radClose = findBracketClose(s, radOpen, '(', ')');
        if (radClose !== -1) {
          const degRaw = s.slice(degOpen+1, degClose).trim();
          const radContent = s.slice(radOpen+1, radClose);
          // Convert fractions inside DEGREE bracket too: √[(a)/(b)](c)
          const degLatex = convertFractionsInExp(degRaw);
          // Recursively convert inner radicand content (fractions, nested sqrts, etc.)
          const innerLatex = convertSqrts(convertFractions(radContent)) || '{\\color{#4a7a9a}\\square}';
          if (degRaw === '' || degRaw === '2') {
            result += `\\sqrt{${innerLatex}}`;
          } else {
            result += `\\sqrt[${degLatex}]{${innerLatex}}`;
          }
          i = radClose + 1;
          continue;
        }
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// ═══════════════════════════════════════════════
// POWER/SUBSCRIPT BRACKET CONVERTERS
// Handles nested brackets: ^[b+c], ^[(b)/(c)], _[2], etc.
// ═══════════════════════════════════════════════

// Generic: convert prefix[...] → open...close, with nested [] support
function convertBracketCmd(s, trigger, open, close) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === trigger && i + 1 < s.length && s[i+1] === '[') {
      const braOpen = i + 1;
      const braClose = findBracketClose(s, braOpen, '[', ']');
      if (braClose !== -1) {
        const inner = s.slice(braOpen + 1, braClose);
        const innerConverted = inner || '{\\color{#4a7a9a}\\square}';
        result += open + innerConverted + close;
        i = braClose + 1;
        continue;
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// Power ^[...] → ^{...} with inner fraction/expression conversion
// Converts (a)/(b) inside ^[...] to \dfrac{a}{b} for proper LaTeX superscript
function convertPowerBrackets(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '^' && i + 1 < s.length && s[i+1] === '[') {
      // Skip if this is an integral upper bound: preceded by ']' (closing a lower bound)
      const prevChar = i > 0 ? s[i-1] : '';
      if (prevChar === ']') {
        result += s[i]; i++; continue;
      }
      const braOpen = i + 1;
      const braClose = findBracketClose(s, braOpen, '[', ']');
      if (braClose !== -1) {
        let inner = s.slice(braOpen + 1, braClose);
        if (!inner) {
          result += '^{{\\color{#4a7a9a}\\square}}';
          i = braClose + 1;
          continue;
        }
        // Recursively convert nested ^[...] inside the exponent
        inner = convertPowerBrackets(inner);
        // Convert fractions inside exponent: (a)/(b) → \frac{a}{b}
        inner = convertFractionsInExp(inner);
        result += '^{' + inner + '}';
        i = braClose + 1;
        continue;
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// Convert (a)/(b) inside an exponent to \frac{a}{b} (not \dfrac to keep exponent compact)
function convertFractionsInExp(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '(') {
      const numClose = findBracketClose(s, i, '(', ')');
      if (numClose !== -1 && s[numClose + 1] === '/') {
        if (numClose + 2 < s.length && s[numClose + 2] === '(') {
          const denOpen = numClose + 2;
          const denClose = findBracketClose(s, denOpen, '(', ')');
          if (denClose !== -1) {
            const numContent = convertFractionsInExp(s.slice(i + 1, numClose));
            const denContent = convertFractionsInExp(s.slice(denOpen + 1, denClose));
            result += `\\frac{${numContent}}{${denContent}}`;
            i = denClose + 1;
            continue;
          }
        }
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

function rawToLatex(raw){
  if(!raw) return '';
  let s=raw.trim();

  // ── Preserve cursor placeholder through all transformations ──
  const CPLACEHOLDER = '___CURSOR_HERE___';
  const hasCursor = s.includes(CPLACEHOLDER);
  // Temporarily swap it for a safe token that regexes won't touch
  if(hasCursor) s = s.replace(CPLACEHOLDER, '\x01CURSOR\x01');

  // (slot markers removed — new ∫∫ format uses [])
  // ── DOUBLE integral ∫∫[a]^[b][c]^[d](expr) — new format ──
  s=s.replace(/∫∫\[([^\]]*)\]\^\[([^\]]*)\]\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,(m,a,b,c,d,expr)=>{
    const aL=a||'{\\color{#4a7a9a}\\square}', bL=b||'{\\color{#4a7a9a}\\square}';
    const cL=c||'{\\color{#4a7a9a}\\square}', dL=d||'{\\color{#4a7a9a}\\square}';
    const el=expr?rawToLatex(expr):'f(x,y)';
    return `\\int_{${aL}}^{${bL}}\\!\\int_{${cL}}^{${dL}}\\left(${el}\\right)\\,dy\\,dx`;
  });
  // ── DOUBLE integral ∬ a^b c^d (expr) after slot replacement (legacy) ──
  s=s.replace(/∬\s*([^\s^()\\]+)\s*\^\s*([^\s^()\\]+)\s+([^\s^()\\]+)\s*\^\s*([^\s^()\\]+)\s*\(([^)]*)\)/g,
    (_,x1,x2,y1,y2,expr)=>{
      const el=rawToLatex(expr)||'f(x,y)';
      const needP=/[+\-]/.test((expr||'').trim().replace(/^\s*-/,''));
      const ed=needP?`\\left(${el}\\right)`:el;
      return `\\int_{${x1}}^{${x2}}\\!\\int_{${y1}}^{${y2}} ${ed}\\;dy\\,dx`;
    }
  );
  // Operators
  s=s.replace(/×/g,'\\cdot ').replace(/÷/g,'\\div ').replace(/═/g,'=');
  // √[n](expr) — nth root with nested content (use char-by-char parser)
  s=convertSqrts(s);
  // √ legacy formats (for backwards compat)
  s=s.replace(/√\(([^)]*)\)\^(\{[^}]+\}|\d+\.?\d*)/g,'\\sqrt{$1}^{$2}');
  s=s.replace(/√\(([^)]*)\)/g,'\\sqrt{$1}');
  s=s.replace(/√(\d+\.?\d*)/g,'\\sqrt{$1}');
  // DOUBLE integral ∬[x1]^[x2][y1]^[y2](expr)
  s=s.replace(/∬\[([^\]]*)\]\^\[([^\]]*)\]\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,(m,x1,x2,y1,y2,expr)=>{
    return `\\iint_{${x1||'x_1'}}^{${x2||'x_2'}}\\!\\int_{${y1||'y_1'}}^{${y2||'y_2'}}\\left(${expr||'f(x,y)'}\\right)\\,dy\\,dx`;
  });
  // DEFINITE integral ∫[lo]^[hi](expr) — CONTOUR ∮[lo]^[hi](expr)
  s=s.replace(/([∫∬∮])\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,(m,sym,lo,hi,expr)=>{
    const loL=lo||'a', hiL=hi||'b', exL=expr||'f(x)';
    const cmd=sym==='∮'?'\\oint':'\\int';
    return `${cmd}_{${loL}}^{${hiL}}\\!\\left(${exL}\\right)\\,dx`;
  });
  // INDEFINITE ∫(...) / ∮(...) — char-by-char parser for nested parens
  s=convertIntegrals(s);
  s=s.replace(/∮([^()\s=+\-*/^[\]]+)/g,'\\oint $1\\,dx');
  s=s.replace(/∫([^()\s=+\-*/^[\]]+)/g,'\\int $1\\,dx');
  // ∂(...) derivative
  s=s.replace(/∂\(([^)]*)\)/g,'\\frac{d}{dx}\\!\\left($1\\right)');
  // Power ^[...] → ^{...}  (with nested bracket support + inner fraction conversion)
  // Must run BEFORE convertFractions so exponent fracs use compact \frac not \dfrac
  s = convertPowerBrackets(s);
  // Fractions: smart recursive (a)/(b) → \dfrac{a}{b}, handles nested parens
  s=convertFractions(s);
  // lim_[{var}→{val}][body] → \lim_{var \to val} body
  s = s.replace(/lim_\[{([^}]*)}→{([^}]*)}\]\[([^\]]*)\]/g, (m, v, a, body) => {
    const vL = v || '{\\color{#4a7a9a}\\square}';
    const aL = a || '{\\color{#4a7a9a}\\square}';
    const bL = body || '{\\color{#4a7a9a}\\square}';
    return `\\lim_{${vL} \\to ${aL}} ${bL}`;
  });
  // Subscript _[...] → _{...}  (with nested bracket support)
  s = convertBracketCmd(s, '_', '_{', '}');
  // Exponents
  s=s.replace(/\^(-?\d+\.?\d*)/g,'^{$1}');
  s=s.replace(/\^([a-zA-Z])/g,'^{$1}');
  // SUMMATION ∑[n=start]^[end](expr) → \sum_{...}^{...}\left(...\right)
  s=s.replace(/∑\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,(m,sub,sup,expr)=>{
    const subL=sub||'n=1', supL=rawToLatex(sup)||'\\infty', exprL=rawToLatex(expr)||'f(n)';
    return `\\sum_{${subL}}^{${supL}}\\left(${exprL}\\right)`;
  });
  // Greek
  s=s.replace(/π/g,'\\pi').replace(/θ/g,'\\theta')
    .replace(/Δ/g,'\\Delta')
    .replace(/∞/g,'\\infty').replace(/∑/g,'\\sum').replace(/∏/g,'\\prod');
  // Relations
  s=s.replace(/≠/g,'\\neq ');
  // Math functions
  // Inverse trig: acos/asin/atan → \cos^{-1} / \sin^{-1} / \tan^{-1}
  s=s.replace(/\bacos\b/g,'\\cos^{-1}');
  s=s.replace(/\basin\b/g,'\\sin^{-1}');
  s=s.replace(/\batan\b/g,'\\tan^{-1}');
  ['arcsin','arccos','arctan','sinh','cosh','tanh','sin','cos','tan','cot','sec','csc','log','ln','exp'].forEach(fn=>{
    s=s.replace(new RegExp('(?<![\\\\])\\b'+fn+'\\b','g'),'\\'+fn+' ');
  });
  // ── Restore cursor placeholder ──
  if(hasCursor) s = s.replace('\x01CURSOR\x01', CPLACEHOLDER);
  return s;
}

// LIVE PREVIEW  (with cursor indicator)
// ═══════════════════════════════════════════════

// Pick cursor color based on context
function getCursorColor(){
  if(isDblInt()){
    const info=getDblIntInfo();
    if(info){
      const slot=dblCurrentSlot(info);
      if(slot>=0) return DBL_CURSOR_COLORS[slot % DBL_CURSOR_COLORS.length];
    }
  }
  switch(ctxState){
    case 'inside_int':
    case 'inside_int_lo':
    case 'inside_int_hi': return '#ffe600';
    case 'inside_root':
    case 'inside_sqrt_deg': return '#bf00ff';
    case 'inside_pow': return '#ff003c';
    default: return '#00ff88';
  }
}

// Unique marker that won't appear in normal text
const CURSOR_MARKER = '\u{E001}'; // private use area char

// Extend rawToLatex to pass through the cursor marker as a special \htmlClass token
function rawToLatexWithCursor(raw){
  // Replace cursor marker with a special token that KaTeX can render as HTML
  // We use \text{\cursor} — but KaTeX strips unknown macros.
  // Better: split on CURSOR_MARKER, convert each part, rejoin with a placeholder string
  // that we later replace in the rendered HTML.
  const PLACEHOLDER = '___CURSOR_HERE___';
  const withPlaceholder = raw.replace(CURSOR_MARKER, PLACEHOLDER);

  // Convert full expression — structures stay intact (√[]() etc.)
  const latex = rawToLatex(withPlaceholder);

  // Replace placeholder with a \text{|} wrapped in a recognizable string
  // We use \texttt{|} which KaTeX renders as a <span> we can target
  return latex.replace(PLACEHOLDER, '\\htmlClass{lc-pos}{|}');
}

function updatePreview(){
  if(!txt.trim()){lprev.innerHTML='';lprev.classList.add('empty');return;}
  lprev.classList.remove('empty');

  const col = getCursorColor();

  try{
    // Inject cursor marker at caret position in raw text
    const txtWithCursor = txt.slice(0,caret) + CURSOR_MARKER + txt.slice(caret);
    const latexWithCursor = rawToLatexWithCursor(txtWithCursor);

    // Check if placeholder survived the conversion
    if(latexWithCursor.includes('\\htmlClass{lc-pos}{|}')){
      katex.render(latexWithCursor, lprev, {
        throwOnError: false,
        displayMode: false,
        strict: false,
        trust: true,
        macros: {}
      });

      // Find the injected element and style it as cursor
      const cursorSpan = lprev.querySelector('.lc-pos');
      if(cursorSpan){
        cursorSpan.className = 'lcursor-inline';
        cursorSpan.style.cssText = `
          display:inline-block;
          width:2px;
          background:${col};
          border-radius:1px;
          margin:0 1px;
          vertical-align:middle;
          height:1em;
          box-shadow:0 0 6px ${col}, 0 0 14px ${col};
          animation:lcblink .9s ease-in-out infinite;
          position:relative;
        `;
        // Add arrow below
        const arrow = document.createElement('span');
        arrow.textContent = '▲';
        arrow.style.cssText = `
          position:absolute;
          bottom:-0.85em;
          left:50%;
          transform:translateX(-50%);
          font-size:0.45em;
          color:${col};
          text-shadow:0 0 6px ${col};
          animation:lcblink .9s ease-in-out infinite;
          pointer-events:none;
          line-height:1;
        `;
        cursorSpan.appendChild(arrow);
        cursorSpan.scrollIntoView({block:'nearest',inline:'nearest'});
      }
    } else {
      // Fallback: cursor marker didn't make it through — render without cursor
      katex.render(rawToLatex(txt), lprev, {throwOnError:false, displayMode:false, strict:false});
    }
  }catch(e){
    try{
      katex.render(rawToLatex(txt), lprev, {throwOnError:false, displayMode:false, strict:false});
    }catch(e2){
      lprev.textContent = txt;
    }
  }
}

// ═══════════════════════════════════════════════
// TEXT ENGINE
// ═══════════════════════════════════════════════
function sync(){
  inp.value=txt;
  inp.setSelectionRange(caret,caret);
  inp.style.height='26px';
  inp.style.height=Math.min(inp.scrollHeight,70)+'px';
  updateCtxState();
  updatePreview();
}

// ── States: normal, inside_root, inside_int, inside_deriv,
//            inside_int_lo (lower bound []), inside_int_hi (upper bound [])
let intLoStart=-1, intHiStart=-1; // positions of [ in ∫[lo]^[hi]

function updateCtxState(){
  ctxState='normal';rootStart=-1;intStart=-1;derivStart=-1;intLoStart=-1;intHiStart=-1;

  // ── Scan ALL √[]() structures to find if caret is inside one ──
  // (must scan all, not stop at first, because operators inside [] break leftward scan)
  {
    let i = 0;
    while(i < txt.length){
      if(txt[i] === '√' && txt[i+1] === '['){
        const sqrtIdx = i;
        const degOpen = i + 1;
        const degClose = findMatchClose(txt, degOpen, '[', ']');
        if(degClose !== -1){
          // Inside degree []?
          if(caret > degOpen && caret <= degClose){
            rootStart = sqrtIdx; ctxState = 'inside_sqrt_deg'; return;
          }
          // Inside radicand ()?
          if(txt[degClose+1] === '('){
            const radOpen = degClose + 1;
            const radClose = findMatchingClose(txt, radOpen);
            if(radClose !== -1 && caret > radOpen && caret <= radClose){
              rootStart = sqrtIdx; ctxState = 'inside_root'; return;
            }
            i = radClose !== -1 ? radClose + 1 : degClose + 2;
            continue;
          }
          i = degClose + 1; continue;
        }
      }
      i++;
    }
  }

  // ── Scan ∑[sub]^[sup](expr) structures ──
  {
    let i=0;
    while(i<txt.length){
      if(txt[i]==='∑' && txt[i+1]==='['){
        const s0o=i+1;
        const s0c=findMatchClose(txt,s0o,'[',']');
        if(s0c!==-1){
          if(caret>s0o&&caret<=s0c){ctxState='inside_sum_sub';return;}
          if(txt[s0c+1]==='^'&&txt[s0c+2]==='['){
            const s1o=s0c+2;
            const s1c=findMatchClose(txt,s1o,'[',']');
            if(s1c!==-1){
              if(caret>s1o&&caret<=s1c){ctxState='inside_sum_sup';return;}
              if(txt[s1c+1]==='('){
                const s2o=s1c+1;
                const s2c=findMatchingClose(txt,s2o);
                if(s2c!==-1&&caret>s2o&&caret<=s2c){ctxState='inside_sum_expr';return;}
                i=s2c!==-1?s2c+1:s1c+2;continue;
              }
            }
          }
          i=s0c+1;continue;
        }
      }
      i++;
    }
  }

  // ── Find nearest ∫/∂ to the left of caret (simple leftward scan is OK for these) ──
  for(let i=caret-1;i>=0;i--){
    const c=txt[i];
    if(c==='∫'||c==='∮'){
      if(c==='∫' && txt[i+1]==='∫') {intStart=-1;break;}
      intStart=i;break;
    }
    if(c==='∂'){derivStart=i;break;}
    // stop at structural chars that separate expressions
    if(c==='=' || c==='═') break;
  }

  const checkScope=(sIdx,open,close)=>{
    if(sIdx===-1) return -1;
    const openP=txt.indexOf(open,sIdx);
    if(openP!==-1&&openP<caret){
      let d=1,j=openP+1;
      while(j<txt.length&&d>0){if(txt[j]===open)d++;else if(txt[j]===close)d--;if(d>0)j++;else break;}
      if(caret>openP&&caret<=j) return openP;
    }
    return -1;
  };

  if(checkScope(derivStart,'(',')')!==-1){ctxState='inside_deriv';return;}
  if(intStart!==-1){
    const lb=checkScope(intStart,'[',']');
    if(lb!==-1){intLoStart=lb;ctxState='inside_int_lo';return;}
    const firstBrClose=findMatchClose(txt,intStart,'[',']');
    if(firstBrClose!==-1&&txt[firstBrClose+1]==='^'){
      const hiOpen=firstBrClose+2;
      if(hiOpen<txt.length&&txt[hiOpen]==='['){
        const hbc=findMatchClose(txt,hiOpen,'[',']');
        if(caret>hiOpen&&caret<=hbc){intHiStart=hiOpen;ctxState='inside_int_hi';return;}
      }
    }
    if(checkScope(intStart,'(',')')!==-1){ctxState='inside_int';return;}
  }
}

function findMatchClose(s,fromIdx,openCh,closeCh){
  const start=s.indexOf(openCh,fromIdx);
  if(start===-1) return -1;
  let d=1,j=start+1;
  while(j<s.length&&d>0){if(s[j]===openCh)d++;else if(s[j]===closeCh)d--;j++;}
  return d===0?j-1:-1;
}

// ═══════════════════════════════════════════════
// DEFINITE INTEGRAL NAVIGATOR  ∫[lo]^[hi](expr)
// slot0=[lo]  slot1=[hi]  slot2=(expr)
// ═══════════════════════════════════════════════
function getDefIntInfo(){
  for(let i=0;i<txt.length;i++){
    const ch=txt[i];
    if((ch==='∫'||ch==='∮') && txt[i+1]!=='∫' && !(i>0&&txt[i-1]==='∫')){
      if(txt[i+1]!=='[') continue;
      const s0o=i+1;
      const s0c=findMatchClose(txt,s0o,'[',']');
      if(s0c===-1) continue;
      if(txt[s0c+1]!=='^'||txt[s0c+2]!=='[') continue;
      const s1o=s0c+2;
      const s1c=findMatchClose(txt,s1o,'[',']');
      if(s1c===-1) continue;
      if(txt[s1c+1]!=='(') continue;
      const s2o=s1c+1;
      const s2c=findMatchingClose(txt,s2o);
      if(s2c===-1) continue;
      const end=s2c+1;
      if(caret>=i && caret<=end){
        return{intIdx:i, s0o,s0c, s1o,s1c, s2o,s2c, end};
      }
    }
  }
  return null;
}
function defIntSlot(info){
  if(!info) return -1;
  if(caret>info.s0o && caret<=info.s0c) return 0;
  if(caret>info.s1o && caret<=info.s1c) return 1;
  if(caret>info.s2o && caret<=info.s2c) return 2;
  return -1;
}

// Returns true if caret sits in a forbidden gap inside ∫[lo]^[hi](expr):
//   gap A: between s0c (]) and s1o ([)  →  the ]^[ zone
//   gap B: between s1c (]) and s2o (()  →  the ]( zone
function defIntInForbiddenGap(info){
  if(!info) return null;
  // gap A: caret === s0c+1 .. s1o  (between first ] and ^[)
  if(caret > info.s0c && caret <= info.s1o) return 'A';
  // gap B: caret === s1c+1 .. s2o  (between second ] and ()
  if(caret > info.s1c && caret <= info.s2o) return 'B';
  return null;
}

function kp(ch){
  if(isShift&&ch.match(/[a-z]/))ch=ch.toUpperCase();

  // ── Protect lim structural areas — only type inside {var}, {val}, [body] ──
  {
    const limInfo = getLimInfo();
    if(limInfo){
      const slot = limCurrentSlot(limInfo);
      if(slot < 0){
        // Caret is in a structural gap inside lim → block all typing
        if(caret > limInfo.limStart && caret < limInfo.limEnd){ sync(); return; }
      }
    }
  }

  // ── Protect double integral slots from structural chars only ──
  if(isDblInt()){
    const info=getDblIntInfo();
    if(info){
      const slot=dblCurrentSlot(info);
      // Slots 0-3 are inside [] brackets — block chars that would break structure
      if(slot>=0 && slot<=3){
        if(ch==='[' || ch===']' || ch==='^'){sync();return;}
      }
      // Slot 4 is inside () — block chars that would break structure
      if(slot===4){
        if(ch==='(' || ch===')'){sync();return;}
      }
    }
  }

  // ── Protect ∑ slots ──
  {
    const si = getSumInfo();
    if(si){
      const slot = sumSlot(si);
      const gap  = sumForbiddenGap(si);
      // Block typing in forbidden gaps (structural zone)
      if(gap){ sync(); return; }
      // Inside [sub] or [sup] — block structural bracket chars
      if(slot === 0 || slot === 1){
        if(ch==='[' || ch===']' || ch==='^'){ sync(); return; }
      }
      // Inside (expr) — block unmatched parens that break structure
      if(slot === 2){
        if(ch==='(' || ch===')'){ sync(); return; }
      }
    }
  }

  // ∫ زر = تكامل غير محدود ∫()  |  زر ∫ᵃᵇ = تكامل محدود عبر kpDefInt()
  const specials={'∫':'∫()','∮':'∮()','∂':'∂()'};
  if(specials[ch]){
    const s=specials[ch];
    txt=txt.slice(0,caret)+s+txt.slice(caret);
    caret+=s.length-1;
    sync();
    if(isShift){isShift=false;document.getElementById('shk').classList.remove('on');}
    hideWelcome();return;
  }
  // √ handled by kpSqrt()
  if(ch==='√'){kpSqrt();return;}
  txt=txt.slice(0,caret)+ch+txt.slice(caret);caret++;sync();
  if(isShift&&ch.match(/[A-Z]/)){isShift=false;document.getElementById('shk').classList.remove('on');}
  hideWelcome();
}

// Insert d/dx(...) differential operator
function kpDiff(){
  const s='∂()';
  txt=txt.slice(0,caret)+s+txt.slice(caret);
  caret+=2;
  sync();hideWelcome();
}

// Insert trig function cos()/sin()/tan() with caret inside ()
function kpTrig(fn){
  const s = fn + '()';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  caret += fn.length + 1; // inside the (
  sync();
  hideWelcome();
}

// Insert inverse trig: acos()/asin()/atan() — displayed as cos⁻¹ etc.
// math.js uses acos/asin/atan; rawToLatex will render them as \cos^{-1} etc.
function kpTrigInv(fn){
  // fn = 'cos'|'sin'|'tan'  →  insert 'acos()'|'asin()'|'atan()'
  const invMap = {cos:'acos', sin:'asin', tan:'atan'};
  const s = invMap[fn] + '()';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  caret += invMap[fn].length + 1; // inside the (
  sync();
  notif(fn + '⁻¹ inserted', 'i');
  hideWelcome();
}

// LONG-PRESS SYSTEM for trig keys
// Threshold: 500ms → triggers inverse trig
// ═══════════════════════════════════════════════
(function initTrigLongPress(){
  const LONG_MS = 500;
  const keys = [
    {id:'btn-cos', fn:'cos'},
    {id:'btn-sin', fn:'sin'},
    {id:'btn-tan', fn:'tan'},
  ];
  keys.forEach(({id, fn}) => {
    const btn = document.getElementById(id);
    if(!btn) return;
    let timer = null;
    let fired = false;

    function startPress(e){
      fired = false;
      btn.classList.add('lp-active');
      timer = setTimeout(() => {
        fired = true;
        btn.classList.remove('lp-active');
        kpTrigInv(fn);
      }, LONG_MS);
    }

    function endPress(e){
      clearTimeout(timer);
      btn.classList.remove('lp-active');
      if(!fired){
        kpTrig(fn);
      }
      fired = false;
    }

    function cancelPress(){
      clearTimeout(timer);
      btn.classList.remove('lp-active');
      fired = false;
    }

    // Touch events (mobile)
    btn.addEventListener('touchstart',  e => { e.preventDefault(); startPress(e); }, {passive:false});
    btn.addEventListener('touchend',    e => { e.preventDefault(); endPress(e);   }, {passive:false});
    btn.addEventListener('touchcancel', e => { cancelPress(); },                     {passive:false});
    // Mouse events (desktop)
    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('mouseup',   endPress);
    btn.addEventListener('mouseleave',cancelPress);
    // Block default click (we handle it manually above)
    btn.addEventListener('click', e => e.stopPropagation());
  });
})();

// Long-press ÷:
//   • If '=' exists at depth 0 → wrap everything AFTER '=' as numerator:
//       x=3+2  →  x=(3+2)/()     caret inside denominator
//   • No '=' → wrap entire txt as numerator:
//       3+2    →  (3+2)/()
function kpFracWrapAll(){
  hideWelcome();
  const whole = txt;
  if(!whole.trim()){
    txt = '()/()';
    caret = 1;
    sync(); return;
  }

  // Find first '=' at depth 0
  let eqIdx = -1;
  let depth = 0;
  for(let i = 0; i < whole.length; i++){
    const c = whole[i];
    if(c==='('||c==='['||c==='{') depth++;
    else if(c===')'||c===']'||c==='}') depth--;
    else if(c==='=' && depth===0){ eqIdx = i; break; }
  }

  if(eqIdx !== -1){
    // x=3+2  →  x=(3+2)/()
    const prefix  = whole.slice(0, eqIdx + 1); // "x="
    const content = whole.slice(eqIdx + 1);    // "3+2"
    const frac    = '(' + content + ')/()';
    txt   = prefix + frac;
    // Place caret inside denominator () → before the closing ')'
    caret = txt.length - 1;
  } else {
    // No '=' → wrap everything as numerator
    const frac = '(' + whole + ')/()';
    txt   = frac;
    caret = txt.length - 1;
  }

  sync();
  notif('المعادلة في البسط', 'i');
}

// Insert definite integral ∫[a]^[b](expr)
function kpDefInt(){
  const s='∫[]^[]()';
  txt=txt.slice(0,caret)+s+txt.slice(caret);
  caret+=2; // inside lower bound [
  sync();hideWelcome();
}

// ═══════════════════════════════════════════════
// SQRT SYSTEM  √[n]()
// Format: √[degree](radicand)
// degree is optional — if empty = square root
// ═══════════════════════════════════════════════
function kpSqrt(){
  // Wrap whatever token is before caret as radicand
  let tokenStart = caret;
  let depth = 0;
  let i = caret - 1;
  while(i >= 0){
    const c = txt[i];
    if(c === ')'){depth++;i--;continue;}
    if(c === '('){
      if(depth > 0){depth--;i--;continue;}
      else{tokenStart=i;break;}
    }
    if(depth === 0 && /[+\-×÷*]/.test(c)){tokenStart=i+1;break;}
    tokenStart=i;
    i--;
  }
  const radicand = txt.slice(tokenStart, caret);
  const before = txt.slice(0, tokenStart);
  const after  = txt.slice(caret);
  // Insert √[](radicand)
  const s = `√[](${radicand})`;
  txt = before + s + after;
  // Place caret inside [] (degree slot) — position after '['
  caret = tokenStart + 2;
  sync();
  hideWelcome();
}

// Helper: get sqrt info at or before caret
// Returns {sqrtIdx, degOpen, degClose, radOpen, radClose} or null
function getSqrtInfo(pos){
  // Walk left to find √
  for(let i = pos - 1; i >= 0; i--){
    if(txt[i] === '√'){
      const sqrtIdx = i;
      // Expect √[...](...)
      if(txt[i+1] !== '[') return null;
      const degOpen = i+1;
      const degClose = findMatchClose(txt, degOpen, '[', ']');
      if(degClose === -1) return null;
      if(txt[degClose+1] !== '(') return null;
      const radOpen = degClose+1;
      const radClose = findMatchingClose(txt, radOpen);
      if(radClose === -1) return null;
      // Check pos is within or just after this sqrt
      if(pos > sqrtIdx && pos <= radClose+1)
        return {sqrtIdx, degOpen, degClose, radOpen, radClose};
      return null;
    }
    // Stop at operators not inside parens
    if(/[+\-×÷*=]/.test(txt[i])) break;
  }
  return null;
}

// ═══════════════════════════════════════════════
// POWER SYSTEM  ^[]
// Format: base^[exponent]
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// LONG-PRESS on ^ key → wrap ENTIRE expression as base: ( entire_txt )^[]
// If '=' exists at depth 0 → wrap only part AFTER '=' as base
// e.g. x=3+2 → x=(3+2)^[]
// ═══════════════════════════════════════════════
(function initPowLongPress(){
  const LONG_MS = 500;
  const btn = document.getElementById('btn-pow');
  if(!btn) return;
  let timer = null;
  let fired = false;

  function startPress(e){
    fired = false;
    btn.classList.add('lp-active');
    timer = setTimeout(() => {
      fired = true;
      btn.classList.remove('lp-active');
      kpPowWrapAll();
    }, LONG_MS);
  }

  function endPress(e){
    clearTimeout(timer);
    btn.classList.remove('lp-active');
    if(!fired){ kpPow(); }
    fired = false;
  }

  function cancelPress(){
    clearTimeout(timer);
    btn.classList.remove('lp-active');
    fired = false;
  }

  btn.addEventListener('touchstart',  e => { e.preventDefault(); startPress(e); }, {passive:false});
  btn.addEventListener('touchend',    e => { e.preventDefault(); endPress(e);   }, {passive:false});
  btn.addEventListener('touchcancel', e => { cancelPress(); },                     {passive:false});
  btn.addEventListener('mousedown', startPress);
  btn.addEventListener('mouseup',   endPress);
  btn.addEventListener('mouseleave', cancelPress);
  btn.addEventListener('click', e => e.stopPropagation());
})();

// Wrap ENTIRE txt (or part after '=') as base, add empty exponent:
// 3+2       →  (3+2)^[]     caret inside []
// x=3+2     →  x=(3+2)^[]  caret inside []
function kpPowWrapAll(){
  hideWelcome();
  const whole = txt;
  if(!whole.trim()){
    txt = '^[]';
    caret = 2;
    sync(); return;
  }

  // Find first '=' at depth 0
  let eqIdx = -1;
  let depth = 0;
  for(let i = 0; i < whole.length; i++){
    const c = whole[i];
    if(c==='('||c==='['||c==='{') depth++;
    else if(c===')'||c===']'||c==='}') depth--;
    else if(c==='=' && depth===0){ eqIdx = i; break; }
  }

  if(eqIdx !== -1){
    // x=3+2  →  x=(3+2)^[]
    const prefix  = whole.slice(0, eqIdx + 1);  // "x="
    const content = whole.slice(eqIdx + 1);      // "3+2"
    const powered = '(' + content + ')^[]';
    txt   = prefix + powered;
    caret = txt.length - 1; // inside []
  } else {
    // No '=' → wrap everything as base
    const powered = '(' + whole + ')^[]';
    txt   = powered;
    caret = txt.length - 1; // inside []
  }

  sync();
  notif('المعادلة كقاعدة للأس', 'i');
}

function kpPow(){
  // Insert ^[] and place caret inside []
  const s = '^[]';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  caret += 2; // inside [
  sync();
  hideWelcome();
}

// Get power info if caret is inside or just after a ^[...] block
// Returns {powIdx, braOpen, braClose} or null
function getPowInfo(pos){
  // Search leftward for ^ followed by [
  for(let i = pos - 1; i >= 0; i--){
    if(txt[i] === '^' && i + 1 < txt.length && txt[i+1] === '['){
      const braOpen = i + 1;
      const braClose = findMatchClose(txt, braOpen, '[', ']');
      if(braClose === -1) return null;
      // pos must be inside or at end of bracket
      if(pos > braOpen && pos <= braClose + 1)
        return {powIdx: i, braOpen, braClose};
      return null;
    }
    // Stop at operators or structural chars that can't contain ^
    if(/[+\-×÷*=∫∂√∑∏]/.test(txt[i])) break;
  }
  return null;
}

// Check if caret is inside a ^[...] exponent (strictly between [ and ])
// Uses proper bracket scanning to handle nested () [] inside exponent
function isInsidePow(){
  // Scan the entire txt for all ^[...] blocks and check if caret falls inside one
  let i = 0;
  while (i < txt.length) {
    if (txt[i] === '^' && i + 1 < txt.length && txt[i+1] === '[') {
      // Skip integral upper bounds (preceded by ])
      if (i > 0 && txt[i-1] === ']') { i++; continue; }
      const braOpen = i + 1;
      const braClose = findMatchClose(txt, braOpen, '[', ']');
      if (braClose !== -1) {
        if (caret > braOpen && caret <= braClose) {
          return {powIdx: i, braOpen, braClose};
        }
        i = braClose + 1;
        continue;
      }
    }
    i++;
  }
  return null;
}

// Check if caret is at very start of ^[...] i.e. txt[caret-1]==='[' and txt[caret-2]==='^'
// Excludes integral upper bounds where ^ is preceded by ]
function isAtPowStart(){
  if(caret >= 2 && txt[caret-1] === '[' && txt[caret-2] === '^'){
    // Skip if this ^ is an integral upper bound (preceded by ])
    if(caret >= 3 && txt[caret-3] === ']') return null;
    const braOpen = caret - 1;
    const braClose = findMatchClose(txt, braOpen, '[', ']');
    if(braClose !== -1) return {powIdx: caret-2, braOpen, braClose};
  }
  return null;
}

// ═══════════════════════════════════════════════
// SUBSCRIPT SYSTEM  _[]
// Format: base_[subscript]
// ═══════════════════════════════════════════════
function kpSub(){
  const s = '_[]';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  caret += 2; // inside [
  sync();
  hideWelcome();
}

function isAtSubStart(){
  if(caret >= 2 && txt[caret-1] === '[' && txt[caret-2] === '_'){
    const braOpen = caret - 1;
    const braClose = findMatchClose(txt, braOpen, '[', ']');
    if(braClose !== -1) return {subIdx: caret-2, braOpen, braClose};
  }
  return null;
}

function isInsideSub(){
  for(let i = caret - 1; i >= 0; i--){
    if(txt[i] === '_' && i + 1 < txt.length && txt[i+1] === '['){
      const braOpen = i + 1;
      const braClose = findMatchClose(txt, braOpen, '[', ']');
      if(braClose === -1) break;
      if(caret > braOpen && caret <= braClose) return {subIdx: i, braOpen, braClose};
      break;
    }
    if(/[+\-×÷*=∫∂√∑∏()\[\]]/.test(txt[i])) break;
  }
  return null;
}

// ═══════════════════════════════════════════════
// LIMIT SYSTEM  lim_[{var}→{val}][]
// Three regions: slot0={var}, slot1={val}, body=[]
// ═══════════════════════════════════════════════
function kpLim(){
  const s = 'lim_[{}→{}][]';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  // Place caret inside slot0 { } — after first {
  // lim_[{ = l(0)i(1)m(2)_(3)[(4){(5) → caret+6
  caret += 6;
  sync();
  hideWelcome();
}

// ═══════════════════════════════════════════════
// SUMMATION SYSTEM  ∑[n=start]^[end](expr)
// slot0 = [n=start]  slot1 = [end]  slot2 = (expr)
// ═══════════════════════════════════════════════
function kpSum(){
  const s = '∑[n=]^[]()';
  txt = txt.slice(0, caret) + s + txt.slice(caret);
  // ∑[n=|]^[]()  → after '=' at position +4
  caret += 4;
  sync();
  hideWelcome();
}

// Parse ∑[sub]^[sup](expr) — returns slot info or null
function getSumInfo(){
  for(let i=0; i<txt.length; i++){
    if(txt[i] !== '∑') continue;
    if(txt[i+1] !== '[') continue;
    const s0o = i+1;
    const s0c = findMatchClose(txt, s0o, '[', ']');
    if(s0c === -1) continue;
    if(txt[s0c+1] !== '^' || txt[s0c+2] !== '[') continue;
    const s1o = s0c+2;
    const s1c = findMatchClose(txt, s1o, '[', ']');
    if(s1c === -1) continue;
    if(txt[s1c+1] !== '(') continue;
    const s2o = s1c+1;
    const s2c = findMatchingClose(txt, s2o);
    if(s2c === -1) continue;
    const end = s2c+1;
    if(caret >= i && caret <= end){
      return {sumIdx:i, s0o, s0c, s1o, s1c, s2o, s2c, end};
    }
  }
  return null;
}

// Which slot is caret in? 0=sub  1=sup  2=expr  -1=outside
function sumSlot(info){
  if(!info) return -1;
  if(caret > info.s0o && caret <= info.s0c) return 0;
  if(caret > info.s1o && caret <= info.s1c) return 1;
  if(caret > info.s2o && caret <= info.s2c) return 2;
  return -1;
}

// Forbidden gaps inside ∑[sub]^[sup](expr):
//   gap A: between s0c (]) and s1o ([)  →  the ]^[ zone
//   gap B: between s1c (]) and s2o (()  →  the ]( zone
function sumForbiddenGap(info){
  if(!info) return null;
  if(caret > info.s0c && caret <= info.s1o) return 'A';
  if(caret > info.s1c && caret <= info.s2o) return 'B';
  return null;
}

// Parse lim_[{var}→{val}][] at or around caret
// Returns {limStart, limEnd, s0open, s0close, s1open, s1close, bodyOpen, bodyClose} or null
function getLimInfo(){
  const idx = txt.indexOf('lim_[');
  if(idx === -1) return null;
  const p = idx + 5; // after 'lim_['
  if(txt[p] !== '{') return null;
  // slot0: {...}
  const s0open = p;
  const s0close = findMatchClose(txt, s0open, '{', '}');
  if(s0close === -1) return null;
  // →
  if(txt[s0close+1] !== '→') return null;
  // slot1: {...}
  if(txt[s0close+2] !== '{') return null;
  const s1open = s0close + 2;
  const s1close = findMatchClose(txt, s1open, '{', '}');
  if(s1close === -1) return null;
  // closing ] of subscript part
  if(txt[s1close+1] !== ']') return null;
  // body: [...]
  if(txt[s1close+2] !== '[') return null;
  const bodyOpen = s1close + 2;
  const bodyClose = findMatchClose(txt, bodyOpen, '[', ']');
  if(bodyClose === -1) return null;
  return {
    limStart: idx,
    limEnd: bodyClose + 1, // after ']' of body
    s0open, s0close,
    s1open, s1close,
    bodyOpen, bodyClose
  };
}

// Which lim region is caret in? 0=var, 1=val, 2=body, -1=outside
function limCurrentSlot(info){
  if(!info) return -1;
  if(caret > info.s0open && caret <= info.s0close) return 0;
  if(caret > info.s1open && caret <= info.s1close) return 1;
  if(caret > info.bodyOpen && caret <= info.bodyClose) return 2;
  return -1;
}

// Is caret at start of a lim region?
function isAtLimSlotStart(){
  const info = getLimInfo();
  if(!info) return null;
  if(caret === info.s0open + 1) return {info, slot: 0};
  if(caret === info.s1open + 1) return {info, slot: 1};
  if(caret === info.bodyOpen + 1) return {info, slot: 2};
  return null;
}

// Insert new double integral ∫∫[]^[][]^[]()
function kpDoubleInt(){
  const s='∫∫[]^[][]^[]()';
  txt=txt.slice(0,caret)+s+txt.slice(caret);
  // Place caret inside slot0 [a], position after first '['
  // ∫∫[ = positions: ∫(0)∫(1)[(2) → caret=3
  caret=caret+3;
  dblCursorColorIdx=0;
  document.getElementById('mi').style.caretColor=DBL_CURSOR_COLORS[0];
  sync();hideWelcome();
}

function hideWelcome(){const w=document.getElementById('wlcEl');if(w)w.style.display='none';}

function bksp(){
  if(caret<=0) return;
  const prev=txt[caret-1];

  // ── New double integral backspace ──
  if(isDblInt()){
    const info=getDblIntInfo();
    if(info){
      const slot=dblCurrentSlot(info);
      const slots=[
        {open:info.s0o, close:info.s0c, inner_start:info.s0o+1, inner_end:info.s0c},
        {open:info.s1o, close:info.s1c, inner_start:info.s1o+1, inner_end:info.s1c},
        {open:info.s2o, close:info.s2c, inner_start:info.s2o+1, inner_end:info.s2c},
        {open:info.s3o, close:info.s3c, inner_start:info.s3o+1, inner_end:info.s3c},
        {open:info.s4o, close:info.s4c, inner_start:info.s4o+1, inner_end:info.s4c},
      ];
      if(slot>=0){
        if(caret<=slots[slot].inner_start){
          // At start of slot — jump to prev slot end or before ∫∫
          if(slot===0){
            // Check if all slots empty → delete entire ∫∫ structure
            const s0=txt.slice(info.s0o+1,info.s0c);
            const s1=txt.slice(info.s1o+1,info.s1c);
            const s2=txt.slice(info.s2o+1,info.s2c);
            const s3=txt.slice(info.s3o+1,info.s3c);
            const s4=txt.slice(info.s4o+1,info.s4c);
            if(!s0&&!s1&&!s2&&!s3&&!s4){
              txt=txt.slice(0,info.start)+txt.slice(info.end);
              caret=info.start;
              document.getElementById('mi').style.caretColor='var(--ng)';
              sync();return;
            }
            // Has content — just jump before ∫∫
            caret=info.start;
            cycleCursorColor();
            sync();return;
          } else {
            // Jump to end of prev slot
            caret=slots[slot-1].inner_end;
            cycleCursorColor();
            sync();return;
          }
        }
        // Normal delete inside slot
        txt=txt.slice(0,caret-1)+txt.slice(caret);
        caret--;
        sync();return;
      }
      // Caret right after closing ) of whole integral → enter slot4 and delete last char
      if(caret===info.end){
        const slot4end=slots[4].inner_end;
        if(slot4end > slots[4].inner_start){
          // delete last char of slot4
          txt=txt.slice(0,slot4end-1)+txt.slice(slot4end);
          caret=slot4end-1;
          cycleCursorColor();
          sync();return;
        } else {
          caret=slot4end;
          cycleCursorColor();
          sync();return;
        }
      }
    }
  }

  // ── DEFINITE INTEGRAL ∫[]^[]() BACKSPACE LOGIC ──
  // Handles: ∫[lo]^[hi](expr)
  // slot 0 = [lo], slot 1 = [hi], slot 2 = (expr)
  {
    const di = getDefIntInfo();
    if(di){
      const slot = defIntSlot(di);
      // ── SLOT 0: inside [lo] ──
      if(slot === 0){
        if(caret <= di.s0o + 1){
          // At start of lo — check if all slots empty → delete whole structure
          const s0 = txt.slice(di.s0o+1, di.s0c);
          const s1 = txt.slice(di.s1o+1, di.s1c);
          const s2 = txt.slice(di.s2o+1, di.s2c);
          if(!s0 && !s1 && !s2){
            txt = txt.slice(0, di.intIdx) + txt.slice(di.end);
            caret = di.intIdx;
          } else {
            caret = di.intIdx; // jump before ∫
          }
          sync(); return;
        }
        // Normal delete inside lo
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--;
        sync(); return;
      }
      // ── SLOT 1: inside [hi] ──
      if(slot === 1){
        if(caret <= di.s1o + 1){
          // At start of hi — jump to end of lo
          caret = di.s0c;
          sync(); return;
        }
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--;
        sync(); return;
      }
      // ── SLOT 2: inside (expr) ──
      if(slot === 2){
        if(caret <= di.s2o + 1){
          // At start of expr — jump to end of hi
          caret = di.s1c;
          sync(); return;
        }
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--;
        sync(); return;
      }
      // ── Caret right after closing ) of whole integral → enter expr end ──
      if(caret === di.end){
        caret = di.s2c;
        sync(); return;
      }
      // ── Caret in a forbidden gap (]^[ or ]() ) — move left to safe position ──
      const gap = defIntInForbiddenGap(di);
      if(gap === 'A'){
        // Between first ] and ^[ → jump to end of lo
        caret = di.s0c;
        sync(); return;
      }
      if(gap === 'B'){
        // Between second ] and ( → jump to end of hi
        caret = di.s1c;
        sync(); return;
      }
    }
  }

  // ── SUMMATION ∑[sub]^[sup](expr) BACKSPACE LOGIC ──
  {
    const si = getSumInfo();
    if(si){
      const slot = sumSlot(si);
      if(slot === 0){
        if(caret <= si.s0o + 1){
          // At very start of [sub] — delete whole ∑ structure
          txt = txt.slice(0, si.sumIdx) + txt.slice(si.end);
          caret = si.sumIdx;
          sync(); return;
        }
        // Check if we're right after '=' (the fixed prefix) with empty user content
        // s0 looks like 'n=<userContent>' — if userContent is empty, jump before ∑
        const eqPos = txt.indexOf('=', si.s0o);
        if(eqPos !== -1 && eqPos < si.s0c && caret === eqPos + 1){
          // Caret is right after '=' with nothing typed yet → delete whole ∑
          const s1 = txt.slice(si.s1o+1, si.s1c);
          const s2 = txt.slice(si.s2o+1, si.s2c);
          if(!s1 && !s2){
            txt = txt.slice(0, si.sumIdx) + txt.slice(si.end);
            caret = si.sumIdx;
          } else {
            caret = si.sumIdx;
          }
          sync(); return;
        }
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--; sync(); return;
      }
      if(slot === 1){
        if(caret <= si.s1o + 1){ caret = si.s0c; sync(); return; }
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--; sync(); return;
      }
      if(slot === 2){
        if(caret <= si.s2o + 1){ caret = si.s1c; sync(); return; }
        txt = txt.slice(0, caret-1) + txt.slice(caret);
        caret--; sync(); return;
      }
      if(caret === si.end){ caret = si.s2c; sync(); return; }
      const gap = sumForbiddenGap(si);
      if(gap === 'A'){ caret = si.s0c; sync(); return; }
      if(gap === 'B'){ caret = si.s1c; sync(); return; }
    }
  }

  // ── POWER ^[] BACKSPACE LOGIC ──
  {
    // Case 1: caret is at very start of ^[...] — txt[caret-1]==='[', txt[caret-2]==='^'
    const ps = isAtPowStart();
    if(ps){
      // Delete entire ^[...] regardless of content
      txt = txt.slice(0, ps.powIdx) + txt.slice(ps.braClose + 1);
      caret = ps.powIdx;
      sync(); return;
    }
    // Case 2: caret is inside ^[...] but not at start — normal char delete
    const pi = isInsidePow();
    if(pi){
      txt = txt.slice(0, caret-1) + txt.slice(caret);
      caret--;
      sync(); return;
    }
    // Case 3: caret right after ']' of ^[...] — step into exponent end
    if(caret > 0 && txt[caret-1] === ']'){
      let dp2 = 1, k = caret - 2;
      while(k >= 0 && dp2 > 0){ if(txt[k]===']') dp2++; else if(txt[k]==='[') dp2--; k--; }
      const brO = k + 1;
      if(brO > 0 && txt[brO-1] === '^'){
        caret = caret - 1;
        sync(); return;
      }
    }
  }

  // ── LIM lim_[{var}→{val}][] BACKSPACE LOGIC — lim is one atomic unit ──
  {
    const limInfo = getLimInfo();
    if(limInfo){
      const slot = limCurrentSlot(limInfo);
      // Caret right after limEnd → enter body end
      if(caret === limInfo.limEnd){ caret = limInfo.bodyClose; sync(); return; }
      // Inside body [] — at start: jump to end of slot1; else normal delete
      if(slot === 2){

// ═══════════════════════════════════════════════
// NORM — converts raw input to math.js expression
// Uses char-by-char parser for √ to handle nested parens
// ═══════════════════════════════════════════════
function normSqrts(s) {
  // Convert all √[n](...) to sqrt(...) or nthRoot(...,n)
  // handles nested parens/fractions inside radicand
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '√' && s[i+1] === '[') {
      const degOpen = i + 1;
      const degClose = findBracketClose(s, degOpen, '[', ']');
      if (degClose !== -1 && s[degClose+1] === '(') {
        const radOpen = degClose + 1;
        const radClose = findBracketClose(s, radOpen, '(', ')');
        if (radClose !== -1) {
          const degRaw = s.slice(degOpen+1, degClose).trim();
          const radContent = s.slice(radOpen+1, radClose);
          // Recursively normalise radicand (may have nested sqrt, fractions, powers)
          const innerNorm = normSqrts(normFracs(normPowerBrackets(radContent)));
          if (degRaw === '' || degRaw === '2') {
            result += `sqrt(${innerNorm})`;
          } else {
            // Normalise degree (may be fraction like (1+1)/(1), or expression like 3)
            const degNorm = normFracs(normSqrts(degRaw));
            // Use exponent form: radicand^(1/degree) — works for ANY degree expression
            result += `((${innerNorm})^(1/(${degNorm})))`;
          }
          i = radClose + 1;
          continue;
        }
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// Convert (a)/(b) fractions in norm string
function normFracs(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '(') {
      const numClose = findBracketClose(s, i, '(', ')');
      if (numClose !== -1 && s[numClose+1] === '/' && s[numClose+2] === '(') {
        const denOpen = numClose + 2;
        const denClose = findBracketClose(s, denOpen, '(', ')');
        if (denClose !== -1) {
          const numContent = normFracs(s.slice(i+1, numClose));
          const denContent = normFracs(s.slice(denOpen+1, denClose));
          result += `((${numContent})/(${denContent}))`;
          i = denClose + 1;
          continue;
        }
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

// Convert ^[...] → ^(...) for math.js, with nested bracket support
// Skips ^[...] that are integral upper bounds (preceded by ])
function normPowerBrackets(s) {
  let result = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '^' && i + 1 < s.length && s[i+1] === '[') {
      // Skip integral upper bounds (preceded by ])
      const prevChar = i > 0 ? s[i-1] : '';
      if (prevChar === ']') { result += s[i]; i++; continue; }
      const braOpen = i + 1;
      const braClose = findBracketClose(s, braOpen, '[', ']');
      if (braClose !== -1) {
        let inner = s.slice(braOpen + 1, braClose);
        // Recursively convert nested ^[...] inside the exponent
        inner = normPowerBrackets(inner);
        result += inner ? `^(${inner})` : '';
        i = braClose + 1;
        continue;
      }
    }
    result += s[i];
    i++;
  }
  return result;
}

function norm(s){
  // Convert lim_[{var}→{val}][body] for math.js
  s = s.replace(/lim_\[{([^}]*)}→{([^}]*)}\]\[([^\]]*)\]/g, (m, v, a, body) => `limit(${body || 'f(x)'}, ${v || 'x'}, ${a || '0'})`);
  // Convert _[...] subscript brackets
  s = s.replace(/\_\[([^\]]*)\]/g, (m, sub) => sub ? `_${sub}` : '');
  // Convert ^[...] power brackets to standard ^(...) using nested-bracket-aware parser
  s = normPowerBrackets(s);
  // Basic symbol replacements
  s=s.replace(/×/g,'*').replace(/÷/g,'/').replace(/═/g,'=')
    .replace(/π/g,'pi').replace(/θ/g,'theta')
    .replace(/∞/g,'Infinity');
  // Convert √[n](...) with nested content support
  s=normSqrts(s);
  // Legacy sqrt formats
  s=s.replace(/√\(([^)]+)\)/g,'sqrt($1)').replace(/√(\d+\.?\d*)/g,'sqrt($1)');
  // Derivatives
  s=s.replace(/∂\(([^)]+)\)/g,'diff($1,x)');
  // Convert (a)/(b) fractions to proper math.js form
  s=normFracs(s);
  // summation ∑[n=a]^[b](expr) → summation(expr,n,a,b)
  s=s.replace(/∑\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,(m,sub,sup,expr)=>{
    const eqIdx=sub.indexOf('=');
    const varN=eqIdx!==-1?sub.slice(0,eqIdx).trim():'n';
    const startV=eqIdx!==-1?sub.slice(eqIdx+1).trim():(sub.trim()||'1');
    return `summation(${expr||varN},${varN},${startV},${sup.trim()||'10'})`;
  });
  // double integral new format ∫∫[a]^[b][c]^[d](expr)
  s=s.replace(/∫∫\[([^\]]*)\]\^\[([^\]]*)\]\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,'dblintegral($5,$1,$2,$3,$4)');
  // double integral old format
  s=s.replace(/∬\s*([^\s^()]+)\s*\^\s*([^\s^()]+)\s+([^\s^()]+)\s*\^\s*([^\s^()]+)\s*\(([^)]+)\)/g,'dblintegral($5,$1,$2,$3,$4)');
  // contour integral ∮[lo]^[hi](expr) → contourintegral(expr,lo,hi)
  s=s.replace(/∮\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,'contourintegral($3,$1,$2)');
  s=s.replace(/∮\(([^)]+)\)/g,'(contourintegral($1,0,1))');
  // definite integral
  s=s.replace(/[∫∬]\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/g,'defintegral($3,$1,$2)');
  // indefinite
  s=s.replace(/∫\(([^)]+)\)/g,'(integrate($1,x))');
  return s;
}

// ═══════════════════════════════════════════════
// FRACTION NAVIGATION — universal jump rule
// ANY (num)/(den) fraction: caret must never sit
// between the closing ) of num and opening ( of den.
// Finds the innermost fraction containing caret at boundary,
// returns {numOpen,numClose,slashIdx,denOpen,denClose} or null.
// ═══════════════════════════════════════════════
function getFracNavInfo() {
  // Scan entire txt for ALL (...)/(...)  patterns and find one
  // whose boundary zone contains caret:
  //   boundary RIGHT: caret === numClose+1  (just after num closing ')' and before '/')
  //   boundary SLASH: caret === slashIdx+1  (just after '/')
  //   boundary LEFT:  caret === denOpen     (at the '(' of den)  — same as denOpen+0
  // We also include: caret is inside numerator at its very end (caret===numClose)
  // and caret is at very start of denominator (caret===denOpen+1).
  let i = 0;
  while (i < txt.length) {
    if (txt[i] === '(') {
      const numOpen = i;
      const numClose = findMatchClose(txt, numOpen, '(', ')');
      if (numClose !== -1 && txt[numClose+1] === '/') {
        const slashIdx = numClose + 1;
        if (slashIdx+1 < txt.length && txt[slashIdx+1] === '(') {
          const denOpen = slashIdx + 1;
          const denClose = findMatchClose(txt, denOpen, '(', ')');
          if (denClose !== -1) {
            // Check if caret is in the NO-MAN'S LAND between the two parens
            // i.e.  numClose < caret <= denOpen  (the ')/('' zone)
            if (caret > numClose && caret <= denOpen) {
              return { numOpen, numClose, slashIdx, denOpen, denClose };
            }
            // Also: caret exactly at numClose (end of numerator content) —
            // nudge right should jump to denOpen+1
            // And: caret exactly at denOpen+1 (very start of denominator) —
            // nudge left should jump to numClose
            // These are handled separately in mv(); skip here.
            i = numClose + 1; // advance past this fraction
            continue;
          }
        }
      }
    }
    i++;
  }
  return null;
}

function getFracAtCaret() {
  // Walk left to find a '/' that is part of a fraction pattern (...)/(...)
  // We need to find the fraction whose denominator contains caret
  let i = caret - 1;
  while (i >= 0) {
    if (txt[i] === '/') {
      // Check right side: must be '(' after '/'
      const denOpen = i + 1;
      if (denOpen < txt.length && txt[denOpen] === '(') {
        const denClose = findMatchClose(txt, denOpen, '(', ')');
        if (denClose !== -1 && caret > denOpen && caret <= denClose) {
          // caret is inside denominator — find numerator
          const numClose = i - 1;
          if (numClose >= 0 && txt[numClose] === ')') {
            let dp = 1, j = numClose - 1;
            while (j >= 0 && dp > 0) {
              if (txt[j] === ')') dp++;
              else if (txt[j] === '(') dp--;
              j--;
            }
            const numOpen = j + 1;
            return { slashIdx: i, numOpen, numClose, denOpen, denClose };
          }
        }
      }
    }
    i--;
  }
  return null;
}

// Find the outermost fraction group that ends at or before caret
// e.g. for "(5)/((5))/()" caret after last ) → returns the whole chain info
function getFracChainEndingAt(pos) {
  // Find a ')' just before pos (allowing caret to be right after it)
  let end = pos - 1;
  if (end < 0 || txt[end] !== ')') return null;
  // Find matching open
  let dp = 1, j = end - 1;
  while (j >= 0 && dp > 0) {
    if (txt[j] === ')') dp++;
    else if (txt[j] === '(') dp--;
    j--;
  }
  if (dp !== 0) return null;
  const grpOpen = j + 1;
  const grpClose = end;

  // Check if it's a denominator: preceded by '/'
  if (grpOpen === 0 || txt[grpOpen - 1] !== '/') return null;
  const slashIdx = grpOpen - 1;
  // Find numerator before slash
  if (slashIdx === 0 || txt[slashIdx - 1] !== ')') return null;
  let dp2 = 1, k = slashIdx - 2;
  while (k >= 0 && dp2 > 0) {
    if (txt[k] === ')') dp2++;
    else if (txt[k] === '(') dp2--;
    k--;
  }
  if (dp2 !== 0) return null;
  const numOpen = k + 1;
  const numClose = slashIdx - 1;
  return { slashIdx, numOpen, numClose, denOpen: grpOpen, denClose: grpClose };
}

      const radClose = findMatchingClose(txt, radOpen);
      if(radClose !== -1 && caret > radOpen && caret <= radClose){
        // Insert ()/() fraction inside radicand
        let tokenStart = caret, depth = 0, i = caret - 1;
        const innerStart = radOpen + 1;
        while(i >= innerStart){
          const c = txt[i];
          if(c === ')' || c === ']'){ depth++; i--; continue; }
          if(c === '(' || c === '['){
            if(depth > 0){ depth--; i--; continue; }
            else { tokenStart = i; break; }
          }
          if(depth === 0 && /[+\-×÷*]/.test(c)){ tokenStart = i + 1; break; }
          tokenStart = i; i--;
        }
        const numerator = txt.slice(tokenStart, caret);
        if(!numerator.trim()){
          txt = txt.slice(0, caret) + '()/()' + txt.slice(caret);
          caret += 1; sync(); return;
        }
        const frac = `(${numerator})/()`;
        txt = txt.slice(0, tokenStart) + frac + txt.slice(caret);
        caret = tokenStart + frac.length - 1;
