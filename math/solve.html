        sync(); return;
      }
    }
  }

  // ── POWER ^[] CASE: caret is inside a ^[...] exponent ──
  {
    const pi = isInsidePow();
    if(pi){
      // Grab token left of caret inside the exponent as numerator
      let tokenStart = caret;
      let depth = 0;
      let i = caret - 1;
      const innerStart = pi.braOpen + 1;
      while(i >= innerStart){
        const c = txt[i];
        if(c === ')' || c === ']'){ depth++; i--; continue; }
        if(c === '(' || c === '['){
          if(depth > 0){ depth--; i--; continue; }
          else { tokenStart = i; break; }
        }
        if(depth === 0 && /[+\-×÷*]/.test(c)){ tokenStart = i + 1; break; }
        tokenStart = i;
        i--;
      }
      const numerator = txt.slice(tokenStart, caret);
      if(!numerator.trim()){
        // Empty numerator → insert ()/() with caret in numerator
        txt = txt.slice(0, caret) + '()/()'  + txt.slice(caret);
        caret += 1; // inside numerator (
        sync(); return;
      }
      // Wrap existing token as numerator
      const before = txt.slice(0, tokenStart);
      const after  = txt.slice(caret);
      const frac = `(${numerator})/()`;
      txt = before + frac + after;
      // Place caret inside denominator ()
      caret = tokenStart + frac.length - 1;
      sync(); return;
    }
  }

  // ── LIM CASE A: caret inside lim body [] ──
  // e.g. lim_[{x}→{0}][5x↑]  → lim_[{x}→{0}][(5x)/()]
  {
    const limInfo = getLimInfo();
    if(limInfo && caret > limInfo.bodyOpen && caret <= limInfo.bodyClose){
      let tokenStart = caret;
      let depth = 0;
      let i = caret - 1;
      const bodyInnerStart = limInfo.bodyOpen + 1;
      while(i >= bodyInnerStart){
        const c = txt[i];
        if(c === ')' || c === '}' || c === ']'){ depth++; i--; continue; }
        if(c === '(' || c === '{' || c === '['){
          if(depth > 0){ depth--; i--; continue; }
          else { tokenStart = i; break; }
        }
        if(depth === 0 && /[+\-×÷*]/.test(c)){ tokenStart = i + 1; break; }
        tokenStart = i;
        i--;
      }
      const numerator = txt.slice(tokenStart, caret);
      if(!numerator.trim()){
        const s = '()/()';
        txt = txt.slice(0, caret) + s + txt.slice(caret);
        caret += 4;
        sync(); return;
      }
      const before = txt.slice(0, tokenStart);
      const after  = txt.slice(caret);
      const frac = `(${numerator})/()`;
      txt = before + frac + after;
      caret = tokenStart + frac.length - 1;
      sync(); return;
    }
  }

  // ── LIM CASE B: caret right after lim_[{x}→{0}][...] → wrap entire lim as numerator ──
  {
    const limInfo = getLimInfo();
    if(limInfo && caret === limInfo.limEnd){
      const limStr = txt.slice(limInfo.limStart, limInfo.limEnd);
      const before = txt.slice(0, limInfo.limStart);
      const after  = txt.slice(limInfo.limEnd);
      const frac = `(${limStr})/()`;
      txt = before + frac + after;
      caret = limInfo.limStart + frac.length - 1;
      sync(); return;
    }
  }

  // ── CASE 1: Caret is inside a denominator → chain division
  // e.g.  (5)|(5) → caret after last ')' of denom
  // Check if we're right after a complete fraction  (...)/(...)
  const chainFrac = getFracChainEndingAt(caret);
  if (chainFrac !== null) {
    // We are right after (num)/(den)  → wrap denom in extra parens and add new denom
    // (A)/(B)  →  (A)/((B))/()
    const { denOpen, denClose } = chainFrac;
    // Insert '(' before denOpen and ')' after denClose, then append /()
    const before = txt.slice(0, denOpen);
    const denContent = txt.slice(denOpen, denClose + 1); // includes parens: (B)
    const after = txt.slice(denClose + 1);
    // wrap: (B) → ((B))
    txt = before + '(' + denContent + ')' + '/' + '()' + after;
    // caret goes inside new denominator
    caret = denOpen + denContent.length + 4; // after '(' + denContent + ')' + '/' + '('
    sync();
    return;
  }

  // ── CASE 2: Nothing before caret, or pure empty
  if (caret === 0 || txt.trim() === '') {
    const s = '()/()';
    txt = txt.slice(0, caret) + s + txt.slice(caret);
    caret += 4; // inside denominator
    sync();
    return;
  }

  // ── CASE 3: There is content before caret — check if last char ends an expression
  // Find the last "token" before caret to wrap as numerator
  // Look for last operator (+, -, *, ×, ÷) that is NOT inside parens
  let tokenStart = caret;
  let depth = 0;
  let i = caret - 1;
  while (i >= 0) {
    const c = txt[i];
    if (c === ')') { depth++; i--; continue; }
    if (c === '(') {
      if (depth > 0) { depth--; i--; continue; }
      else { tokenStart = i; break; }
    }
    if (depth === 0 && /[+\-×÷*]/.test(c)) {
      // operator at depth 0 — token starts after this
      tokenStart = i + 1;
      break;
    }
    tokenStart = i;
    i--;
  }

  const numerator = txt.slice(tokenStart, caret);

  if (!numerator.trim()) {
    // Nothing meaningful — insert empty fraction
    const s = '()/()';
    txt = txt.slice(0, caret) + s + txt.slice(caret);
    caret += 4;
    sync();
    return;
  }

  // Wrap numerator and add empty denominator
  const before = txt.slice(0, tokenStart);
  const after  = txt.slice(caret);
  const frac   = `(${numerator})/()`;
  txt = before + frac + after;
  // Place caret inside denominator ()  →  after '(' of denom
  caret = tokenStart + frac.length - 1;
  sync();
}

// ── Number formatting ─────────────────────────────────────────────
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function toNiceFrac(x){
  if(!isFinite(x)||Math.abs(x)>9999) return null;
  const neg=x<0;x=Math.abs(x);
  for(let d=1;d<=200;d++){
    const n=Math.round(x*d);
    if(Math.abs(n/d-x)<1e-9&&n!==0&&d!==1){const g=gcd(n,d);return `${neg?'-':''}\\frac{${n/g}}{${d/g}}`;}
  }
  return null;
}
function fmtN(v){
  if(typeof v!=='number') return String(v);
  if(!isFinite(v)) return v>0?'\\infty':'-\\infty';
  if(Math.abs(v)<1e-11&&v!==0) return '0';
  if(Number.isInteger(v)) return String(v);
  const f=toNiceFrac(v);if(f) return f;
  const r=Math.round(v*1e10)/1e10;
  return String(r);
}

// ── math.js node → clean LaTeX ───────────────────────────────────
function n2l(node){try{return node.toTex({parenthesis:'auto'});}catch(e){return node.toString();}}

// ── Detect variables in expression ──────────────────────────────
function getVars(s){
  const reserved=new Set(['sin','cos','tan','cot','sec','csc','log','ln','exp','sqrt','pi','e','i','Infinity','theta','alpha','beta','gamma','abs','floor','ceil','round','sign','diff','integrate','derivative']);
  return [...new Set((s.match(/[a-zA-Z_][a-zA-Z0-9_]*/g)||[]).filter(m=>!reserved.has(m)))];
}

// ═══════════════════════════════════════════════
// DETECT PROBLEM TYPE
// ═══════════════════════════════════════════════
function detectType(raw){
  const s=raw.trim();
  if(/∫∫/.test(s))  return 'dblintegral';
  if(/∮/.test(s))   return 'contourintegral';

  // ── If integral exists but is wrapped in a fraction (∫...)/n → treat as fraction ──
  if(/∫/.test(s)){
    // Check if the form is (∫(...))/something  — the integral is in the numerator
    const fracWrap = s.match(/^\(([^)]*∫[^)]*(?:\([^)]*\))?[^)]*)\)\/(.+)$/);
    if(fracWrap) return 'fraction';
    // More general: (∫[...](...))/n  or (∫(...))/n
    if(/^\(∫/.test(s) && /\)\//.test(s)) return 'fraction';
    return /∫\[/.test(s)?'defintegral':'integral';
  }

  if(/∑/.test(s))   return 'summation';
  if(/∂/.test(s)||/\bd\/dx\b/.test(s)) return 'derivative';
  if(/^lim_\[/.test(s)) return 'limit';
  if(/√/.test(s)&&!/[=]/.test(s)) return 'sqrt';
  if(/=/.test(s)) return 'equation';
  // Fraction: contains (...)/(...)  or pure a/b with no variables → fraction solver
  if(isFractionExpr(s)) return 'fraction';
  return 'evaluate';
}

// Check if the expression is primarily a fraction/division problem
function isFractionExpr(s) {
  // Allow (∫...)/n — integral wrapped as numerator of a fraction
  if (/^\(∫/.test(s.trim()) && /\)\//.test(s)) return true;
  // Exclude bare integrals, derivatives
  if (/[∫∂∬]/.test(s)) return false;
  // Check if there's a / that is NOT inside a ^[...] exponent
  // Build a version of s with ^[...] content blanked out
  let blanked = '';
  let i = 0;
  while (i < s.length) {
    if (s[i] === '^' && i + 1 < s.length && s[i+1] === '[') {
      const braClose = findBracketClose(s, i + 1, '[', ']');
      if (braClose !== -1) {
        // Replace entire ^[...] with harmless placeholder
        blanked += 'X'.repeat(braClose - i + 1);
        i = braClose + 1;
        continue;
      }
    }
    blanked += s[i];
    i++;
  }
  const n = norm(blanked);
  if (!n.includes('/')) return false;
  return true;
}

// ─── Fraction helpers ─────────────────────────────────────────────────

// Parse a fraction string like "(a)/(b)" or "a/b" into {num, den} raw strings
function parseFractionParts(raw) {
  const s = raw.trim();
  // Try (num)/(den) format
  if (s[0] === '(') {
    const numClose = findBracketClose(s, 0, '(', ')');
    if (numClose !== -1 && s[numClose+1] === '/') {
      const denStart = numClose + 2;
      if (s[denStart] === '(') {
        const denClose = findBracketClose(s, denStart, '(', ')');
        if (denClose !== -1) {
          return {
            num: s.slice(1, numClose).trim(),
            den: s.slice(denStart+1, denClose).trim(),
            rest: s.slice(denClose+1).trim()
          };
        }
      } else {
        // (num)/den — den is everything after /
        return { num: s.slice(1, numClose).trim(), den: s.slice(denStart).trim(), rest:'' };
      }
    }
  }
  // Plain a/b
  const slashIdx = s.indexOf('/');
  if (slashIdx !== -1) {
    return { num: s.slice(0, slashIdx).trim(), den: s.slice(slashIdx+1).trim(), rest:'' };
  }
  return null;
}

// GCD for BigInt-style large integers
function gcdInt(a, b) { a=Math.abs(a); b=Math.abs(b); while(b){const t=b;b=a%b;a=t;} return a; }

// Convert decimal to fraction string p/q  (returns null if not exact)
function decToFrac(x, maxDen=10000) {
  if (!isFinite(x)) return null;
  const neg = x < 0; x = Math.abs(x);
  const whole = Math.floor(x);
  const frac = x - whole;
  if (frac < 1e-12) return { n: neg?-whole:whole, d:1 };
  for (let d=1; d<=maxDen; d++) {
    const n = Math.round(frac * d);
    if (Math.abs(n/d - frac) < 1e-9) {
      const g = gcdInt(n, d);
      const totalN = whole*d + n;
      const totalG = gcdInt(totalN, d);
      return { n: (neg?-1:1)*(totalN/totalG), d: d/totalG };
    }
  }
  return null;
}

function fracToLatex(n, d) {
  if (d === 1) return String(n);
  const neg = n < 0; n = Math.abs(n);
  return (neg?'-':'') + `\\dfrac{${n}}{${d}}`;
}

// ── Factorize integer n into prime factors ───────────────────────────
function primeFactors(n) {
  const factors = {};
  n = Math.abs(n);
  for (let p=2; p*p<=n; p++) {
    while (n%p===0) { factors[p]=(factors[p]||0)+1; n/=p; }
  }
  if (n>1) factors[n]=(factors[n]||0)+1;
  return factors;
}

function factorsToLatex(n) {
  if (Math.abs(n) <= 1) return String(n);
  const neg = n < 0;
  const f = primeFactors(Math.abs(n));
  const parts = Object.entries(f).map(([p,e]) => e===1 ? p : `${p}^{${e}}`);
  return (neg?'-':'') + parts.join(' \\times ');
}

// ═══════════════════════════════════════════════
// SOLVE: FRACTION / DIVISION
// ═══════════════════════════════════════════════
function solveFraction(raw) {
  const steps = [];
  const scope = {pi:Math.PI, e:Math.E};
  const nrmFull = norm(raw);
  const latexFull = rawToLatex(raw);

  // ── Evaluate the full expression first ───────────────────────────
  let fullVal = null;
  try { fullVal = math.evaluate(nrmFull, scope); } catch(e) {}

  // ── Check if it contains variables ───────────────────────────────
  const vars = getVars(nrmFull);
  const hasVars = vars.length > 0;

  if (hasVars) {
    // ── ALGEBRAIC FRACTION — simplify & factor ────────────────────
    steps.push({ lbl:'التعبير', expr: latexFull });

    try {
      // Simplify
      const node = math.parse(nrmFull);
      const simp = math.simplify(node);
      const simpTex = n2l(simp);
      if (simpTex !== latexFull) {
        steps.push({ lbl:'تبسيط', expr: simpTex });
      }

      // Try to express as single fraction
      try {
        const rational = math.rationalize(node, {}, true);
        const numNode = rational.args ? rational.args[0] : null;
        const denNode = rational.args ? rational.args[1] : null;
        if (numNode && denNode) {
          const numTex = n2l(numNode), denTex = n2l(denNode);
          steps.push({ lbl:'صورة الكسر', expr:`\\dfrac{${numTex}}{${denTex}}` });
          // Simplify numerator & denominator separately
          try {
            const numSimp = n2l(math.simplify(numNode));
            const denSimp = n2l(math.simplify(denNode));
            if (numSimp !== numTex || denSimp !== denTex) {
              steps.push({ lbl:'تبسيط البسط والمقام', expr:`\\dfrac{${numSimp}}{${denSimp}}` });
            }
          } catch(e) {}
        }
      } catch(e) {
        // rationalize failed — just show simplify result
      }

      steps.push({ lbl:'النتيجة', expr: simpTex, isResult:true });
    } catch(e) {
      steps.push({ lbl:'النتيجة', expr: latexFull, isResult:true });
    }
    return { steps, type:'fraction' };
  }

  // ── NUMERIC FRACTION ─────────────────────────────────────────────
  // Parse numerator and denominator
  const parts = parseFractionParts(raw);

  if (!parts) {
    // Fallback: just evaluate
    steps.push({ lbl:'التعبير', expr: latexFull });
    if (fullVal !== null && isFinite(fullVal)) {
      steps.push({ lbl:'النتيجة', expr: formatNiceResult(fullVal), isResult:true });
    }
    return { steps, type:'fraction' };
  }

  const { num: numR, den: denR } = parts;
  const numN = norm(numR), denN = norm(denR);
  const numL = rawToLatex(numR) || numR;
  const denL = rawToLatex(denR) || denR;

  // ── معالجة خاصة: البسط تكامل غير محدود  (∫expr)/n ─────────────────
  // مثال: (∫(5))/(5) → ∫5 dx = 5x → 5x/5 = x + C
  if (/∫/.test(numR) && !/\[/.test(numR)) {
    const intMatch = numR.match(/^∫\((.+)\)$/) || numR.match(/^∫(.+)$/);
    if (intMatch) {
      const integrand    = intMatch[1].trim();
      const integrandLtx = rawToLatex(integrand);
      const integrandNrm = norm(integrand);
      let denValInt = null;
      try { denValInt = math.evaluate(denN, scope); } catch(e) {}

      steps.push({ lbl:'التعبير', expr:`\\dfrac{\\int ${integrandLtx}\\,dx}{${denL}}` });

      // حساب التكامل الرمزي مباشرة
      const tempSteps = [];
      const antiderivTex = buildAntiderivSteps(integrandNrm, integrandLtx, 'x', tempSteps);

      if (antiderivTex) {
        steps.push({ lbl:'حساب التكامل', expr:`\\int ${integrandLtx}\\,dx = ${antiderivTex} + C` });

        if (denValInt !== null && denValInt !== 0 && denValInt !== 1) {
          // تبسيط رمزي: antideriv / den
          steps.push({ lbl:'تعويض', expr:`\\dfrac{${antiderivTex}}{${fmtN(denValInt)}} + C` });
          try {
            // تحويل LaTeX → math.js للتبسيط
            const antiNrm = antiderivTex
              .replace(/\\dfrac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
              .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '($1)/($2)')
              .replace(/\\/g,'').replace(/\{/g,'(').replace(/\}/g,')');
            const simpNode = math.simplify(math.parse(`(${antiNrm})/(${denValInt})`));
            const simpTex  = n2l(simpNode);
            steps.push({ lbl:'تبسيط', expr:`${simpTex} + C` });
            steps.push({ lbl:'النتيجة', expr:`F(x) = ${simpTex} + C`, isResult:true });
          } catch(e) {
            steps.push({ lbl:'النتيجة', expr:`F(x) = \\dfrac{${antiderivTex}}{${fmtN(denValInt)}} + C`, isResult:true });
          }
        } else {
          // المقام = 1 أو فشل تقييمه
          steps.push({ lbl:'النتيجة', expr:`F(x) = ${antiderivTex} + C`, isResult:true });
        }
      } else {
        // فشل التكامل الرمزي — نتيجة رمزية
        steps.push({ lbl:'النتيجة', expr:`\\dfrac{\\int ${integrandLtx}\\,dx}{${denL}} + C`, isResult:true });
      }
      return { steps, type:'fraction' };
    }
  }

  let numVal = null, denVal = null;
  try { numVal = math.evaluate(numN, scope); } catch(e) {}
  try { denVal = math.evaluate(denN, scope); } catch(e) {}

  // ── STEP 1: عرض المسألة ─────────────────────────────────────────
  steps.push({ lbl:'القسمة', expr:`\\dfrac{${numL}}{${denL}}` });

  // ── STEP 2: تبسيط البسط والمقام ─────────────────────────────────
  let numSimp = numVal, denSimp = denVal;
  try {
    const ns = math.simplify(math.parse(numN)); numSimp = math.evaluate(ns.toString(), scope);
    const ns2 = n2l(ns);
    const ds = math.simplify(math.parse(denN)); denSimp = math.evaluate(ds.toString(), scope);
    const ds2 = n2l(ds);
    if (ns2 !== numL || ds2 !== denL) {
      steps.push({ lbl:'تبسيط', expr:`\\dfrac{${ns2}}{${ds2}}` });
    }
  } catch(e) {}

  if (numVal === null || denVal === null) {
    steps.push({ lbl:'النتيجة', expr: latexFull, isResult:true });
    return { steps, type:'fraction' };
  }

  if (denVal === 0) {
    steps.push({ lbl:'خطأ', expr:`\\text{القسمة على صفر غير معرّفة}`, isResult:true });
    return { steps, type:'fraction' };
  }

  // ── STEP 3: هل البسط والمقام أعداد صحيحة؟ ───────────────────────
  const numIsInt = Number.isInteger(numVal) || Math.abs(numVal - Math.round(numVal)) < 1e-10;
  const denIsInt = Number.isInteger(denVal) || Math.abs(denVal - Math.round(denVal)) < 1e-10;

  if (numIsInt && denIsInt) {
    const N = Math.round(numVal), D = Math.round(denVal);
    const g = gcdInt(Math.abs(N), Math.abs(D));

    // ── قسمة تامة ────────────────────────────────────────────────────
    if (N % D === 0) {
      // إذا كان البسط == المقام (مثل 2/2, 3/3) → قسمة تامة مباشرة
      // إذا كان البسط أكبر (مثل 6/3) → اعرض القسمة التامة
      steps.push({ lbl:'قسمة تامة', expr:`${N} \\div ${D} = ${N/D}`, note:'÷ تام' });
      steps.push({ lbl:'النتيجة', expr:`${N/D}`, isResult:true });

    } else {
      // ── قسمة غير تامة: نحتاج تبسيط ─────────────────────────────
      const rN = N/g, rD = D/g;
      const whole = Math.trunc(rN/rD);
      const rem = Math.abs(rN) % Math.abs(rD);
      const sign = (N<0) !== (D<0) ? -1 : 1;

      // العوامل الأولية + GCD — فقط إذا g > 1
      if (g > 1 && Math.abs(N) <= 9999 && Math.abs(D) <= 9999) {
        const nFact = factorsToLatex(N);
        const dFact = factorsToLatex(D);
        if (nFact !== String(N) || dFact !== String(D)) {
          steps.push({ lbl:'تحليل إلى عوامل أولية', expr:`\\dfrac{${nFact}}{${dFact}}` });
        }
        steps.push({ lbl:'القاسم المشترك الأكبر', expr:`\\gcd(${Math.abs(N)},\\,${Math.abs(D)}) = ${g}` });
        steps.push({ lbl:'تبسيط', expr:`\\dfrac{${N} \\div ${g}}{${D} \\div ${g}} = \\dfrac{${rN}}{${rD}}` });
      }

      // الكسر المبسّط
      steps.push({ lbl:'الكسر بأبسط صورة', expr: fracToLatex(sign*Math.abs(rN), Math.abs(rD)) });

      // العدد المختلط إن وجد
      if (Math.abs(rN) > Math.abs(rD) && rem !== 0) {
        const absWhole = Math.abs(whole);
        const signStr = sign < 0 ? '-' : '';
        steps.push({
          lbl:'عدد مختلط',
          expr: `${signStr}${absWhole} \\dfrac{${rem}}{${Math.abs(rD)}}`,
          note:'mixed number'
        });
      }

      // القيمة العشرية
      const decVal = N / D;
      const decStr = (Math.round(decVal*1e10)/1e10).toString();
      if (!Number.isInteger(decVal)) {
        steps.push({ lbl:'القيمة العشرية', expr: decStr, note:'decimal' });
      }

      steps.push({
        lbl:'النتيجة',
        expr: fracToLatex(sign*Math.abs(rN), Math.abs(rD)),
        isResult:true
      });
    }

  } else {
    // ── كسور عشرية ────────────────────────────────────────────────────
    const result = numVal / denVal;

    // عرض البسط والمقام المبسطين كأعداد عشرية أو كسور
    const numFrac = decToFrac(numVal);
    const denFrac = decToFrac(denVal);
    const numLatexSimp = numFrac ? fracToLatex(numFrac.n, numFrac.d) : fmtN(numVal);
    const denLatexSimp = denFrac ? fracToLatex(denFrac.n, denFrac.d) : fmtN(denVal);

    // خطوة: تبسيط البسط والمقام إلى كسور بسيطة
    steps.push({ lbl:'تبسيط البسط والمقام', expr: `\\dfrac{${numLatexSimp}}{${denLatexSimp}}` });

    // محاولة تحويل النتيجة لكسر بسيط
    const frac = decToFrac(result);
    if (frac && frac.d !== 1) {
      const g2 = gcdInt(Math.abs(frac.n), frac.d);
      const simpN = frac.n/g2, simpD = frac.d/g2;
      steps.push({ lbl:'الكسر المبسط', expr: fracToLatex(simpN, simpD) });
      // القيمة العشرية
      const decStr = (Math.round(result * 1e10) / 1e10).toString();
      if (!Number.isInteger(result)) {
        steps.push({ lbl:'القيمة العشرية', expr: decStr, note:'decimal' });
      }
      steps.push({ lbl:'النتيجة', expr: fracToLatex(simpN, simpD), isResult:true });
    } else {
      const resTex = formatNiceResult(result);
      steps.push({ lbl:'النتيجة', expr: resTex, isResult:true });
    }
  }

  return { steps, type:'fraction' };
}

// ═══════════════════════════════════════════════
// SOLVE: EVALUATE
// ═══════════════════════════════════════════════
function solveEval(raw){
  const steps=[];
  const latex=rawToLatex(raw);
  steps.push({lbl:'Expression',expr:latex});
  const nrm=norm(raw);

  // ── Tower-of-powers detection: a^[b^[c]] or deeper ──────────────────
  // If raw matches base^[exp^[...]] show step-by-step evaluation from inside out
  {
    const towerMatch = raw.match(/^(.+?)\^\[(.+)\]$/);
    if (towerMatch) {
      const baseRaw = towerMatch[1].trim();
      const expRaw  = towerMatch[2].trim();
      // Check if exponent itself contains a power
      const innerPow = expRaw.match(/^(.+?)\^\[(.+)\]$/);
      if (innerPow) {
        try {
          // Step 1: compute inner exponent first
          const innerBase = innerPow[1].trim();
          const innerExp  = innerPow[2].trim();
          const innerBaseVal = math.evaluate(norm(innerBase), {pi:Math.PI, e:Math.E});
          const innerExpVal  = math.evaluate(norm(innerExp),  {pi:Math.PI, e:Math.E});
          const innerResult  = Math.pow(innerBaseVal, innerExpVal);

          const innerBaseTex = rawToLatex(innerBase);
          const innerExpTex  = rawToLatex(innerExp);
          const baseTex      = rawToLatex(baseRaw);

          steps.push({lbl:'الخطوة الداخلية', expr:`${innerBaseTex}^{${innerExpTex}} = ${fmtN(innerResult)}`});

          // Step 2: substitute inner result into outer
          steps.push({lbl:'تعويض', expr:`${baseTex}^{${fmtN(innerResult)}}`});

          // Step 3: compute final result (may be huge)
          const finalLog10 = innerResult * Math.log10(math.evaluate(norm(baseRaw), {pi:Math.PI, e:Math.E}));
          if (finalLog10 > 15) {
            // Too large for exact — show logarithm form
            steps.push({lbl:'القيمة كبيرة جداً', expr:`\\approx 10^{${fmtN(Math.round(finalLog10))}}`, note:`${Math.round(finalLog10)} digits`});
            steps.push({lbl:'النتيجة', expr:`${baseTex}^{${fmtN(innerResult)}} \\approx 10^{${fmtN(Math.round(finalLog10))}}`, isResult:true});
          } else {
            const finalVal = Math.pow(math.evaluate(norm(baseRaw), {pi:Math.PI, e:Math.E}), innerResult);
            steps.push({lbl:'النتيجة', expr:`${baseTex}^{${fmtN(innerResult)}} = ${fmtN(finalVal)}`, isResult:true});
          }
          return {steps, type:'evaluate'};
        } catch(e) {}
      }
    }
  }

  // ── Power expansion: (expr)^[n] or base^[n] ─────────────────────────
  // Detect numeric base and integer exponent → show step-by-step multiplication
  {
    // Match patterns: (content)^[exp]  OR  base^[exp]
    const powMatch = raw.match(/^(.*?)\^\[(\d+)\]$/) || raw.match(/^\((.+)\)\^\[(\d+)\]$/);
    if (powMatch) {
      // Determine base raw and exponent
      let baseRaw = '', expN = 0;
      const m1 = raw.match(/^\((.+)\)\^\[(\d+)\]$/);
      const m2 = raw.match(/^(.+)\^\[(\d+)\]$/);
      if (m1) { baseRaw = m1[1].trim(); expN = parseInt(m1[2]); }
      else if (m2) { baseRaw = m2[1].trim(); expN = parseInt(m2[2]); }

      if (baseRaw && expN >= 2 && expN <= 20) {
        try {
          const baseVal = math.evaluate(norm(baseRaw), {pi:Math.PI, e:Math.E});
          const baseTex = rawToLatex(baseRaw);

          if (typeof baseVal === 'number' && isFinite(baseVal)) {
            // Step: evaluate base if it's an expression (not a plain number)
            const isPlainBase = /^-?[\d.]+$/.test(baseRaw.trim());
            const isParenBase = m1 !== null; // wrapped in parens like (3+2)
            if (!isPlainBase) {
              steps.push({lbl:'القاعدة', expr:`${isParenBase ? '(' + baseTex + ')' : baseTex} = ${fmtN(baseVal)}`});
              // Show substitution
              steps.push({lbl:'تعويض', expr:`${fmtN(baseVal)}^{${expN}}`});
            }

            // Step: multiplication chain (only if expN <= 8 and result not too big)
            const finalVal = Math.pow(baseVal, expN);
            if (expN <= 8 && Math.abs(finalVal) <= 1e15 && Number.isInteger(Math.round(baseVal))) {
              const bv = Math.round(baseVal);
              let chain = `${bv}`;
              let running = bv;
              const chainParts = [`${bv}`];
              for (let k = 1; k < expN; k++) {
                running *= bv;
                chainParts.push(`${bv}`);
              }
              // Show: b × b × b ... = result
              const multStr = chainParts.join(' \\times ');
              steps.push({lbl:'ضرب متكرر', expr:`${multStr} = ${fmtN(finalVal)}`});
            } else if (expN > 8 || Math.abs(finalVal) > 1e15) {
              // For large exponents, show logarithmic scale
              const log10val = expN * Math.log10(Math.abs(baseVal));
              if (log10val > 15) {
                steps.push({lbl:'القيمة التقريبية', expr:`\\approx 10^{${fmtN(Math.round(log10val * 10) / 10)}}`});
              }
            }
          }
        } catch(e) {}
      }
    }
  }

  try{
    // Simplify symbolically
    let simpTex=latex;
    try{
      const node=math.parse(nrm);
      const simp=math.simplify(node);
      simpTex=n2l(simp);
      if(simpTex!==latex) steps.push({lbl:'Simplified',expr:simpTex});
    }catch(e){}
    // Numeric evaluate
    const val=math.evaluate(nrm);
    if(typeof val==='number'&&isFinite(val)){
      const piMultiple=val/Math.PI;
      const isPiMult=Math.abs(Math.round(piMultiple*12)-piMultiple*12)<1e-9&&Math.round(piMultiple*12)!==0;
      let resultTex;
      if(isPiMult){
        const n=Math.round(piMultiple*12),d=12;const g=gcd(Math.abs(n),d);const rn=n/g,rd=d/g;
        resultTex=rd===1?`${rn}\\pi`:`\\frac{${rn}\\pi}{${rd}}`;
      } else {
        resultTex=fmtN(val);
      }
      if (simpTex === resultTex) {
  steps.push({ lbl: 'Result', expr: `${resultTex}`, isResult: true });
} else {
  steps.push({ lbl: 'Result', expr: `${simpTex} = ${resultTex}`, isResult: true });
}
    } else if(val&&val.toTex){
      steps.push({lbl:'Result',expr:val.toTex(),isResult:true});
    } else {
      steps.push({lbl:'Result',expr:simpTex,isResult:true});
    }
  }catch(e){
    // Try just simplify
    try{
      const simp=math.simplify(math.parse(nrm));
      steps.push({lbl:'Result',expr:n2l(simp),isResult:true});
    }catch(e2){
      steps.push({lbl:'Error',expr:`\\text{${esc(e.message)}}`,isResult:true});
    }
  }
  return {steps,type:'evaluate'};
}

// ═══════════════════════════════════════════════
// SOLVE: EQUATION
// ═══════════════════════════════════════════════
function solveEq(raw){
  const steps=[];
  const eqI=raw.indexOf('=');
  if(eqI<1) return null;
  const lhsR=raw.slice(0,eqI).trim(), rhsR=raw.slice(eqI+1).trim();
  const lhsN=norm(lhsR), rhsN=norm(rhsR);

  steps.push({lbl:'Equation',expr:`${rawToLatex(lhsR)} = ${rawToLatex(rhsR)}`});

  const vars=getVars(lhsN+' '+rhsN);
  const v=vars[0]||'x';

  // Combine: lhs - rhs = 0
  const combined=`(${lhsN})-(${rhsN})`;
  steps.push({lbl:'Rearrange',expr:`${rawToLatex(lhsR)} - \\left(${rawToLatex(rhsR)}\\right) = 0`});

  // ── Polynomial analysis via derivatives ──────────────────────
  try{
    const node=math.parse(combined);
    const simp=math.simplify(node);
    const simpStr=simp.toString();

    // Degree detection
    let degree=0;
    try{
      for(let d=1;d<=6;d++){
        let nd=simp;for(let i=0;i<d;i++)nd=math.derivative(nd,v);
        const val=math.evaluate(nd.toString().replace(new RegExp(`\\b${v}\\b`,'g'),'1'));
        if(Math.abs(val)<1e-9){degree=d-1;break;}else{degree=d;}
      }
    }catch(e){degree=2;}

    // ── LINEAR ──
    if(degree<=1){
      const dNode=math.derivative(simp,v);
      const a=math.evaluate(dNode.toString(),{[v]:0,pi:Math.PI,e:Math.E});
      const b=math.evaluate(simpStr,{[v]:0,pi:Math.PI,e:Math.E});
      const x=-b/a;
      steps.push({lbl:'Linear',expr:`${fmtN(a)}${v} + ${fmtN(b)} = 0`,note:'collect'});
      steps.push({lbl:'Solve',expr:`${v} = \\frac{${fmtN(-b)}}{${fmtN(a)}}`});
      steps.push({lbl:'Result',expr:`${v} = ${fmtN(x)}`,isResult:true});
      return {steps,type:'equation'};
    }

    // ── QUADRATIC ──
    if(degree===2){
      const d2=math.derivative(math.derivative(simp,v),v);
      const twoA=math.evaluate(d2.toString(),{[v]:0,pi:Math.PI,e:Math.E});
      const a=twoA/2;
      const d1=math.derivative(simp,v);
      const b=math.evaluate(d1.toString(),{[v]:0,pi:Math.PI,e:Math.E})-twoA*0;
      const c=math.evaluate(simpStr,{[v]:0,pi:Math.PI,e:Math.E});
      const D=b*b-4*a*c;
      steps.push({lbl:'Quadratic',expr:`${fmtN(a)}${v}^{2} ${b>=0?'+':''} ${fmtN(b)}${v} ${c>=0?'+':''} ${fmtN(c)} = 0`});
      steps.push({lbl:'Discriminant',expr:`\\Delta = (${fmtN(b)})^{2} - 4 \\cdot ${fmtN(a)} \\cdot ${fmtN(c)} = ${fmtN(D)}`});
      steps.push({lbl:'Formula',expr:`${v} = \\dfrac{-b \\pm \\sqrt{\\Delta}}{2a}`});
      if(D<0){
        const re=-b/(2*a),im=Math.sqrt(-D)/(2*a);
        steps.push({lbl:'Complex roots',expr:`${v} = ${fmtN(re)} \\pm ${fmtN(im)}i`,isResult:true});
      } else if(Math.abs(D)<1e-10){
        const x=-b/(2*a);
        steps.push({lbl:'Verify',expr:`${v} = \\frac{${fmtN(-b)}}{${fmtN(2*a)}} = ${fmtN(x)}`});
        steps.push({lbl:'Result',expr:`${v} = ${fmtN(x)}`,isResult:true});
      } else {
        const x1=(-b+Math.sqrt(D))/(2*a), x2=(-b-Math.sqrt(D))/(2*a);
        steps.push({lbl:'Verify',expr:`${v}_{1}=\\frac{${fmtN(-b)}+\\sqrt{${fmtN(D)}}}{${fmtN(2*a)}} = ${fmtN(x1)}, \\quad ${v}_{2} = ${fmtN(x2)}`});
        steps.push({lbl:'Result',expr:`${v}_{1} = ${fmtN(x1)}, \\quad ${v}_{2} = ${fmtN(x2)}`,isResult:true});
      }
      return {steps,type:'equation'};
    }

    // ── HIGHER DEGREE: numeric root finding ──
    steps.push({lbl:'Method',expr:`\\text{Degree-${degree} polynomial — numerical solver}`});
    const roots=findRootsNumerical(combined,v);
    if(roots.length>0){
      const sol=roots.map((r,i)=>roots.length>1?`${v}_{${i+1}} \\approx ${fmtN(r)}`:`${v} \\approx ${fmtN(r)}`).join(',\\; ');
      steps.push({lbl:'Result',expr:sol,isResult:true});
    } else {
      steps.push({lbl:'Result',expr:'\\text{No real roots found in }[-1000,1000]',isResult:true});
    }
    return {steps,type:'equation'};
  }catch(e){}

  // ── Fallback pure numeric ──
  steps.push({lbl:'Method',expr:'\\text{Numerical root-finding}'});
  const roots=findRootsNumerical(combined,v);
  if(roots.length>0){
    const sol=roots.map((r,i)=>roots.length>1?`${v}_{${i+1}} \\approx ${fmtN(r)}`:`${v} \\approx ${fmtN(r)}`).join(',\\; ');
    steps.push({lbl:'Result',expr:sol,isResult:true});
  } else {
    steps.push({lbl:'Result',expr:'\\text{No solution found}',isResult:true});
  }
  return {steps,type:'equation'};
}

function findRootsNumerical(expr,v){
  const fn=x=>{try{const s={[v]:x,pi:Math.PI,e:Math.E};return math.evaluate(expr,s);}catch(e){return NaN;}};
  const roots=[];
  const lo=-1000,hi=1000,step=0.05;
  for(let i=lo;i<hi;i+=step){
    const fa=fn(i),fb=fn(i+step);
    if(!isFinite(fa)||!isFinite(fb)) continue;
    if(fa*fb<0||Math.abs(fa)<1e-10){
      let la=i,lb=i+step;
      for(let k=0;k<80;k++){const m=(la+lb)/2;if(Math.abs(lb-la)<1e-12)break;fn(m)*fn(la)<=0?lb=m:la=m;}
      const root=(la+lb)/2;
      if(!roots.some(r=>Math.abs(r-root)<1e-5)){
        roots.push(Math.round(root*1e10)/1e10);
        if(roots.length>=6) break;
      }
    }
  }
  return roots;
}

// ═══════════════════════════════════════════════
// SOLVE: SQRT
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// SOLVE: SQRT — handles fractions, products, sums inside/outside
// ═══════════════════════════════════════════════
function solveSqrt(raw){
  const steps=[];

  // ── Parse ALL √[n](...) from the full expression ──
  // The full raw expression may be: √[](expr) * something  OR  √[](expr) + √[](expr2)  etc.
  // We treat the WHOLE raw as one math expression, solve it numerically/symbolically.

  const fullLatex = rawToLatex(raw);
  const fullNorm  = norm(raw);

  steps.push({lbl:'Expression', expr: fullLatex});

  // ── Try to evaluate the full expression numerically ──
  let numVal = null;
  try {
    const v = math.evaluate(fullNorm, {pi:Math.PI, e:Math.E});
    if (typeof v === 'number' && isFinite(v)) numVal = v;
  } catch(e) {}

  // ── Find the primary √ to show detailed steps for it ──
  // Parse first √[n](...) in raw
  let sqrtIdx = raw.indexOf('√');
  let degree = 2, radicand = '', sqrtRaw = '', degStr = '';

  if (sqrtIdx !== -1 && raw[sqrtIdx+1] === '[') {
    const degOpen = sqrtIdx + 1;
    const degClose = findBracketClose(raw, degOpen, '[', ']');
    if (degClose !== -1 && raw[degClose+1] === '(') {
      const radOpen = degClose + 1;
      const radClose = findBracketClose(raw, radOpen, '(', ')');
      if (radClose !== -1) {
        degStr = raw.slice(degOpen+1, degClose).trim();
        // Evaluate degree expression — supports arithmetic like 1+1, (2)/(3), etc.
        let degree = 2;
        if (degStr !== '' && degStr !== '2') {
          try {
            const degNorm = norm(degStr);
            const degVal = math.evaluate(degNorm, {pi:Math.PI, e:Math.E});
            if (typeof degVal === 'number' && isFinite(degVal) && degVal !== 0) {
              degree = degVal;
            }
          } catch(e) {
            degree = parseFloat(degStr) || 2;
          }
        }
        radicand = raw.slice(radOpen+1, radClose);
        sqrtRaw = raw.slice(sqrtIdx, radClose+1);
      }
    }
  }

  // ── Show step-by-step for the radicand ──
  if (radicand !== '') {
    const radLatex = rawToLatex(radicand);
    const radNorm  = norm(radicand);
    // Use the LaTeX of the original degree expression (not the numeric value)
    const degLatex = degStr && degStr !== '' && degStr !== '2'
      ? rawToLatex(degStr) : null;
    const sqrtLatex = (degree===2 || !degLatex)
      ? `\\sqrt{${radLatex}}`
      : `\\sqrt[${degLatex}]{${radLatex}}`;

    // Evaluate radicand
    let radVal = null;
    try {
      const rv = math.evaluate(radNorm, {pi:Math.PI, e:Math.E});
      if (typeof rv === 'number' && isFinite(rv)) radVal = rv;
    } catch(e) {}

    if (radVal !== null) {
      // Show radicand evaluation ONLY if it's a non-trivial expression
      const radNormTrimmed = radNorm.trim();
      const isPlainNumber = /^-?[\d.]+$/.test(radNormTrimmed);
      if (!isPlainNumber) {
        steps.push({lbl:'Radicand', expr: `${radLatex} = ${fmtN(radVal)}`});
      }

      // Negative under even root
      if (radVal < 0 && degree % 2 === 0) {
        steps.push({lbl:'Complex', expr:`\\sqrt{${fmtN(radVal)}} = ${fmtN(Math.sqrt(-radVal))}i`, note:'imaginary'});
        if (numVal === null) {
          steps.push({lbl:'Result', expr:`${fmtN(Math.sqrt(-radVal))}i`, isResult:true});
          return {steps, type:'sqrt'};
        }
      } else {
        const rootVal = degree===2
          ? Math.sqrt(radVal)
          : Math.pow(Math.abs(radVal), 1/degree) * (radVal<0 ? -1 : 1);
        const isPerfect = Math.abs(rootVal - Math.round(rootVal)) < 1e-10;

        const rootSymbol = degree===2
          ? `\\sqrt{${fmtN(radVal)}}`
          : `\\sqrt[${degree}]{${fmtN(radVal)}}`;

        steps.push({lbl:'Compute root', expr:`${rootSymbol} ${isPerfect?'=':'\\approx'} ${fmtN(rootVal)}`});

        // ── Substitution step: if full expression is √.../den, show rootVal/den ──
        // e.g. (√[](49))/(7) → norm: (sqrt(49))/(7) → show 7/7
        {
          // Match both: sqrt(...)/.+ and (sqrt(...))/(...)
          const fnStr = fullNorm.trim();
          const fracRe = /^\(?sqrt\([^)]+\)\)?\s*\/\s*\(?(.+?)\)?$/;
          const fm = fnStr.match(fracRe);
          if (fm && isPerfect) {
            // Clean denominator: remove wrapping parens if any
            let denRaw = fm[1].replace(/^\((.+)\)$/, '$1').trim();
            try {
              const denVal2 = math.evaluate(denRaw, {pi:Math.PI, e:Math.E});
              if (typeof denVal2 === 'number' && isFinite(denVal2) && denVal2 !== 0) {
                steps.push({lbl:'تعويض', expr:`\\dfrac{${fmtN(rootVal)}}{${fmtN(denVal2)}}`});
              }
            } catch(e) {}
          }
        }

        // Perfect square factoring for √
        if (degree===2 && !isPerfect && radVal > 0 && Number.isInteger(radVal)) {
          let bestFactor = 1;
          for (let i=2; i*i<=radVal; i++) { if (radVal%(i*i)===0) bestFactor=i; }
          if (bestFactor > 1) {
            const rem = radVal/(bestFactor*bestFactor);
            steps.push({lbl:'Simplify', expr:`\\sqrt{${bestFactor*bestFactor}\\cdot${rem}} = ${bestFactor}\\sqrt{${rem}}`, note:'تحليل مربع كامل'});
          }
        }

        // Fractional exponent for nth root
        if (degree !== 2) {
          steps.push({lbl:'As exponent', expr:`(${fmtN(radVal)})^{\\frac{1}{${degree}}} = ${fmtN(rootVal)}`});
        }
      }
    } else {
      // Radicand is symbolic (contains variables) — just show it, no extra step needed
    }
  }

  // ── If there's more to the expression (suffix after √), show it ──
  const afterSqrt = sqrtRaw ? raw.slice(raw.indexOf(sqrtRaw) + sqrtRaw.length).trim() : '';
  if (afterSqrt) {
    const afterLatex = rawToLatex(afterSqrt);
    const afterNorm  = norm(afterSqrt);
    let afterVal = null;
    try {
      const av = math.evaluate(afterNorm, {pi:Math.PI, e:Math.E});
      if (typeof av === 'number' && isFinite(av)) afterVal = av;
    } catch(e) {}

    if (afterVal !== null) {
      // Show what operation is happening
      steps.push({lbl:'Full expression', expr:`${fullLatex}`});
    }
  }

  // ── Final numeric result ──
  if (numVal !== null) {
    // Check if result is a nice π multiple
    const piMult = numVal / Math.PI;
    const isPiMult = Math.abs(Math.round(piMult*12) - piMult*12) < 1e-9 && Math.round(piMult*12) !== 0;
    let resultTex;
    if (isPiMult) {
      const n=Math.round(piMult*12), d=12, g=gcd(Math.abs(n),d);
      const rn=n/g, rd=d/g;
      resultTex = rd===1 ? `${rn}\\pi` : `\\dfrac{${rn}\\pi}{${rd}}`;
    } else {
      resultTex = fmtN(numVal);
    }
    steps.push({lbl:'Result', expr:`${fullLatex} = ${resultTex}`, isResult:true});

  } else {
    // Try symbolic simplification
    try {
      const node = math.parse(fullNorm);
      const simp = math.simplify(node);
      const simpTex = n2l(simp);
      steps.push({lbl:'Result', expr: simpTex, isResult:true});
    } catch(e) {
      steps.push({lbl:'Result', expr: fullLatex, isResult:true});
    }
  }

  return {steps, type:'sqrt'};
}

// ═══════════════════════════════════════════════
// SOLVE: DERIVATIVE
// ═══════════════════════════════════════════════
function solveDeriv(raw){
  const steps=[];
  let expr='';
  const m1=raw.match(/∂\(([^)]+)\)/);
  const m2=raw.match(/d\/dx\s*\(([^)]+)\)/i);
  const m3=raw.match(/d\/dx\s+(.+)/i);
  if(m1) expr=m1[1];
  else if(m2) expr=m2[1];
  else if(m3) expr=m3[1];
  else expr=raw.replace(/[∂]/g,'').trim();

  const exprN=norm(expr);
  steps.push({lbl:'Expression',expr:`\\frac{d}{dx}\\left(${rawToLatex(expr)}\\right)`});

  try{
    const node=math.parse(exprN);
    // Show simplified form
    try{const s=math.simplify(node);const sl=n2l(s);if(sl!==rawToLatex(expr))steps.push({lbl:'Simplify',expr:sl});}catch(e){}
    // Compute derivative
    const deriv=math.derivative(node,'x');
    const derivTex=n2l(deriv);
    steps.push({lbl:'Differentiate',expr:`\\frac{d}{dx}\\left(${rawToLatex(expr)}\\right) = ${derivTex}`});
    // Simplify result
    try{
      const sd=math.simplify(deriv);
      const sdTex=n2l(sd);
      if(sdTex!==derivTex) steps.push({lbl:'Simplify',expr:sdTex});
      steps.push({lbl:'Result',expr:sdTex,isResult:true});
    }catch(e){
      steps.push({lbl:'Result',expr:derivTex,isResult:true});
    }
  }catch(e){
    steps.push({lbl:'Error',expr:`\\text{Cannot differentiate: ${esc(String(e.message).slice(0,60))}}`,isResult:true});
  }
  return {steps,type:'derivative'};
}

// ═══════════════════════════════════════════════════════════════════════
//  ██  SYMBOLIC INTEGRATION ENGINE v2  ██
//  Full support for: polynomials, trig, exp, ln, products, chains, fracs
// ═══════════════════════════════════════════════════════════════════════

// ── Helper: format coefficient ──────────────────────────────────────
function fmtCoef(c, varPart) {
  if (c === 1)  return varPart;
  if (c === -1) return `-${varPart}`;
  return `${fmtN(c)}${varPart}`;
}

// ── Check if a math.js node is independent of variable v ────────────
function isIndepOf(node, v) {
  const s = node.toString();
  return !new RegExp(`\\b${v}\\b`).test(s);
}

// ── Symbolic integration of a math.js node w.r.t. variable v ────────
// Returns {tex, note} or null if unsupported
function symbolicIntegrate(node, v) {
  const ts = node.toString().trim();

  // ── 0. Constant ──────────────────────────────────────────────────
  if (isIndepOf(node, v)) {
    const cTex = n2l(node);
    return { tex: `${cTex} ${v}`, note: `\\int c\\,d${v} = c${v}` };
  }

  // ── 1. Pure variable: ∫v dv ──────────────────────────────────────
  if (ts === v) {
    return { tex: `\\dfrac{${v}^{2}}{2}`, note: `\\int ${v}\\,d${v}=\\tfrac{${v}^2}{2}` };
  }

  // ── 2. Additive terms: split and integrate each ──────────────────
  if (node.type === 'OperatorNode' && (node.op === '+' || node.op === '-') && node.args.length === 2) {
    const L = symbolicIntegrate(node.args[0], v);
    const R = symbolicIntegrate(node.args[1], v);
    if (L && R) {
      const sep = node.op === '+' ? ' + ' : ' - ';
      return { tex: `${L.tex}${sep}${R.tex}`, note: 'linearity' };
    }
  }

  // ── 3. Negation: -(expr) ─────────────────────────────────────────
  if (node.type === 'OperatorNode' && node.op === '-' && node.args.length === 1) {
    const inner = symbolicIntegrate(node.args[0], v);
    if (inner) return { tex: `-(${inner.tex})`, note: inner.note };
  }

  // ── 4. Scalar multiple: c * f(v) ────────────────────────────────
  if (node.type === 'OperatorNode' && node.op === '*' && node.args.length === 2) {
    const [A, B] = node.args;
    // c * f  or  f * c
    const [scalar, fNode] = isIndepOf(A, v) ? [A, B] : isIndepOf(B, v) ? [B, A] : [null, null];
    if (scalar && fNode) {
      const inner = symbolicIntegrate(fNode, v);
      if (inner) {
        let cTex;
        try { cTex = fmtN(math.evaluate(scalar.toString(), {pi:Math.PI,e:Math.E})); }
        catch(e) { cTex = n2l(scalar); }
        const cNum = parseFloat(cTex);
        if (cNum === 1)  return { tex: inner.tex, note: inner.note };
        if (cNum === -1) return { tex: `-(${inner.tex})`, note: inner.note };
        return { tex: `${cTex} \\cdot \\left(${inner.tex}\\right)`, note: inner.note };
      }
    }

    // product of two functions of v — try integration by parts or chain patterns below
  }

  // ── 5. Power: v^n ────────────────────────────────────────────────
  if (node.type === 'OperatorNode' && node.op === '^') {
    const [base, exp] = node.args;
    // v^n  (base is v, exp is constant)
    if (base.type === 'SymbolNode' && base.name === v && isIndepOf(exp, v)) {
      try {
        const n = math.evaluate(exp.toString(), {pi:Math.PI,e:Math.E});
        if (n === -1) return { tex: `\\ln|${v}|`, note: `\\int ${v}^{-1}d${v}=\\ln|${v}|` };
        const n1 = n + 1;
        return { tex: `\\dfrac{${v}^{${fmtN(n1)}}}{${fmtN(n1)}}`, note: `\\int ${v}^{${fmtN(n)}}d${v}=\\tfrac{${v}^{${fmtN(n1)}}}{${fmtN(n1)}}` };
      } catch(e) {}
    }
    // e^v or e^(c*v)
    if (base.type === 'SymbolNode' && base.name === 'e') {
      const innerI = tryLinearChain(exp, v, tex => `e^{${tex}}`, tex => `e^{${tex}}`);
      if (innerI) return innerI;
    }
    // a^(c*v): ∫a^(kv)dv = a^(kv)/(k ln a)
    if (isIndepOf(base, v)) {
      const expI = tryLinearChain(exp, v,
        tex => `${n2l(base)}^{${tex}}`,
        tex => `\\dfrac{${n2l(base)}^{${tex}}}{\\ln ${n2l(base)}}`
      );
      if (expI) return expI;
    }
  }

  // ── 6. FunctionNode: trig, exp, ln, etc. ─────────────────────────
  if (node.type === 'FunctionNode') {
    const fn = node.fn.name || node.fn.toString();
    const arg = node.args[0];
    const argTs = arg.toString().trim();

    // ── sin(u), cos(u), tan(u) with linear u = a*v + b ──
    const linRes = getLinear(arg, v); // returns {a, b} if arg = a*v + b

    if (fn === 'sin' && linRes) {
      const {a, b} = linRes;
      const uTex = makeLinearTex(a, b, v);
      if (a === 1) return { tex: `-\\cos(${uTex})`, note: `\\int\\sin(${v})d${v}=-\\cos(${v})` };
      return { tex: `\\dfrac{-\\cos(${uTex})}{${fmtN(a)}}`, note: `\\int\\sin(au)du=-\\cos(u)/a` };
    }
    if (fn === 'cos' && linRes) {
      const {a, b} = linRes;
      const uTex = makeLinearTex(a, b, v);
      if (a === 1) return { tex: `\\sin(${uTex})`, note: `\\int\\cos(${v})d${v}=\\sin(${v})` };
      return { tex: `\\dfrac{\\sin(${uTex})}{${fmtN(a)}}`, note: `\\int\\cos(au)du=\\sin(u)/a` };
    }
    if (fn === 'tan' && linRes) {
      const {a, b} = linRes;
      const uTex = makeLinearTex(a, b, v);
      if (a === 1) return { tex: `-\\ln|\\cos(${uTex})|`, note: `\\int\\tan(u)du=-\\ln|\\cos|` };
      return { tex: `\\dfrac{-\\ln|\\cos(${uTex})|}{${fmtN(a)}}`, note: `\\int\\tan(au)du` };
    }
    // ∫sec²(u) = tan(u)/a
    if ((fn === 'sec' || fn === 'sec2') && linRes) {
      // handled below via ^2
    }
    // ∫csc²(u) = -cot(u)/a
    if (fn === 'cot' && linRes) {
      const {a, b} = linRes;
      const uTex = makeLinearTex(a, b, v);
      return { tex: `\\dfrac{\\ln|\\sin(${uTex})|}{${fmtN(a)}}`, note: `\\int\\cot(u)du=\\ln|\\sin|/a` };
    }
    // ∫exp(u) = exp(u)/a
    if (fn === 'exp' && linRes) {
      const {a, b} = linRes;
      const uTex = makeLinearTex(a, b, v);
      if (a === 1) return { tex: `e^{${uTex}}`, note: `\\int e^{${v}}d${v}=e^{${v}}` };
      return { tex: `\\dfrac{e^{${uTex}}}{${fmtN(a)}}`, note: `\\int e^{au}du=e^{au}/a` };
    }
    // ∫ln(v) = v*ln(v) - v
    if (fn === 'log' || fn === 'ln') {
      if (argTs === v) {
        return { tex: `${v}\\ln(${v}) - ${v}`, note: `\\int\\ln(${v})d${v}=${v}\\ln(${v})-${v}` };
      }
      if (linRes) {
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        return { tex: `\\dfrac{${uTex}\\ln(${uTex})-${uTex}}{${fmtN(a)}}`, note: `\\int\\ln(au+b)du` };
      }
    }
    // ∫sqrt(v) = ∫v^(1/2)
    if (fn === 'sqrt') {
      if (argTs === v) {
        return { tex: `\\dfrac{2}{3}${v}^{\\frac{3}{2}}`, note: `\\int\\sqrt{${v}}d${v}=\\tfrac{2}{3}${v}^{3/2}` };
      }
      if (linRes) {
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        return { tex: `\\dfrac{2}{3${fmtN(a)}}(${uTex})^{\\frac{3}{2}}`, note: `\\int\\sqrt{au+b}du` };
      }
    }
    // ∫1/v = ln|v|  (as function node asin, etc.)
    if (fn === 'asin' && argTs === v) return { tex: `${v}\\arcsin(${v})+\\sqrt{1-${v}^2}`, note:`\\int\\arcsin` };
    if (fn === 'acos' && argTs === v) return { tex: `${v}\\arccos(${v})-\\sqrt{1-${v}^2}`, note:`\\int\\arccos` };
    if (fn === 'atan' && argTs === v) return { tex: `${v}\\arctan(${v})-\\dfrac{\\ln(1+${v}^2)}{2}`, note:`\\int\\arctan` };
  }

  // ── 7. v^n * trig/exp (operator power times function) ─────────────
  // ∫x*sin(x), ∫x*cos(x), ∫x*exp(x) etc. — integration by parts
  if (node.type === 'OperatorNode' && node.op === '*' && node.args.length === 2) {
    const [A, B] = node.args;
    // Try ∫x * sin(x) and ∫x * cos(x) and ∫x * exp(x)
    const polyFn = (A.type === 'SymbolNode' && A.name === v) ? A : null;
    const fnNode = polyFn ? B : (B.type === 'SymbolNode' && B.name === v ? A : null);
    if (polyFn && fnNode && fnNode.type === 'FunctionNode') {
      const fn = fnNode.fn.name || fnNode.fn.toString();
      const arg = fnNode.args[0];
      if (arg.toString().trim() === v) {
        if (fn === 'sin') return { tex: `\\sin(${v}) - ${v}\\cos(${v})`, note: 'IBP: ∫x·sin x' };
        if (fn === 'cos') return { tex: `\\cos(${v}) + ${v}\\sin(${v})`, note: 'IBP: ∫x·cos x' };
        if (fn === 'exp') return { tex: `e^{${v}}(${v}-1)`, note: 'IBP: ∫x·eˣ' };
        if (fn === 'ln' || fn === 'log') return { tex: `\\dfrac{${v}^2}{2}\\ln(${v})-\\dfrac{${v}^2}{4}`, note: 'IBP: ∫x·ln x' };
      }
    }

    // ∫c/v = c*ln|v|  (division as multiplication by 1/v)
    // Handled via ^-1 pattern
  }

  // ── 8. Fraction: (a)/(b*v+c) → a/b * ln|b*v+c| ──────────────────
  if (node.type === 'OperatorNode' && node.op === '/') {
    const [num, den] = node.args;
    if (isIndepOf(num, v)) {
      const linDen = getLinear(den, v);
      if (linDen) {
        const {a, b} = linDen;
        const uTex = makeLinearTex(a, b, v);
        let cTex;
        try { cTex = fmtN(math.evaluate(num.toString(), {pi:Math.PI,e:Math.E})); }
        catch(e) { cTex = n2l(num); }
        const ratio = a === 1 ? cTex : `\\dfrac{${cTex}}{${fmtN(a)}}`;
        return { tex: `${ratio}\\ln|${uTex}|`, note: `\\int c/(a${v}+b)du=c/a·ln|u|` };
      }
      // 1/v^n
      if (den.type === 'OperatorNode' && den.op === '^') {
        const [dBase, dExp] = den.args;
        if (dBase.type === 'SymbolNode' && dBase.name === v && isIndepOf(dExp, v)) {
          try {
            const n = math.evaluate(dExp.toString(), {pi:Math.PI,e:Math.E});
            if (n === 1) {
              let cTex; try { cTex = fmtN(math.evaluate(num.toString(),{pi:Math.PI,e:Math.E})); } catch(e){cTex=n2l(num);}
              return { tex: `${cTex}\\ln|${v}|`, note:`\\int c/${v}d${v}` };
            }
            const n1 = 1 - n; // integrate v^(-n) → v^(1-n)/(1-n)
            let cTex; try { cTex = fmtN(math.evaluate(num.toString(),{pi:Math.PI,e:Math.E})); } catch(e){cTex=n2l(num);}
            return { tex: `${cTex}\\cdot\\dfrac{${v}^{${fmtN(n1)}}}{${fmtN(n1)}}`, note:`\\int c/${v}^{${fmtN(n)}}d${v}` };
          } catch(e) {}
        }
      }
    }
  }

  // ── 9. sec²(v) = tan(v) ──────────────────────────────────────────
  if (node.type === 'OperatorNode' && node.op === '^') {
    const [base, exp] = node.args;
    let expN; try { expN = math.evaluate(exp.toString()); } catch(e) { expN = null; }
    if (expN === 2 && base.type === 'FunctionNode') {
      const fn = base.fn.name || base.fn.toString();
      const arg = base.args[0];
      const linRes = getLinear(arg, v);
      if (fn === 'sec' && linRes) {
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        if (a === 1) return { tex: `\\tan(${uTex})`, note: `\\int\\sec^2 u\\,du=\\tan u` };
        return { tex: `\\dfrac{\\tan(${uTex})}{${fmtN(a)}}`, note: `\\int\\sec^2(au)du=\\tan(au)/a` };
      }
      if (fn === 'csc' && linRes) {
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        if (a === 1) return { tex: `-\\cot(${uTex})`, note: `\\int\\csc^2 u\\,du=-\\cot u` };
        return { tex: `\\dfrac{-\\cot(${uTex})}{${fmtN(a)}}`, note: `\\int\\csc^2(au)du=-\\cot(au)/a` };
      }
      if (fn === 'cos' && linRes) {
        // ∫cos²(u) = u/2 + sin(2u)/4
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        return { tex: `\\dfrac{${uTex}}{2}+\\dfrac{\\sin(2(${uTex}))}{4}`, note: `\\int\\cos^2 u\\,du` };
      }
      if (fn === 'sin' && linRes) {
        const {a, b} = linRes;
        const uTex = makeLinearTex(a, b, v);
        return { tex: `\\dfrac{${uTex}}{2}-\\dfrac{\\sin(2(${uTex}))}{4}`, note: `\\int\\sin^2 u\\,du` };
      }
    }
  }

  // ── 9b. csc²(v) outside expN===2 block (safety fallback) ─────────
  if (node.type === 'OperatorNode' && node.op === '^') {
    const [base2, exp2] = node.args;
    let expN2; try { expN2 = math.evaluate(exp2.toString()); } catch(e) { expN2 = null; }
    if (expN2 === 2 && base2.type === 'FunctionNode') {
      const fn2 = base2.fn.name || base2.fn.toString();
      const arg2 = base2.args[0];
      const linRes2 = getLinear(arg2, v);
      if (fn2 === 'csc' && linRes2) {
        const {a, b} = linRes2;
        const uTex = makeLinearTex(a, b, v);
        if (a === 1) return { tex: `-\\cot(${uTex})`, note: `\\int\\csc^2 u\\,du=-\\cot u` };
        return { tex: `\\dfrac{-\\cot(${uTex})}{${fmtN(a)}}`, note: `\\int\\csc^2(au)du=-\\cot(au)/a` };
      }
    }
  }

  return null; // unsupported
}

// ── Extract linear form {a, b} from node = a*v + b ───────────────────
function getLinear(node, v) {
  const ts = node.toString().trim();
  try {
    // Evaluate with v=0 to get b
    const b = math.evaluate(ts.replace(new RegExp(`\\b${v}\\b`,'g'), '0'), {pi:Math.PI,e:Math.E});
    // Evaluate with v=1 to get a+b
    const ab = math.evaluate(ts.replace(new RegExp(`\\b${v}\\b`,'g'), '1'), {pi:Math.PI,e:Math.E});
    const a = ab - b;
    // Verify with v=2: should give 2a+b
    const check = math.evaluate(ts.replace(new RegExp(`\\b${v}\\b`,'g'), '2'), {pi:Math.PI,e:Math.E});
    if (Math.abs(check - (2*a+b)) > 1e-9) return null; // not linear
    if (a === 0) return null; // constant in v
    return {a, b};
  } catch(e) { return null; }
}

function makeLinearTex(a, b, v) {
  if (b === 0) return a === 1 ? v : `${fmtN(a)}${v}`;
  const bPart = b > 0 ? `+${fmtN(b)}` : `${fmtN(b)}`;
  const aPart = a === 1 ? v : `${fmtN(a)}${v}`;
  return `${aPart}${bPart}`;
}

function tryLinearChain(expNode, v, fnTex, antiFnTex) {
  const lin = getLinear(expNode, v);
  if (!lin) return null;
  const {a, b} = lin;
  const uTex = makeLinearTex(a, b, v);
  if (a === 1) return { tex: antiFnTex(uTex), note: 'chain rule' };
  return { tex: `\\dfrac{${antiFnTex(uTex)}}{${fmtN(a)}}`, note: 'chain rule' };
}

// ── Numerically evaluate an antiderivative at a value ────────────────
function evalNumeric(exprN, val, varName, scope) {
  return math.evaluate(exprN, { ...scope, [varName]: val });
}

// ── Build LaTeX antiderivative steps for indefinite integral ─────────
function buildAntiderivSteps(exprN, exprLatex, v, steps) {
  let antiderivTex = null;
  try {
    const node = math.simplify(math.parse(exprN));
    const simpTex = n2l(node);
    if (simpTex !== exprLatex) steps.push({lbl:'Simplify', expr: simpTex});

    // Split additive terms
    const terms = collectAddTerms(node);
    if (terms.length > 1) {
      steps.push({lbl:'Split', expr: terms.map(t=>`\\int ${n2l(t)}\\,d${v}`).join(' + ')});
    }

    const parts = [];
    for (const t of terms) {
      const res = symbolicIntegrate(t, v);
      if (res) {
        if (terms.length > 1 || res.note) {
          steps.push({lbl:'∫ term', expr:`\\int ${n2l(t)}\\,d${v} = ${res.tex}`, note: res.note});
        }
        parts.push(res.tex);
      } else {
        // Fallback: numeric-only, show unsupported
        steps.push({lbl:'Note', expr:`\\text{∫ }${n2l(t)}\\,d${v}\\text{ — pattern not in library}`, note:'numeric only'});
        parts.push(null);
      }
    }

    if (parts.every(p => p !== null)) {
      antiderivTex = parts.join(' + ').replace(/\+\s*-/g, ' - ').replace(/\+-/g, ' - ');
    }
  } catch(e) {}
  return antiderivTex;
}

// ═══════════════════════════════════════════════
// SOLVE: INDEFINITE INTEGRAL ∫(f) dx
// ═══════════════════════════════════════════════
function solveIntegral(raw) {
  const steps = [];

  // Parse: extract integrand from ∫(...) or ∫ expr
  let integrand = '', v = 'x';
  // Try ∫[...] format — redirect to definite
  if (/[∫∮]\[/.test(raw)) return solveDefIntegral(raw);

  // Use char-by-char to extract integrand from ∫(...)
  const intIdx = raw.search(/[∫∮]/);
  if (intIdx !== -1 && raw[intIdx+1] === '(') {
    const pClose = findBracketClose(raw, intIdx+1, '(', ')');
    if (pClose !== -1) {
      integrand = raw.slice(intIdx+2, pClose).trim();
    } else {
      integrand = raw.slice(intIdx+1).trim();
    }
  } else if (intIdx !== -1) {
    integrand = raw.slice(intIdx+1).trim();
  } else {
    integrand = raw.trim();
  }

  const exprN   = norm(integrand);
  const exprLtx = rawToLatex(integrand);

  steps.push({lbl:'Integral', expr:`\\int \\left(${exprLtx}\\right) d${v}`});

  const antiderivTex = buildAntiderivSteps(exprN, exprLtx, v, steps);

  if (antiderivTex) {
    steps.push({lbl:'Antiderivative', expr:`F(${v}) = ${antiderivTex} + C`, isResult:true});
  } else {
    try {
      const node = math.parse(exprN);
      const simp = math.simplify(node);
      steps.push({lbl:'Simplified', expr: n2l(simp)});
    } catch(e) {}
    steps.push({lbl:'Result', expr:`\\int \\left(${exprLtx}\\right)d${v} + C`, isResult:true});
  }
  return {steps, type:'integral'};
}

// ═══════════════════════════════════════════════
// SOLVE: DEFINITE INTEGRAL ∫[a]^[b](f) dx
// ═══════════════════════════════════════════════
function solveDefIntegral(raw) {
  const steps = [];

  // Parse bounds and integrand from ∫[lo]^[hi](expr)
  // Use char-by-char to handle nested brackets in bounds
  let loR='', hiR='', exprR='', v='x';

  const sqIdx = raw.search(/[∫∮]/);
  if (sqIdx === -1) return solveIntegral(raw);
  let i = sqIdx + 1;

  // Expect [lo]^[hi](expr)
  if (i < raw.length && raw[i] === '[') {
    const loClose = findBracketClose(raw, i, '[', ']');
    if (loClose !== -1) {
      loR = raw.slice(i+1, loClose).trim();
      i = loClose + 1;
      if (raw[i] === '^' && raw[i+1] === '[') {
        i++;
        const hiClose = findBracketClose(raw, i, '[', ']');
        if (hiClose !== -1) {
          hiR = raw.slice(i+1, hiClose).trim();
          i = hiClose + 1;
          if (raw[i] === '(') {
            const exprClose = findBracketClose(raw, i, '(', ')');
            if (exprClose !== -1) exprR = raw.slice(i+1, exprClose).trim();
          }
        }
      }
    }
  }

  if (!exprR) return solveIntegral(raw);

  const loN   = norm(loR), hiN = norm(hiR), exprN = norm(exprR);
  const loLtx = rawToLatex(loR)||'a', hiLtx = rawToLatex(hiR)||'b';
  const exprLtx = rawToLatex(exprR);

  steps.push({lbl:'Integral', expr:`\\int_{${loLtx}}^{${hiLtx}} \\left(${exprLtx}\\right) d${v}`});

  // ── Step 1: Antiderivative ──
  const antiderivTex = buildAntiderivSteps(exprN, exprLtx, v, steps);

  if (antiderivTex) {
    steps.push({lbl:'Antiderivative', expr:`F(${v}) = ${antiderivTex} + C`});
    steps.push({lbl:'Apply bounds',   expr:`\\Big[${antiderivTex}\\Big]_{${loLtx}}^{${hiLtx}}`});
    steps.push({lbl:'Evaluate', expr:`F\\!\\left(${hiLtx}\\right) - F\\!\\left(${loLtx}\\right)`});
  }

  // ── Step 2: Numeric evaluation (Simpson's rule, high precision) ──
  const scope = {pi:Math.PI, e:Math.E};
  try {
    const loV = math.evaluate(loN, scope);
    const hiV = math.evaluate(hiN, scope);
    if (!isFinite(loV) || !isFinite(hiV)) throw new Error('حدود غير محدودة');

    const fn = xv => { try { return math.evaluate(exprN, {...scope, [v]:xv}); } catch(e) { return NaN; }};

    // Adaptive Simpson
    const N = 10000;
    const h = (hiV - loV) / N;
    let sum = fn(loV) + fn(hiV);
    for (let k=1; k<N; k+=2) sum += 4 * fn(loV + k*h);
    for (let k=2; k<N-1; k+=2) sum += 2 * fn(loV + k*h);
    const numResult = h * sum / 3;

    // Format result nicely
    const resTex = formatNiceResult(numResult);

    if (antiderivTex) {
      steps.push({lbl:'Numeric check', expr:`\\approx ${fmtN(numResult)}`, note:'Simpson 10k pts'});
    } else {
      steps.push({lbl:'Numeric value', expr:`\\int_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v} \\approx ${fmtN(numResult)}`, note:'Simpson 10k pts'});
    }
    steps.push({lbl:'Result',
      expr:`\\int_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v} = ${resTex}`,
      isResult:true});

  } catch(e) {
    if (antiderivTex) {
      steps.push({lbl:'Result', expr:`\\Big[${antiderivTex}\\Big]_{${loLtx}}^{${hiLtx}}`, isResult:true});
    } else {
      steps.push({lbl:'Result', expr:`\\int_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v}`, isResult:true});
    }
  }

  return {steps, type:'defintegral'};
}

// ── Format result as exact fraction / π multiple if possible ─────────
function formatNiceResult(val) {
  if (!isFinite(val)) return fmtN(val);
  // Check π multiples
  for (let d=1; d<=24; d++) {
    const ratio = val / (Math.PI / d);
    const nr = Math.round(ratio);
    if (Math.abs(nr - ratio) < 1e-6 && nr !== 0) {
      const g = gcd(Math.abs(nr), d);
      const rn=nr/g, rd=d/g;
      return rd===1 ? (rn===1?'\\pi':`${rn}\\pi`) : `\\dfrac{${rn===1?'':rn}\\pi}{${rd}}`;
    }
  }
  // Check nice fractions
  const fr = toNiceFrac(val);
  if (fr) return fr;
  return fmtN(val);
}

// ═══════════════════════════════════════════════
// SOLVE: DOUBLE INTEGRAL ∫∫[a]^[b][c]^[d](f) dy dx
// Professional step-by-step solver
// ═══════════════════════════════════════════════

// ── Symbolic integrate w.r.t. a given variable (wrapper) ─────────────
function symIntVar(exprN, v) {
  // Returns {tex, node} or null
  try {
    const node = math.simplify(math.parse(exprN));
    const terms = collectAddTerms(node);
    const parts = [];
    for (const t of terms) {
      const res = symbolicIntegrate(t, v);
      if (!res) return null;
      parts.push(res.tex);
    }
    const combined = parts.join(' + ').replace(/\+\s*-/g,' - ').replace(/\+-/g,' - ');
    return combined;
  } catch(e) { return null; }
}

// ── Substitute a value into a LaTeX expression (best-effort) ──────────
function subLatexVal(tex, varName, valLatex) {
  // Replace every free occurrence of the variable with the value in parens
  const re = new RegExp(`(?<![a-zA-Z\\\\])${varName}(?![a-zA-Z0-9_])`, 'g');
  return tex.replace(re, `\\left(${valLatex}\\right)`);
}

// ── Numeric 1D Simpson integration ───────────────────────────────────
function numSimpson1D(fn, lo, hi, N=2000) {
  const h = (hi - lo) / N;
  let sum = fn(lo) + fn(hi);
  for (let k=1; k<N; k+=2) { const v=fn(lo+k*h); if(isFinite(v)) sum += 4*v; }
  for (let k=2; k<N-1; k+=2) { const v=fn(lo+k*h); if(isFinite(v)) sum += 2*v; }
  return h * sum / 3;
}

// ── Numeric 2D Simpson integration ───────────────────────────────────
function numSimpson2D(f, x1,x2,y1,y2, nx=400,ny=400) {
  const hx=(x2-x1)/nx, hy=(y2-y1)/ny;
  const wy = new Float64Array(ny+1);
  for(let j=0;j<=ny;j++) wy[j]=j===0||j===ny?1:(j%2===1?4:2);
  let total=0;
  for(let ii=0;ii<=nx;ii++){
    const x=x1+ii*hx, wx=ii===0||ii===nx?1:(ii%2===1?4:2);
    let inner=0;
    for(let j=0;j<=ny;j++){const fv=f(x,y1+j*hy);if(isFinite(fv))inner+=wy[j]*fv;}
    total+=wx*(inner*hy/3);
  }
  return total*hx/3;
}

// ── Try to simplify LaTeX expression at given value (numeric sub) ─────
function evalAtBound(exprN, varName, boundN, scope) {
  try {
    const val = math.evaluate(exprN, {...scope, [varName]: math.evaluate(boundN, scope)});
    return isFinite(val) ? formatNiceResult(val) : null;
  } catch(e) { return null; }
}

function solveDblIntegral(raw) {
  const steps = [];
  const scope = {pi:Math.PI, e:Math.E};

  // ── Parse ∫∫[a]^[b][c]^[d](expr) ─────────────────────────────────
  let aR='',bR='',cR='',dR='',exprR='';
  const m = raw.match(/∫∫\[([^\]]*)\]\^\[([^\]]*)\]\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/);
  if (m) { [,aR,bR,cR,dR,exprR] = m.map(s=>s.trim()); }
  else {
    steps.push({lbl:'خطأ', expr:'\\text{صيغة غير معروفة — استخدم زر } \\int\\!\\int', isResult:true});
    return {steps, type:'dblintegral'};
  }

  const sym2js = s => s.replace(/π/g,'pi').replace(/∞/g,'Infinity').replace(/θ/g,'theta');
  const sym2ltx = s => rawToLatex(s) || s;

  const aN=sym2js(aR), bN=sym2js(bR), cN=sym2js(cR), dN=sym2js(dR);
  const exprN = norm(exprR);

  const aL=sym2ltx(aR), bL=sym2ltx(bR), cL=sym2ltx(cR), dL=sym2ltx(dR);
  const exprL = rawToLatex(exprR) || 'f(x,y)';

  // ── STEP 1: الصيغة الأصلية ─────────────────────────────────────────
  steps.push({
    lbl:'التكامل المزدوج',
    expr:`\\int_{${aL}}^{${bL}}\\!\\int_{${cL}}^{${dL}} \\left(${exprL}\\right)\\;dy\\;dx`
  });

  // ── STEP 2: المنطقة ──────────────────────────────────────────────────
  steps.push({
    lbl:'منطقة التكامل D',
    expr:`x \\in \\left[${aL},\\,${bL}\\right], \\quad y \\in \\left[${cL},\\,${dL}\\right]`
  });

  // ── STEP 3: تطبيق نظرية فوبيني ──────────────────────────────────────
  steps.push({
    lbl:'نظرية فوبيني',
    expr:`\\int_{${aL}}^{${bL}} \\left[\\int_{${cL}}^{${dL}} \\left(${exprL}\\right) dy\\right] dx`,
    note:'Fubini'
  });

  // ══════════════════════════════════════════════════════════════════
  // PHASE I — التكامل الداخلي ∫ dy
  // ══════════════════════════════════════════════════════════════════
  steps.push({lbl:'── المرحلة الأولى ──', expr:'\\text{التكامل الداخلي بالنسبة لـ } y'});

  // تبسيط المقام
  let innerSimplified = exprL;
  try {
    const sNode = math.simplify(math.parse(exprN));
    const sTex = n2l(sNode);
    if (sTex !== exprL && sTex.length < exprL.length + 20) {
      innerSimplified = sTex;
      steps.push({lbl:'تبسيط', expr:`\\int_{${cL}}^{${dL}} \\left(${sTex}\\right) dy`});
    }
  } catch(e) {}

  // تجزئة الحدود المتعددة
  let innerTermsTex = null;
  try {
    const node = math.simplify(math.parse(exprN));
    const terms = collectAddTerms(node);
    if (terms.length > 1) {
      const split = terms.map(t => `\\int_{${cL}}^{${dL}} ${n2l(t)}\\;dy`).join(' + ');
      steps.push({lbl:'تجزئة الحدود', expr: split});
    }
  } catch(e) {}

  // الدالة الأصلية (الأوليّة) بالنسبة لـ y
  const innerAntiderivTex = symIntVar(exprN, 'y');

  if (innerAntiderivTex) {
    steps.push({
      lbl:'الدالة الأوليّة F(x,y)',
      expr:`F(x,y) = ${innerAntiderivTex} + C`
    });

    // تطبيق حدود y
    steps.push({
      lbl:'تطبيق حدود y',
      expr:`\\Big[${innerAntiderivTex}\\Big]_{y\\,=\\,${cL}}^{y\\,=\\,${dL}}`
    });

    steps.push({
      lbl:'التعويض',
      expr:`F\\!\\left(x,\\,${dL}\\right) \\;-\\; F\\!\\left(x,\\,${cL}\\right)`
    });

    // حساب g(x) = F(x,d) - F(x,c) رمزياً إن أمكن
    let gxTex = null;
    let gxN = null;
    try {
      const cV = math.evaluate(cN, scope), dV = math.evaluate(dN, scope);
      // بناء تعبير g(x) = antideriv(y=d) - antideriv(y=c)
      const antiN = exprN; // نستخدم تكامل رمزي بالتعويض
      // محاولة حساب التكامل الداخلي رمزياً بحدود محددة
      const innerDefN = `defintegral_inner_${Date.now()}`;
      // نبني g(x) عبر Simpson 1D لكل x (يُستخدم لاحقاً في الخارجي)
      const gFn = (xv) => {
        try {
          return numSimpson1D(yv => {
            const fv = math.evaluate(exprN, {...scope, x:xv, y:yv});
            return isFinite(fv) ? fv : NaN;
          }, cV, dV, 800);
        } catch(e) { return NaN; }
      };

      // حساب g(x) رمزياً: استبدال y بحدودها في الدالة الأوليّة
      // نستخدم math.js للتبسيط بعد التعويض
      try {
        const antiExpr = innerAntiderivTex;
        // استبدال رمزي بسيط: بناء g(x) = F(x,d) - F(x,c)
        const gNodeHi = math.simplify(
          math.parse(antiExpr.replace(/\\dfrac\{([^}]+)\}\{([^}]+)\}/g,'($1)/($2)')
            .replace(/\\left|\\right|\\Big/g,'')
            .replace(/\^{([^}]+)}/g,'^($1)')
            .replace(/\{([^}]+)\}/g,'$1') || '0'),
          [{y: math.parse(dN)}]
        );
        const gNodeLo = math.simplify(
          math.parse(antiExpr.replace(/\\dfrac\{([^}]+)\}\{([^}]+)\}/g,'($1)/($2)')
            .replace(/\\left|\\right|\\Big/g,'')
            .replace(/\^{([^}]+)}/g,'^($1)')
            .replace(/\{([^}]+)\}/g,'$1') || '0'),
          [{y: math.parse(cN)}]
        );
        const gNode = math.simplify(math.parse(`(${gNodeHi.toString()}) - (${gNodeLo.toString()})`));
        gxTex = n2l(gNode);
        gxN = gNode.toString();
        steps.push({lbl:'g(x) = نتيجة التكامل الداخلي', expr: gxTex});
      } catch(e2) {
        gxTex = null;
        gxN = null;
      }

      // ════════════════════════════════════════════════════════════════
      // PHASE II — التكامل الخارجي ∫ g(x) dx
      // ════════════════════════════════════════════════════════════════
      steps.push({lbl:'── المرحلة الثانية ──', expr:'\\text{التكامل الخارجي بالنسبة لـ } x'});

      if (gxN) {
        steps.push({
          lbl:'التكامل الخارجي',
          expr:`\\int_{${aL}}^{${bL}} \\left(${gxTex}\\right) dx`
        });
        // دالة أوليّة للتكامل الخارجي
        const outerAnti = symIntVar(gxN, 'x');
        if (outerAnti) {
          steps.push({lbl:'الدالة الأوليّة H(x)', expr:`H(x) = ${outerAnti} + C`});
          steps.push({
            lbl:'تطبيق حدود x',
            expr:`\\Big[${outerAnti}\\Big]_{x\\,=\\,${aL}}^{x\\,=\\,${bL}}`
          });
          steps.push({
            lbl:'التعويض',
            expr:`H\\!\\left(${bL}\\right) \\;-\\; H\\!\\left(${aL}\\right)`
          });
        }
      } else {
        steps.push({
          lbl:'التكامل الخارجي',
          expr:`\\int_{${aL}}^{${bL}} g(x)\\;dx`,
          note:'g(x) من المرحلة السابقة'
        });
      }

      // ════════════════════════════════════════════════════════════════
      // PHASE III — الحساب العددي الدقيق
      // ════════════════════════════════════════════════════════════════
      steps.push({lbl:'── المرحلة الثالثة ──', expr:'\\text{الحساب العددي (تحقق وإتمام)}'});

      const aV = math.evaluate(aN, scope), bV = math.evaluate(bN, scope);
      if (!isFinite(aV)||!isFinite(bV)||!isFinite(cV)||!isFinite(dV))
        throw new Error('حدود غير محدودة');

      const f2d = (x,y) => { try { const v=math.evaluate(exprN,{...scope,x,y}); return isFinite(v)?v:0; } catch(e){return 0;} };

      // 2D Simpson عالي الدقة
      const result = numSimpson2D(f2d, aV,bV,cV,dV, 500,500);
      const resTex = formatNiceResult(result);

      // التحقق بـ 1D Simpson المتداخل
      const result2 = numSimpson1D(xv => gFn(xv), aV, bV, 1000);
      const match = Math.abs(result - result2) < Math.abs(result)*0.001 + 1e-10;

      steps.push({
        lbl:'تحقق رقمي',
        expr:`\\text{Simpson 2D: } ${fmtN(result)} \\quad\\approx\\quad \\text{Simpson 1D: } ${fmtN(result2)}`,
        note: match ? '✓ متطابق' : '⚠ فارق صغير'
      });

      steps.push({
        lbl:'النتيجة النهائية',
        expr:`\\int_{${aL}}^{${bL}}\\!\\int_{${cL}}^{${dL}} \\left(${exprL}\\right) dy\\,dx \\;=\\; ${resTex}`,
        isResult:true
      });

    } catch(e) {
      // fallback pure 2D Simpson
      try {
        const aV=math.evaluate(aN,scope),bV=math.evaluate(bN,scope);
        const cV=math.evaluate(cN,scope),dV=math.evaluate(dN,scope);
        const f2d=(x,y)=>{try{const v=math.evaluate(exprN,{...scope,x,y});return isFinite(v)?v:0;}catch(e){return 0;}};
        const result = numSimpson2D(f2d,aV,bV,cV,dV,500,500);
        const resTex = formatNiceResult(result);
        steps.push({
          lbl:'النتيجة العددية',
          expr:`\\int_{${aL}}^{${bL}}\\!\\int_{${cL}}^{${dL}} \\left(${exprL}\\right) dy\\,dx \\;=\\; ${resTex}`,
          isResult:true
        });
      } catch(e2) {
        steps.push({lbl:'خطأ', expr:`\\text{${esc(String(e2.message).slice(0,80))}}`, isResult:true});
      }
    }
  } else {
    // ─── لا يوجد تكامل رمزي — اذهب مباشرة للعدد ──────────────────────
    steps.push({lbl:'ملاحظة', expr:'\\text{النمط الرمزي غير مدعوم — ننتقل للحساب العددي}', note:'numeric'});
    steps.push({lbl:'── المرحلة الثانية ──', expr:'\\text{التكامل الخارجي بالنسبة لـ } x'});
    steps.push({lbl:'التكامل الخارجي', expr:`\\int_{${aL}}^{${bL}} g(x)\\;dx`, note:'g(x) محسوبة عددياً'});
    steps.push({lbl:'── المرحلة الثالثة ──', expr:'\\text{الحساب العددي}'});
    try {
      const aV=math.evaluate(aN,scope),bV=math.evaluate(bN,scope);
      const cV=math.evaluate(cN,scope),dV=math.evaluate(dN,scope);
      if(!isFinite(aV)||!isFinite(bV)||!isFinite(cV)||!isFinite(dV)) throw new Error('حدود غير محدودة');
      const f2d=(x,y)=>{try{const v=math.evaluate(exprN,{...scope,x,y});return isFinite(v)?v:0;}catch(e){return 0;}};
      const result = numSimpson2D(f2d,aV,bV,cV,dV,500,500);
      const resTex = formatNiceResult(result);
      steps.push({
        lbl:'النتيجة النهائية',
        expr:`\\int_{${aL}}^{${bL}}\\!\\int_{${cL}}^{${dL}} \\left(${exprL}\\right) dy\\,dx \\;=\\; ${resTex}`,
        isResult:true
      });
    } catch(e) {
      steps.push({lbl:'خطأ', expr:`\\text{${esc(String(e.message).slice(0,80))}}`, isResult:true});
    }
  }

  return {steps, type:'dblintegral'};
}

function collectAddTerms(node){
  if(node.type==='OperatorNode'&&(node.op==='+'||node.op==='-')&&node.args&&node.args.length===2){
    const left=collectAddTerms(node.args[0]);
    let right=collectAddTerms(node.args[1]);
    if(node.op==='-') right=right.map(t=>{try{return math.parse(`-(${t.toString()})`);}catch(e){return t;}});
    return [...left,...right];
  }
  return [node];
}

// ═══════════════════════════════════════════════
// MAIN DISPATCHER
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// LIMIT SOLVER
// ═══════════════════════════════════════════════
function solveLimit(raw){
  const steps = [];
  // Parse lim_[{var}→{val}][body]
  const m = raw.match(/^lim_\[\{([^}]*)\}→\{([^}]*)\}\]\[([^\]]*)\]$/);
  if(!m) return {steps:[{lbl:'Error',expr:'\\text{Could not parse limit}'}], type:'limit'};
  const varName = m[1].trim() || 'x';
  const approach = m[2].trim() || '0';
  const bodyRaw = m[3].trim() || '0';
  const bodyLatex = rawToLatex(bodyRaw);
  const approachLatex = rawToLatex(approach);
  const exprLatex = '\\lim_{' + varName + ' \\to ' + approachLatex + '} ' + bodyLatex;
  steps.push({lbl:'Expression', expr: exprLatex});
  // Try direct substitution
  try {
    const bodyNorm = norm(bodyRaw);
    const scope = {};
    scope[varName] = math.parse(approach).evaluate();
    const val = math.parse(bodyNorm).evaluate(scope);
    if(val !== undefined && val !== null && isFinite(val)){
      const valLatex = Number.isInteger(val) ? String(val) : math.format(val, {precision:6});
      steps.push({lbl:'Substitution', expr: exprLatex + ' = ' + valLatex,
        note: varName + ' → ' + approach});
      steps.push({isResult:true, expr: valLatex});
      return {steps, type:'limit'};
    }
  } catch(e){}
  // Try math.js limit via numerical approach
  try {
    const bodyNorm = norm(bodyRaw);
    const approachVal = math.parse(approach).evaluate();
    // Evaluate at points approaching from both sides
    const eps = 1e-8;
    const scope1 = {}, scope2 = {};
    scope1[varName] = approachVal + eps;
    scope2[varName] = approachVal - eps;
    const v1 = math.parse(bodyNorm).evaluate(scope1);
    const v2 = math.parse(bodyNorm).evaluate(scope2);
    if(isFinite(v1) && isFinite(v2) && Math.abs(v1 - v2) < 1e-4){
      const avg = (v1 + v2) / 2;
      const rounded = Math.round(avg * 1e6) / 1e6;
      const valLatex = Number.isInteger(rounded) ? String(rounded) : String(rounded);
      steps.push({lbl:'Numerical limit', expr: exprLatex + ' \\approx ' + valLatex,
        note: 'both sides converge'});
      steps.push({isResult:true, expr: valLatex});
      return {steps, type:'limit'};
    }
    // Check for infinity
    if(!isFinite(v1) || !isFinite(v2)){
      const infLatex = v1 > 0 ? '\\infty' : '-\\infty';
      steps.push({lbl:'Limit', expr: exprLatex + ' = ' + infLatex});
      steps.push({isResult:true, expr: infLatex});
      return {steps, type:'limit'};
    }
  } catch(e){}
  // Indeterminate — show expression
  steps.push({lbl:'Limit', expr: exprLatex});
  steps.push({isResult:true, expr: exprLatex});
  return {steps, type:'limit'};
}

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// SOLVE: CONTOUR INTEGRAL ∮[a]^[b](f) dx
// ═══════════════════════════════════════════════
function solveContourIntegral(raw) {
  const steps = [];
  let loR='',hiR='',exprR='',v='x';
  const sqIdx=raw.search(/∮/);
  if(sqIdx===-1) return solveDefIntegral(raw);
  let i=sqIdx+1;
  if(i<raw.length&&raw[i]==='['){
    const loClose=findBracketClose(raw,i,'[',']');
    if(loClose!==-1){
      loR=raw.slice(i+1,loClose).trim(); i=loClose+1;
      if(raw[i]==='^'&&raw[i+1]==='['){
        i++;
        const hiClose=findBracketClose(raw,i,'[',']');
        if(hiClose!==-1){
          hiR=raw.slice(i+1,hiClose).trim(); i=hiClose+1;
          if(raw[i]==='('){
            const exprClose=findBracketClose(raw,i,'(',')');
            if(exprClose!==-1) exprR=raw.slice(i+1,exprClose).trim();
          }
        }
      }
    }
  }
  if(!exprR){
    const pIdx=raw.indexOf('(',sqIdx);
    if(pIdx!==-1){const pClose=findBracketClose(raw,pIdx,'(',')');if(pClose!==-1)exprR=raw.slice(pIdx+1,pClose).trim();}
  }
  if(!exprR) return solveIntegral(raw);
  const loN=loR?norm(loR):'0', hiN=hiR?norm(hiR):'2*pi', exprN=norm(exprR);
  const loLtx=loR?(rawToLatex(loR)||'0'):'0', hiLtx=hiR?(rawToLatex(hiR)||'2\\pi'):'2\\pi';
  const exprLtx=rawToLatex(exprR);
  steps.push({lbl:'التكامل المغلق',expr:`\\oint_{${loLtx}}^{${hiLtx}} \\left(${exprLtx}\\right) d${v}`});
  const antiderivTex=buildAntiderivSteps(exprN,exprLtx,v,steps);
  if(antiderivTex){
    steps.push({lbl:'الدالة الأولية',expr:`F(${v}) = ${antiderivTex} + C`});
    steps.push({lbl:'تطبيق الحدود',expr:`\\Big[${antiderivTex}\\Big]_{${loLtx}}^{${hiLtx}}`});
    steps.push({lbl:'التقييم',expr:`F\\!\\left(${hiLtx}\\right) - F\\!\\left(${loLtx}\\right)`});
  }
  const scope={pi:Math.PI,e:Math.E};
  try {
    const loV=math.evaluate(loN,scope), hiV=math.evaluate(hiN,scope);
    if(!isFinite(loV)||!isFinite(hiV)) throw new Error('حدود غير محدودة');
    const fn=xv=>{try{return math.evaluate(exprN,{...scope,[v]:xv});}catch(e){return NaN;}};
    const N=10000, h=(hiV-loV)/N;
    let sum=fn(loV)+fn(hiV);
    for(let k=1;k<N;k+=2) sum+=4*fn(loV+k*h);
    for(let k=2;k<N;k+=2) sum+=2*fn(loV+k*h);
    const numResult=h*sum/3, resTex=formatNiceResult(numResult);
    if(Math.abs(numResult)<1e-8)
      steps.push({lbl:'نظرية كوشي',expr:'\\oint_C f\\,dz = 0 \\Rightarrow \\text{الدالة تحليلية داخل المسار}',note:"Cauchy"});
    if(antiderivTex) steps.push({lbl:'تحقق عددي',expr:`\\approx ${fmtN(numResult)}`,note:'Simpson 10k'});
    else steps.push({lbl:'القيمة العددية',expr:`\\oint_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v} \\approx ${fmtN(numResult)}`,note:'Simpson 10k'});
    steps.push({lbl:'النتيجة',expr:`\\oint_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v} = ${resTex}`,isResult:true});
  } catch(e){
    if(antiderivTex) steps.push({lbl:'النتيجة',expr:`\\Big[${antiderivTex}\\Big]_{${loLtx}}^{${hiLtx}}`,isResult:true});
    else steps.push({lbl:'النتيجة',expr:`\\oint_{${loLtx}}^{${hiLtx}}\\left(${exprLtx}\\right)d${v}`,isResult:true});
  }
  return {steps,type:'contourintegral'};
}

// SOLVE: SUMMATION  ∑[n=a]^[b](expr)
// ═══════════════════════════════════════════════
function solveSummation(raw) {
  const steps = [];
  const m = raw.match(/∑\[([^\]]*)\]\^\[([^\]]*)\]\(([^)]*)\)/);
  if (!m) {
    steps.push({lbl:'خطأ', expr:'\\text{صيغة غير صحيحة — استخدم زر } \\sum', isResult:true});
    return {steps, type:'summation'};
  }
  const subRaw=m[1].trim(), supRaw=m[2].trim(), exprRaw=m[3].trim();
  const eqIdx=subRaw.indexOf('=');
  const varN  =eqIdx!==-1?subRaw.slice(0,eqIdx).trim():'n';
  const startR=eqIdx!==-1?subRaw.slice(eqIdx+1).trim():subRaw||'1';
  const startN=norm(startR), endN=norm(supRaw), exprN=norm(exprRaw);
