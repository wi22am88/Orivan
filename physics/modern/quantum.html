<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ميكانيكا الكم | QUANTUM MECHANICS</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
:root {
  --bg:    #020817;
  --c1:    #00d4ff;
  --c2:    #7c3aed;
  --c3:    #f59e0b;
  --c4:    #10b981;
  --c5:    #ff4757;
  --text:  #e2e8f0;
  --muted: #64748b;
  --card:  rgba(15,23,42,0.9);
  --border:rgba(124,58,237,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;}

#bg-canvas{position:fixed;inset:0;z-index:0;}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.03) 1px,transparent 1px);background-size:50px 50px;}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
.corner{position:fixed;width:36px;height:36px;z-index:10;pointer-events:none;}
.corner.tl{top:14px;left:14px;border-top:2px solid var(--c2);border-left:2px solid var(--c2);}
.corner.tr{top:14px;right:14px;border-top:2px solid var(--c1);border-right:2px solid var(--c1);}
.corner.bl{bottom:14px;left:14px;border-bottom:2px solid var(--c3);border-left:2px solid var(--c3);}
.corner.br{bottom:14px;right:14px;border-bottom:2px solid var(--c4);border-right:2px solid var(--c4);}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(2,8,23,0.85);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.logo{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:900;color:var(--c1);letter-spacing:3px;text-shadow:0 0 10px rgba(0,212,255,.5);}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.8rem;text-decoration:none;cursor:pointer;border:1px solid rgba(255,255,255,.08);padding:7px 16px;border-radius:8px;transition:all .2s;background:none;}
.back-btn:hover{color:var(--c1);border-color:var(--c1);}
.header-title{font-size:.85rem;color:var(--text);letter-spacing:1px;}

.wrapper{position:relative;z-index:5;max-width:900px;margin:0 auto;padding:40px 24px 80px;}

.page-hero{text-align:center;margin-bottom:48px;animation:fadeUp .7s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.25);border-radius:100px;padding:5px 16px;font-size:.65rem;letter-spacing:3px;color:var(--c1);margin-bottom:20px;}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--c1);box-shadow:0 0 8px var(--c1);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page-hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.page-hero p{color:var(--muted);font-size:.95rem;max-width:500px;margin:0 auto;line-height:1.8;}

.subtypes-row{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;animation:fadeUp .7s .1s ease both;}
.subtype-tab{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;text-align:center;transition:all .25s ease;backdrop-filter:blur(8px);position:relative;overflow:hidden;}
.subtype-tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.08),transparent);opacity:0;transition:.3s;}
.subtype-tab:hover::before{opacity:1;}
.subtype-tab:hover{border-color:var(--c1);transform:translateY(-2px);}
.subtype-tab.active{border-color:var(--c1);background:rgba(0,212,255,.08);box-shadow:0 0 24px rgba(0,212,255,.12);}
.subtype-tab.active::before{opacity:1;}
.tab-icon{font-size:1.4rem;margin-bottom:6px;}
.tab-name{font-size:.82rem;font-weight:700;color:#f1f5f9;}
.tab-en{font-size:.6rem;color:var(--muted);letter-spacing:1px;font-family:'Orbitron',sans-serif;margin-top:2px;}
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--c1);transform:scaleX(0);transition:.3s;transform-origin:center;}
.subtype-tab.active .tab-bar{transform:scaleX(1);}

.solver-panel{background:var(--card);border-radius:20px;border:1px solid rgba(0,212,255,.15);overflow:hidden;backdrop-filter:blur(12px);animation:fadeUp .7s .2s ease both;}
.solver-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:14px;}
.solver-icon{font-size:1.8rem;}
.solver-title{font-weight:700;color:#f1f5f9;font-size:1.05rem;}
.solver-desc{font-size:.75rem;color:var(--muted);margin-top:2px;}
.solver-body{padding:24px;}

.inputs-label{font-size:.7rem;letter-spacing:2px;color:var(--muted);font-family:'Orbitron',sans-serif;margin-bottom:14px;}
.inputs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-group label{font-size:.75rem;color:#94a3b8;}
.input-group label span{color:var(--c1);font-size:.7rem;margin-right:4px;}
.input-field{background:#020617;border:1.5px solid #1e293b;color:white;padding:12px 14px;border-radius:10px;outline:none;font-family:'Tajawal',sans-serif;font-size:.9rem;transition:.25s;}
.input-field:focus{border-color:var(--c1);box-shadow:0 0 10px rgba(0,212,255,.2);}
.input-field::placeholder{color:#334155;font-size:.8rem;}
.solve-btn{width:100%;padding:16px;background:linear-gradient(90deg,var(--c2),var(--c1));color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem;font-family:'Tajawal',sans-serif;letter-spacing:1px;transition:.3s ease;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.solve-btn:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,255,.2);}

.result-section{margin-top:28px;display:none;animation:fadeUp .5s ease both;}
.result-section.show{display:block;}
.result-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.4),transparent);margin-bottom:24px;}

.laws-section{margin-bottom:24px;}
.laws-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.laws-title::after{content:'';flex:1;height:1px;background:rgba(0,212,255,.2);}
.law-card{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.law-badge{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2px;color:var(--c1);background:rgba(0,212,255,.1);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.law-latex{flex:1;overflow-x:auto;direction:ltr;}
.law-latex .katex{font-size:.95rem!important;}

.steps-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c4);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.steps-title::after{content:'';flex:1;height:1px;background:rgba(16,185,129,.2);}
.step{background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:start;}
.step-num{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--c4);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.step-math{overflow-x:auto;direction:ltr;}
.step-math .katex{font-size:.95rem!important;}

.result-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.3);border-radius:12px;padding:20px 24px;margin-top:16px;box-shadow:0 0 20px rgba(0,212,255,.06);}
.result-box-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:3px;color:var(--c1);margin-bottom:12px;}
.result-values{display:flex;flex-wrap:wrap;gap:12px;}
.result-val{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:10px 16px;}
.result-val-name{font-size:.65rem;color:var(--muted);margin-bottom:4px;}
.result-val-num{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--c1);font-weight:700;}
.error-box{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:14px 16px;color:var(--c5);font-size:.82rem;margin-top:16px;}

@media(max-width:768px){
  .subtypes-row{flex-direction:column;}
  .inputs-grid{grid-template-columns:1fr;}
  .result-values{flex-direction:column;}
}
@media(max-width:480px){
  header{padding:10px 14px;}
  .wrapper{padding:24px 14px 60px;}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanlines"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<header>
  <a class="back-btn" href="modern.html">← رجوع</a>
  <div class="header-title">ميكانيكا الكم</div>
  <div class="logo">QUANTUM·M</div>
</header>

<div class="wrapper">

  <section class="page-hero">
    <div class="page-badge"><div class="badge-dot"></div>ميكانيكا الكم · QUANTUM MECHANICS</div>
    <h1>🔬 ميكانيكا الكم</h1>
    <p>موجة دي بروي، مبدأ عدم اليقين لهايزنبرغ، ومستويات طاقة بور</p>
  </section>

  <div class="subtypes-row">
    <div class="subtype-tab active" id="tab-qm_debroglie" onclick="selectSubtype('qm_debroglie')">
      <div class="tab-icon">〰️</div>
      <div class="tab-name">موجة دي بروي</div>
      <div class="tab-en">DE BROGLIE</div>
      <div class="tab-bar"></div>
    </div>
    <div class="subtype-tab" id="tab-qm_heisenberg" onclick="selectSubtype('qm_heisenberg')">
      <div class="tab-icon">🎯</div>
      <div class="tab-name">مبدأ عدم اليقين</div>
      <div class="tab-en">HEISENBERG</div>
      <div class="tab-bar"></div>
    </div>
    <div class="subtype-tab" id="tab-qm_bohr" onclick="selectSubtype('qm_bohr')">
      <div class="tab-icon">⚛️</div>
      <div class="tab-name">نموذج بور</div>
      <div class="tab-en">BOHR MODEL</div>
      <div class="tab-bar"></div>
    </div>
  </div>

  <div class="solver-panel">
    <div class="solver-header" id="solver-header">
      <div class="solver-icon">〰️</div>
      <div>
        <div class="solver-title" id="solver-title">موجة دي بروي</div>
        <div class="solver-desc"  id="solver-desc">احسب الطول الموجي للجسيم المتحرك</div>
      </div>
    </div>
    <div class="solver-body">
      <div class="inputs-label">// أدخل المعطيات المعروفة</div>
      <div id="inputs-area"></div>
      <button class="solve-btn" onclick="triggerSolve()">
        <span>🔬</span> احسب وأظهر الحل الكامل
      </button>
      <div class="result-section" id="result-section">
        <div class="result-divider"></div>
        <div id="result-content"></div>
      </div>
    </div>
  </div>

</div>

<script>
/* ══ CANVAS BG ══ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, orbs;
function initCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  orbs = [
    {x:W*.2,  y:H*.25, r:320, color:'rgba(0,212,255,',   speed:.0003,  phase:0},
    {x:W*.8,  y:H*.6,  r:380, color:'rgba(124,58,237,',  speed:.00042, phase:1.5},
    {x:W*.5,  y:H*.85, r:260, color:'rgba(0,212,255,',   speed:.00038, phase:3.5},
  ];
}
function drawCanvas() {
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#020817'; ctx.fillRect(0,0,W,H);
  for (const o of orbs) {
    o.phase += o.speed;
    const ox = o.x + Math.sin(o.phase)*70, oy = o.y + Math.cos(o.phase*.7)*50;
    const g = ctx.createRadialGradient(ox,oy,0,ox,oy,o.r);
    g.addColorStop(0, o.color+'0.07)'); g.addColorStop(.5, o.color+'0.025)'); g.addColorStop(1, o.color+'0)');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(ox,oy,o.r,0,Math.PI*2); ctx.fill();
  }
  requestAnimationFrame(drawCanvas);
}
window.addEventListener('resize', initCanvas);
initCanvas(); requestAnimationFrame(drawCanvas);

/* ══ KATEX ══ */
function K(latex) {
  const el = document.createElement('span');
  try { katex.render(latex, el, {throwOnError:false, displayMode:false, strict:false}); }
  catch(e) { el.textContent = latex; }
  return el.outerHTML;
}

/* ══ CONFIG ══ */
const SUBTYPES = {
  'qm_debroglie': {
    icon:'〰️', title:'موجة دي بروي', desc:'احسب الطول الموجي للجسيم المتحرك',
    inputs:[
      {id:'m', label:'كتلة الجسيم m',  unit:'kg',  placeholder:'مثال: 9.11e-31 (إلكترون)'},
      {id:'v', label:'سرعة الجسيم v',  unit:'m/s', placeholder:'مثال: 1e6'},
    ]
  },
  'qm_heisenberg': {
    icon:'🎯', title:'مبدأ عدم اليقين', desc:'احسب أدنى حد لعدم دقة الزخم Δp',
    inputs:[
      {id:'dx', label:'عدم دقة الموضع Δx', unit:'m', placeholder:'مثال: 1e-10'},
    ]
  },
  'qm_bohr': {
    icon:'⚛️', title:'نموذج بور للهيدروجين', desc:'احسب طاقة ونصف قطر المستوى n',
    inputs:[
      {id:'n', label:'رقم المستوى n', unit:'', placeholder:'مثال: 1، 2، 3...'},
    ]
  }
};

let currentSub = 'qm_debroglie';

function selectSubtype(sub) {
  currentSub = sub;
  document.querySelectorAll('.subtype-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+sub).classList.add('active');
  const cfg = SUBTYPES[sub];
  document.querySelector('#solver-header .solver-icon').textContent = cfg.icon;
  document.getElementById('solver-title').textContent = cfg.title;
  document.getElementById('solver-desc').textContent  = cfg.desc;
  buildInputs(sub);
  document.getElementById('result-section').classList.remove('show');
}

function buildInputs(sub) {
  const inputs = SUBTYPES[sub].inputs;
  let html = '<div class="inputs-grid">';
  for (const inp of inputs) {
    html += `<div class="input-group">
      <label><span>[${inp.unit||'—'}]</span>${inp.label}</label>
      <input class="input-field" type="text" id="inp-${inp.id}" placeholder="${inp.placeholder}" autocomplete="off">
    </div>`;
  }
  html += '</div>';
  document.getElementById('inputs-area').innerHTML = html;
}

function getVal(key) {
  const el = document.getElementById('inp-'+key);
  if (!el) return null;
  const v = el.value.trim();
  if (v === '') return null;
  return parseFloat(v.replace(/e/gi,'e'));
}

/* ══ HELPERS ══ */
function fmt(n, d=4) {
  if (n===null||n===undefined||isNaN(n)) return '؟';
  if (!isFinite(n)) return n>0?'∞':'-∞';
  if (Math.abs(n)>=1e6||(Math.abs(n)<1e-3&&n!==0)) return n.toExponential(3);
  return parseFloat(n.toFixed(d)).toString();
}
function lawCard(badge, latex) {
  return `<div class="law-card"><span class="law-badge">${badge}</span><div class="law-latex">${K(latex)}</div></div>`;
}
function step(num, label, latex, note='') {
  return `<div class="step"><div class="step-num">${String(num).padStart(2,'0')}</div><div><div class="step-label">${label}</div><div class="step-math">${K(latex)}</div>${note?`<div style="font-size:.7rem;color:var(--c3);margin-top:6px;font-style:italic">${note}</div>`:''}</div></div>`;
}
function resultBox(values) {
  const html = values.map(v=>`<div class="result-val"><div class="result-val-name">${v.name}</div><div class="result-val-num">${v.val} ${v.unit||''}</div></div>`).join('');
  return `<div class="result-box"><div class="result-box-label">// النتائج النهائية</div><div class="result-values">${html}</div></div>`;
}
function errorBox(msg) { return `<div class="error-box">⚠️ ${msg}</div>`; }
function lawsSection(cards) { return `<div class="laws-section"><div class="laws-title">القوانين المستخدمة</div>${cards}</div>`; }
function stepsSection(steps) { return `<div><div class="steps-title">خطوات الحل</div>${steps}</div>`; }

/* ══ SOLVER ══ */
function solve() {
  const h = 6.626e-34, hbar = h/(2*Math.PI);
  const sub = currentSub;

  if (sub === 'qm_debroglie') {
    const m = getVal('m'), v = getVal('v');
    if (!m || !v) return errorBox('أدخل الكتلة والسرعة');
    const p = m*v, lambda = h/p;
    return lawsSection(
      lawCard('دي بروي', '\\lambda=\\frac{h}{mv}=\\frac{h}{p}')
    ) + stepsSection(
      step(1, 'المعطيات',    `m=${fmt(m)}\\,kg,\\;v=${fmt(v)}\\,m/s`) +
      step(2, 'الزخم',       `p=mv=${fmt(m)}\\times${fmt(v)}=${fmt(p,4)}\\,kg\\cdot m/s`) +
      step(3, 'الطول الموجي',`\\lambda=\\frac{h}{p}=\\frac{6.626\\times10^{-34}}{${fmt(p,4)}}=${fmt(lambda,4)}\\,m`)
    ) + resultBox([
      {name:'الزخم p',              val:fmt(p,4),      unit:'kg·m/s'},
      {name:'طول موجة دي بروي λ', val:fmt(lambda,4), unit:'m'}
    ]);
  }

  if (sub === 'qm_heisenberg') {
    const dx = getVal('dx');
    if (!dx) return errorBox('أدخل Δx');
    const dp_min = hbar/(2*dx);
    return lawsSection(
      lawCard('هايزنبرغ', '\\Delta x\\cdot\\Delta p\\geq\\frac{\\hbar}{2}') +
      lawCard('ℏ', '\\hbar=\\frac{h}{2\\pi}=1.055\\times10^{-34}\\,J\\cdot s')
    ) + stepsSection(
      step(1, 'المعطيات',   `\\Delta x=${fmt(dx)}\\,m`) +
      step(2, 'ℏ',          `\\hbar=1.055\\times10^{-34}\\,J\\cdot s`) +
      step(3, 'أدنى Δp',    `\\Delta p_{min}=\\frac{\\hbar}{2\\Delta x}=\\frac{1.055\\times10^{-34}}{2\\times${fmt(dx)}}=${fmt(dp_min,4)}\\,kg\\cdot m/s`)
    ) + resultBox([
      {name:'أدنى Δp',   val:fmt(dp_min,4), unit:'kg·m/s'},
    ]);
  }

  // qm_bohr
  const n = getVal('n');
  if (!n || n < 1) return errorBox('أدخل رقم المستوى n ≥ 1');
  const nInt = Math.round(n);
  const E_n = -13.6/(nInt*nInt), r_n = 0.0529*nInt*nInt;
  return lawsSection(
    lawCard('طاقة بور',   `E_n=\\frac{-13.6}{n^2}\\,eV`) +
    lawCard('نصف القطر',  `r_n=n^2\\times a_0,\\quad a_0=0.0529\\,nm`)
  ) + stepsSection(
    step(1, 'المعطيات',    `n=${nInt}`) +
    step(2, 'طاقة المستوى',`E_n=\\frac{-13.6}{${nInt}^2}=\\frac{-13.6}{${nInt*nInt}}=${fmt(E_n,4)}\\,eV`) +
    step(3, 'نصف القطر',   `r_n=${nInt}^2\\times0.0529=${nInt*nInt}\\times0.0529=${fmt(r_n,4)}\\,nm`)
  ) + resultBox([
    {name:`E_${nInt} طاقة المستوى`, val:fmt(E_n,4), unit:'eV'},
    {name:`r_${nInt} نصف القطر`,    val:fmt(r_n,4), unit:'nm'}
  ]);
}

function triggerSolve() {
  const result = solve();
  document.getElementById('result-content').innerHTML = result;
  const resEl = document.getElementById('result-section');
  resEl.classList.add('show');
  resEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ══ INIT ══ */
selectSubtype('qm_debroglie');
</script>
</body>
</html>
