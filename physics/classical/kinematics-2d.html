<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحركة ببُعدين | KINEMATICS 2D</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
/* ══════════════════════════════════════════
   CSS VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:    #020817;
  --bg2:   #030d1f;
  --c1:    #00d4ff;
  --c2:    #7c3aed;
  --c3:    #f59e0b;
  --c4:    #10b981;
  --c5:    #ff4757;
  --text:  #e2e8f0;
  --muted: #64748b;
  --card:  rgba(15,23,42,0.9);
  --border:rgba(0,212,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;}

/* ══════════════════════════════════════════
   BACKGROUND & DECORATIONS
══════════════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:50px 50px;}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
.corner{position:fixed;width:36px;height:36px;z-index:10;pointer-events:none;}
.corner.tl{top:14px;left:14px;border-top:2px solid var(--c1);border-left:2px solid var(--c1);}
.corner.tr{top:14px;right:14px;border-top:2px solid var(--c2);border-right:2px solid var(--c2);}
.corner.bl{bottom:14px;left:14px;border-bottom:2px solid var(--c4);border-left:2px solid var(--c4);}
.corner.br{bottom:14px;right:14px;border-bottom:2px solid var(--c3);border-right:2px solid var(--c3);}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(2,8,23,0.85);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.logo{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:900;color:var(--c1);letter-spacing:3px;text-shadow:0 0 10px rgba(0,212,255,.5);}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.8rem;text-decoration:none;cursor:pointer;border:1px solid rgba(255,255,255,.08);padding:7px 16px;border-radius:8px;transition:all .2s;background:none;}
.back-btn:hover{color:var(--c1);border-color:var(--c1);}
.header-title{font-size:.85rem;color:var(--text);letter-spacing:1px;}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.wrapper{position:relative;z-index:5;max-width:860px;margin:0 auto;padding:40px 24px 80px;}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.page-hero{text-align:center;margin-bottom:48px;animation:fadeUp .7s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:100px;padding:5px 16px;font-size:.65rem;letter-spacing:3px;color:var(--c1);margin-bottom:20px;}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--c1);box-shadow:0 0 8px var(--c1);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page-hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.page-hero p{color:var(--muted);font-size:.95rem;max-width:500px;margin:0 auto;line-height:1.8;}

/* ══════════════════════════════════════════
   SOLVER PANEL
══════════════════════════════════════════ */
.solver-panel{background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden;backdrop-filter:blur(12px);animation:fadeUp .7s .2s ease both;}
.solver-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:14px;}
.solver-topic-icon{font-size:1.5rem;}
.solver-topic-name{font-weight:700;color:#f1f5f9;font-size:1rem;}
.solver-topic-desc{font-size:.75rem;color:var(--muted);}
.solver-body{padding:24px;}

/* ══════════════════════════════════════════
   INPUTS
══════════════════════════════════════════ */
.inputs-label{font-size:.7rem;letter-spacing:2px;color:var(--muted);font-family:'Orbitron',sans-serif;margin-bottom:14px;}
.inputs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-group label{font-size:.75rem;color:#94a3b8;}
.input-group label span{color:var(--c1);font-size:.7rem;margin-right:4px;}
.input-field{background:#020617;border:1.5px solid #1e293b;color:white;padding:12px 14px;border-radius:10px;outline:none;font-family:'Tajawal',sans-serif;font-size:.9rem;transition:.25s;}
.input-field:focus{border-color:var(--c1);box-shadow:0 0 10px rgba(0,212,255,.2);}
.input-field::placeholder{color:#334155;font-size:.8rem;}
.input-select{background:#020617;border:1.5px solid #1e293b;color:white;padding:12px 14px;border-radius:10px;outline:none;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;transition:.25s;}
.input-select:focus{border-color:var(--c1);}
.input-select option{background:#0f172a;}

/* ══════════════════════════════════════════
   DRAG / TOGGLE GROUP (مقاومة الهواء)
══════════════════════════════════════════ */
.drag-toggle-wrap{border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:12px 14px;background:rgba(0,212,255,.02);}
.drag-toggle-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.drag-toggle-icon{font-size:.7rem;color:var(--c1);width:14px;flex-shrink:0;}
.drag-fields{border-top:1px solid rgba(0,212,255,.1);padding-top:12px;}

/* ══════════════════════════════════════════
   SOLVE BUTTON
══════════════════════════════════════════ */
.solve-btn{width:100%;padding:16px;background:linear-gradient(90deg,var(--c1),var(--c2));color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem;font-family:'Tajawal',sans-serif;letter-spacing:1px;transition:.3s ease;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.solve-btn:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,255,.2);}
.solve-btn:active{transform:translateY(0);}

/* ══════════════════════════════════════════
   INFO BANNER
══════════════════════════════════════════ */
.info-banner{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:10px 16px;margin-bottom:18px;font-size:.78rem;color:var(--c1);display:flex;align-items:center;gap:10px;}

/* ══════════════════════════════════════════
   RESULT SECTION
══════════════════════════════════════════ */
.result-section{margin-top:28px;display:none;animation:fadeUp .5s ease both;}
.result-section.show{display:block;}
.result-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent);margin-bottom:24px;}

/* ══════════════════════════════════════════
   LAWS SECTION
══════════════════════════════════════════ */
.laws-section{margin-bottom:24px;}
.laws-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.laws-title::after{content:'';flex:1;height:1px;background:rgba(0,212,255,.2);}
.law-card{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.law-badge{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2px;color:var(--c1);background:rgba(0,212,255,.1);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.law-latex{flex:1;overflow-x:auto;direction:ltr;}
.law-latex .katex{font-size:.95rem!important;}
.law-desc{font-size:.72rem;color:var(--muted);margin-top:3px;}

/* ══════════════════════════════════════════
   STEPS SECTION
══════════════════════════════════════════ */
.steps-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c4);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.steps-title::after{content:'';flex:1;height:1px;background:rgba(16,185,129,.2);}
.step{background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:start;}
.step-num{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--c4);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.step-math{overflow-x:auto;direction:ltr;}
.step-math .katex{font-size:.95rem!important;}
.step-note{font-size:.7rem;color:var(--c3);margin-top:6px;font-style:italic;}

/* ══════════════════════════════════════════
   RESULT BOX & ERROR BOX
══════════════════════════════════════════ */
.result-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px 24px;margin-top:16px;box-shadow:0 0 20px rgba(16,185,129,.06);}
.result-box-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:3px;color:var(--c4);margin-bottom:12px;}
.result-values{display:flex;flex-wrap:wrap;gap:12px;}
.result-val{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 16px;}
.result-val-name{font-size:.65rem;color:var(--muted);margin-bottom:4px;}
.result-val-num{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--c4);font-weight:700;}
.error-box{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:14px 16px;color:var(--c5);font-size:.82rem;margin-top:16px;}

/* ══════════════════════════════════════════
   VECTOR DISPLAY
══════════════════════════════════════════ */
.vec-display{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
.vec-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:10px;padding:10px 16px;text-align:center;flex:1;min-width:100px;}
.vec-box.y-axis{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.25);}
.vec-box.total{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.25);}
.vec-label{font-size:.6rem;color:var(--muted);letter-spacing:1px;font-family:'Orbitron',sans-serif;margin-bottom:5px;}
.vec-val{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--c1);font-weight:700;}
.vec-box.y-axis .vec-val{color:var(--c4);}
.vec-box.total .vec-val{color:var(--c3);}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:768px){
  .inputs-grid{grid-template-columns:1fr;}
  .result-values{flex-direction:column;}
  .vec-display{flex-direction:column;}
}
@media(max-width:480px){
  header{padding:10px 14px;}
  .wrapper{padding:24px 14px 60px;}
}
</style>
</head>
<body>

<div class="corner tr"></div>
<div class="corner bl"></div>

<!-- ══ HEADER ══ -->
<header>

</header>

<!-- ══ MAIN ══ -->
<div class="wrapper">

  <!-- Hero -->

    <div class="page-badge"><div class="badge-dot"></div>الحركة المستوية · KINEMATICS 2D</div>

    <p>الحركة في المستوى — متجهات الموضع والسرعة والتعجيل، المقذوفات، المنحدرات، والحركة الدائرية</p>
  </section>

  <!-- Solver Panel -->
  <div class="solver-panel" id="solver-panel">

      <div class="solver-topic-icon">🚀</div>
      <div>
        <div class="solver-topic-name">الحركة ببُعدين</div>
        <div class="solver-topic-desc">الحركة في المستوى — متجهات الموضع والسرعة والتعجيل</div>
      </div>

    <div class="solver-body">
      <!-- Subtype selector -->
      <div class="input-group" style="margin-bottom:20px;">
        <label>نوع المسألة</label>

          <option value="2d_proj_full">🎯 حركة المقذوفات (تحليل كامل)</option>
          <option value="2d_object">🚗 حركة الأجسام (منحدر / زاوية)</option>
          <option value="2d_target">🎯 إصابة هدف محدد</option>
          <option value="2d_circ">🔄 الحركة الدائرية</option>

<script>
/* ══════════════════════════════════════════
   CANVAS BACKGROUND
══════════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H, orbs;

function initCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  orbs = [
    {x:W*.15, y:H*.3,  r:350, color:'rgba(0,212,255,',  speed:.0003,  phase:0},
    {x:W*.85, y:H*.6,  r:400, color:'rgba(16,185,129,', speed:.0004,  phase:2},
    {x:W*.5,  y:H*.9,  r:280, color:'rgba(124,58,237,', speed:.00035, phase:4},
  ];
}

function drawCanvas() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020817';
  ctx.fillRect(0, 0, W, H);
  for (const o of orbs) {
    o.phase += o.speed;
    const ox = o.x + Math.sin(o.phase) * 70;
    const oy = o.y + Math.cos(o.phase * .7) * 50;
    const g  = ctx.createRadialGradient(ox, oy, 0, ox, oy, o.r);
    g.addColorStop(0,   o.color + '0.06)');
    g.addColorStop(.5,  o.color + '0.02)');
    g.addColorStop(1,   o.color + '0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ox, oy, o.r, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(drawCanvas);
}
window.addEventListener('resize', initCanvas);
initCanvas();
requestAnimationFrame(drawCanvas);


/* ══════════════════════════════════════════
   INPUT DEFINITIONS
══════════════════════════════════════════ */
const INPUTS = {
  '2d_proj_full': [
    {id:'v0',    label:'السرعة الابتدائية v₀',        unit:'m/s',    placeholder:'مثال: 30'},
    {id:'theta', label:'زاوية الانطلاق θ',             unit:'درجة °', placeholder:'مثال: 45'},
    {id:'h0',    label:'الارتفاع الابتدائي h₀',        unit:'m',      placeholder:'0 إذا من الأرض'},
    {id:'t0',    label:'الزمن الابتدائي t₀ (اختياري)', unit:'s',      placeholder:'0 إذا لم يُذكر'},
    {id:'g',     label:'قيمة التعجيل g',               unit:'m/s²',   placeholder:'9.8'},
  ],
  '2d_object': [
    {id:'v0',    label:'السرعة الابتدائية v₀',               unit:'m/s',      placeholder:'مثال: 10'},
    {id:'theta', label:'زاوية المنحدر θ',                    unit:'درجة °',   placeholder:'مثال: 30'},
    {id:'m',     label:'الكتلة m',                           unit:'kg',       placeholder:'مثال: 5'},
    {id:'g',     label:'تسارع الجاذبية g',                   unit:'m/s²',     placeholder:'9.8'},
    {id:'a_in',  label:'التسارع a (اختياري)',                unit:'m/s²',     placeholder:'اتركه إذا مجهول'},
    {id:'d_in',  label:'المسافة d (اختياري)',                unit:'m',        placeholder:'اتركه إذا مجهولة'},
    {id:'t',     label:'الزمن t (اختياري)',                   unit:'s',        placeholder:'اتركه إذا مجهول'},
    {id:'t_ask', label:'زمن إيجاد الموضع والسرعة (اختياري)', unit:'s',        placeholder:'مثال: 3'},
    {id:'mu',    label:'معامل الاحتكاك μ (اختياري)',         unit:'بلا وحدة', placeholder:'0 إذا أملس'},
    {id:'b',     label:'مقاومة الهواء b (اختياري)',          unit:'N·s/m',    placeholder:'0 إذا مهمل'},
  ],
  '2d_target': [
    {id:'v0',  label:'السرعة الابتدائية v₀',  unit:'m/s',  placeholder:'مثال: 20'},
    {id:'R',   label:'المسافة الأفقية R',      unit:'m',    placeholder:'مثال: 30'},
    {id:'hy',  label:'ارتفاع الهدف (اختياري)', unit:'m',    placeholder:'0 إذا على نفس المستوى'},
    {id:'g',   label:'تسارع الجاذبية g',       unit:'m/s²', placeholder:'9.8'},
    {id:'m',   label:'الكتلة m (اختياري)',      unit:'kg',   placeholder:'مثال: 0.5'},
    {id:'vol', label:'الحجم V (اختياري)',       unit:'m³',   placeholder:'مثال: 0.001'},
    {
      id:'drag_toggle', isCheckbox:true,
      label:'مقاومة الهواء',
      sublabel:'عند التفعيل تُستخدم القيم الافتراضية تلقائياً',
      fields:[
        {id:'rho', label:'كثافة الهواء ρ', unit:'kg/m³', placeholder:'1.225 (افتراضي)', default:'1.225'},
        {id:'Cd',  label:'معامل السحب Cd', unit:'—',     placeholder:'0.47 كرة / 0.04 صاروخ', default:'0.47'},
        {id:'A',   label:'مساحة المقطع A', unit:'m²',    placeholder:'تلقائي من الحجم إن أمكن'},
      ]
    },
  ],
  '2d_circ': [
    {id:'r', label:'نصف القطر r', unit:'m',   placeholder:'مثال: 5'},
    {id:'v', label:'السرعة v',    unit:'m/s', placeholder:'مثال: 10'},
    {id:'m', label:'الكتلة m',    unit:'kg',  placeholder:'مثال: 2 (اختياري)'},
  ],
};

const BANNERS = {
  '2d_proj_full': '🎯 التحليل الكامل لحركة المقذوفات: يحسب المركبتين، أقصى ارتفاع وزمنه، المدى الكلي، الزمن الكلي، والسرعة النهائية قبل الارتطام.',
  '2d_object':    '🚗 حركة جسم على منحدر أو بزاوية: يحسب مركبتي السرعة، التسارع الفعلي مع الاحتكاك ومقاومة الهواء، السرعة النهائية، والمسافة.',
  '2d_target':    '🎯 إصابة هدف محدد: أدخل السرعة والمسافة، سيعطيك الزوايا الممكنة للإصابة، أو يحسب السرعة المطلوبة إذا كانت السرعة غير كافية.',
};


/* ══════════════════════════════════════════
   BUILD INPUTS HTML
══════════════════════════════════════════ */
function buildInputsHTML(subtypeId) {
  const inputs = INPUTS[subtypeId];
  if (!inputs) return '';
  let html = '<div class="inputs-grid">';
  for (const inp of inputs) {
    if (inp.isCheckbox) {
      const uid = 'inp-' + inp.id;
      html += `
        <div class="input-group drag-toggle-wrap" style="grid-column:1/-1;">
          <div class="drag-toggle-header" onclick="toggleDragGroup('${uid}')">
            <span class="drag-toggle-icon" id="${uid}-icon">▶</span>
            <label style="cursor:pointer;margin:0">
              <input type="checkbox" id="${uid}-cb" onchange="toggleDragGroup('${uid}')"
                     style="accent-color:var(--c1);width:15px;height:15px;cursor:pointer;">
              &nbsp;${inp.label}
            </label>
            <span style="font-size:.68rem;color:var(--muted);margin-right:auto">${inp.sublabel || ''}</span>
          </div>
          <div class="drag-fields" id="${uid}-fields" style="display:none;margin-top:10px;">
            <div class="inputs-grid" style="margin:0">`;
      for (const f of inp.fields) {
        html += `
              <div class="input-group">
                <label><span>[${f.unit}]</span>${f.label}</label>
                <input class="input-field" type="text" id="inp-${f.id}"
                       placeholder="${f.placeholder}" autocomplete="off"
                       data-default="${f.default || ''}">
              </div>`;
      }
      html += `</div></div></div>`;
    } else if (inp.isSelect) {
      html += `
        <div class="input-group">
          <label><span>[${inp.unit || ''}]</span>${inp.label}</label>
          <select class="input-select" id="inp-${inp.id}">
            ${inp.options.map(o => `<option value="${o}">${o}</option>`).join('')}
          </select>
        </div>`;
    } else {
      html += `
        <div class="input-group">
          <label><span>[${inp.unit}]</span>${inp.label}</label>
          <input class="input-field" type="text" id="inp-${inp.id}"
                 placeholder="${inp.placeholder}" autocomplete="off">
        </div>`;
    }
  }
  html += '</div>';
  return html;
}


/* ══════════════════════════════════════════
   TOGGLE DRAG GROUP (مقاومة الهواء)
══════════════════════════════════════════ */
function toggleDragGroup(uid) {
  const cb     = document.getElementById(uid + '-cb');
  const fields = document.getElementById(uid + '-fields');
  const icon   = document.getElementById(uid + '-icon');
  if (!cb || !fields) return;
  const open = cb.checked;
  fields.style.display = open ? 'block' : 'none';
  if (icon) icon.textContent = open ? '▼' : '▶';
  if (open) {
    fields.querySelectorAll('input[data-default]').forEach(el => {
      if (!el.value && el.dataset.default) el.value = el.dataset.default;
    });
  }
}


/* ══════════════════════════════════════════
   SUBTYPE CHANGE
══════════════════════════════════════════ */
function onSubtypeChange() {
  const sub = document.getElementById('subtype-2d').value;
  document.getElementById('inputs-area').innerHTML = buildInputsHTML(sub);
  document.getElementById('banner-area').innerHTML =
    BANNERS[sub] ? `<div class="info-banner">${BANNERS[sub]}</div>` : '';
  const res = document.getElementById('result-2d');
  if (res) res.classList.remove('show');
}

// تهيئة عند التحميل
onSubtypeChange();


/* ══════════════════════════════════════════
   GET VALUE HELPER
══════════════════════════════════════════ */
function getVal(key) {
  const el = document.getElementById('inp-' + key);
  if (!el) return null;
  if (el.tagName === 'SELECT') return el.value;
  const v = el.value.trim();
  if (v === '') return null;
  return parseFloat(v.replace(/e/gi, 'e'));
}


/* ══════════════════════════════════════════
   TRIGGER SOLVE
══════════════════════════════════════════ */
function triggerSolve() {
  const sub    = document.getElementById('subtype-2d').value;
  const result = solve2D(sub);
  const resEl  = document.getElementById('result-2d');
  const contEl = document.getElementById('result-content-2d');
  contEl.innerHTML = result;
  resEl.classList.add('show');
  resEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}


/* ══════════════════════════════════════════
   KATEX RENDER HELPER
══════════════════════════════════════════ */
function K(latex, block = false) {
  const el = document.createElement('span');
  try {
    katex.render(latex, el, {throwOnError:false, displayMode:block, strict:false});
  } catch(e) {
    el.textContent = latex;
  }
  return el.outerHTML;
}


/* ══════════════════════════════════════════
   FORMATTING HELPERS
══════════════════════════════════════════ */
function fmt(n, decimals = 4) {
  if (n === null || n === undefined || isNaN(n)) return '؟';
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  if (Math.abs(n) >= 1e6 || (Math.abs(n) < 1e-3 && n !== 0)) return n.toExponential(3);
  return parseFloat(n.toFixed(decimals)).toString();
}

function lawCard(badge, latex, desc = '') {
  return `<div class="law-card">
    <span class="law-badge">${badge}</span>
    <div>
      <div class="law-latex">${K(latex)}</div>
      ${desc ? `<div class="law-desc">${desc}</div>` : ''}
    </div>
  </div>`;
}

function step(num, label, latex, note = '') {
  return `<div class="step">
    <div class="step-num">${String(num).padStart(2, '0')}</div>
    <div class="step-content">
      <div class="step-label">${label}</div>
      <div class="step-math">${K(latex)}</div>
      ${note ? `<div class="step-note">${note}</div>` : ''}
    </div>
  </div>`;
}

function resultBox(values) {
  const valsHtml = values.map(v =>
    `<div class="result-val">
      <div class="result-val-name">${v.name}</div>
      <div class="result-val-num">${v.val} ${v.unit || ''}</div>
    </div>`
  ).join('');
  return `<div class="result-box">
    <div class="result-box-label">// النتائج النهائية</div>
    <div class="result-values">${valsHtml}</div>
  </div>`;
}

function errorBox(msg) {
  return `<div class="error-box">⚠️ ${msg}</div>`;
}

function vecDisplay(xVal, yVal, totalVal,
  xLabel = 'x', yLabel = 'y', totalLabel = 'المتجه الكلي',
  xUnit = '', yUnit = '', totalUnit = '') {
  return `<div class="vec-display">
    <div class="vec-box">
      <div class="vec-label">محور ${xLabel}</div>
      <div class="vec-val">${fmt(xVal,3)} ${xUnit}</div>
    </div>
    <div class="vec-box y-axis">
      <div class="vec-label">محور ${yLabel}</div>
      <div class="vec-val">${fmt(yVal,3)} ${yUnit}</div>
    </div>
    <div class="vec-box total">
      <div class="vec-label">${totalLabel}</div>
      <div class="vec-val">${fmt(totalVal,3)} ${totalUnit}</div>
    </div>
  </div>`;
}

function lawsSection(cards) {
  return `<div class="laws-section">
    <div class="laws-title">القوانين المستخدمة</div>
    ${cards}
  </div>`;
}

function stepsSection(steps) {
  return `<div>
    <div class="steps-title">خطوات الحل</div>
    ${steps}
  </div>`;
}


/* ══════════════════════════════════════════
   SOLVER: 2D KINEMATICS
══════════════════════════════════════════ */
function solve2D(sub) {

  /* ────────────────────────────────────────
     حركة المقذوفات — تحليل كامل
  ──────────────────────────────────────── */
  if (sub === '2d_proj_full') {
    const v0    = getVal('v0');
    const theta = getVal('theta');
    const h0    = getVal('h0') ?? 0;
    const t0    = getVal('t0') ?? 0;
    const g     = getVal('g')  ?? 9.8;

    if (!v0 || theta === null) return errorBox('أدخل السرعة الابتدائية v₀ وزاوية الانطلاق θ');

    const thR  = theta * Math.PI / 180;
    const vix  = v0 * Math.cos(thR);
    const viy  = v0 * Math.sin(thR);

    // زمن ومكان أقصى ارتفاع
    const t_peak  = t0 + viy / g;
    const dt_peak = t_peak - t0;
    const H_max   = h0 + viy * dt_peak - 0.5 * g * dt_peak * dt_peak;
    const R_up    = vix * dt_peak;

    // الزمن الكلي (حل تربيعي: h0 + viy*τ - 0.5g*τ² = 0)
    const A    = 0.5 * g;
    const B    = -viy;
    const C    = -h0;
    const disc = B * B - 4 * A * C;
    if (disc < 0) return errorBox('لا يوجد حل حقيقي');

    const tau     = (-B + Math.sqrt(disc)) / (2 * A);
    const T_total = t0 + tau;

    // المدى الكلي والسرعة النهائية
    const R_T         = h0 === 0 ? v0 * v0 * Math.sin(2 * thR) / g : vix * tau;
    const vxf         = vix;
    const vyf         = viy - g * tau;
    const vf          = Math.sqrt(vxf * vxf + vyf * vyf);
    const angle_final = Math.atan2(Math.abs(vyf), Math.abs(vxf)) * 180 / Math.PI;

    let sH = '';
    sH += step(1, 'المعطيات',         `v_0=${v0}\\,m/s,\\;\\theta=${theta}°,\\;h_0=${h0}\\,m,\\;g=${g}\\,m/s^2`);
    sH += step(2, 'تحليل المركبتين',  `v_{ix}=${fmt(vix,3)}\\,m/s,\\quad v_{iy}=${fmt(viy,3)}\\,m/s`);
    sH += step(3, 'زمن أقصى ارتفاع', `t_{peak}=${fmt(t_peak,3)}\\,s`);
    sH += step(4, 'أقصى ارتفاع',     `H=${fmt(H_max,3)}\\,m`);
    sH += step(5, 'المدى عند القمة', `R_{\\uparrow}=${fmt(R_up,3)}\\,m`);
    sH += step(6, 'الزمن الكلي',     `T=${fmt(T_total,3)}\\,s`);
    sH += step(7, 'المدى الكلي',     `R_T=${fmt(R_T,3)}\\,m`);
    sH += step(8, 'السرعة النهائية', `v_f=${fmt(vf,3)}\\,m/s,\\;\\theta_f=${fmt(angle_final,1)}°`);

    return lawsSection(
      lawCard('تحليل',   'v_{ix}=v_0\\cos\\theta,\\;v_{iy}=v_0\\sin\\theta') +
      lawCard('المدى',   'R_T=v_0^2\\sin2\\theta/g') +
      lawCard('أقصى H', 'H=h_0+v_{iy}^2/(2g)')
    ) +
    `<div style="margin:14px 0 4px"><div class="laws-title">📊 ملخص المركبتين</div>` +
    vecDisplay(vix, viy, v0, 'x', 'y', '|v₀|', 'm/s', 'm/s', 'm/s') +
    `</div>` +
    stepsSection(sH) +
    resultBox([
      {name:'vᵢₓ',        val:fmt(vix,3),         unit:'m/s'},
      {name:'vᵢᵧ',        val:fmt(viy,3),         unit:'m/s'},
      {name:'t_peak',     val:fmt(t_peak,3),      unit:'s'},
      {name:'H max',      val:fmt(H_max,3),       unit:'m'},
      {name:'T total',    val:fmt(T_total,3),     unit:'s'},
      {name:'Rₜ المدى',  val:fmt(R_T,3),         unit:'m'},
      {name:'|vf|',       val:fmt(vf,3),          unit:'m/s'},
      {name:'θf',         val:fmt(angle_final,1), unit:'°'},
    ]);
  }

  /* ────────────────────────────────────────
     حركة جسم على منحدر / بزاوية
  ──────────────────────────────────────── */
  if (sub === '2d_object') {
    const v0    = getVal('v0')    ?? 0;
    const theta = getVal('theta');
    const m     = getVal('m');
    const g     = getVal('g')    ?? 9.8;
    const a_in  = getVal('a_in');
    const d_in  = getVal('d_in');
    let   t     = getVal('t');
    const tAsk  = getVal('t_ask');
    const mu    = getVal('mu')   ?? 0;
    const b     = getVal('b')    ?? 0;

    if (theta === null) return errorBox('أدخل زاوية المنحدر θ');
    if (m     === null) return errorBox('أدخل كتلة الجسم m');

    const thR   = theta * Math.PI / 180;
    const vx0   = v0 * Math.cos(thR);
    const vy0   = v0 * Math.sin(thR);
    const N     = m * g * Math.cos(thR);
    const a_grav = g * Math.sin(thR);
    const a_fric = mu * g * Math.cos(thR);
    const a_drag = b * v0 / m;
    const a_net  = a_in !== null ? a_in : (a_grav - a_fric - a_drag);

    let vf = null, d = null;
    if (d_in !== null) {
      d  = d_in;
      vf = Math.sqrt(Math.max(0, v0 * v0 + 2 * a_net * d));
      if (t === null && a_net !== 0) t = (vf - v0) / a_net;
    }
    if (t !== null && vf === null) {
      vf = v0 + a_net * t;
      d  = v0 * t + 0.5 * a_net * t * t;
    }

    let sH = '', sn = 1;
    sH += step(sn++, 'المعطيات',       `v_0=${v0}\\,m/s,\\;\\theta=${theta}°,\\;m=${m}\\,kg`);
    sH += step(sn++, 'القوة العمودية', `N=mg\\cos\\theta=${fmt(N,3)}\\,N`);
    sH += step(sn++, 'التسارع الصافي', `a_{net}=${fmt(a_net,3)}\\,m/s^2`);
    if (vf !== null) sH += step(sn++, 'السرعة النهائية', `v_f=${fmt(vf,3)}\\,m/s`);
    if (d  !== null) sH += step(sn++, 'المسافة',         `d=${fmt(d,3)}\\,m`);

    let v_ask = null, x_ask = null;
    if (tAsk !== null) {
      v_ask = v0 + a_net * tAsk;
      x_ask = v0 * tAsk + 0.5 * a_net * tAsk * tAsk;
      sH += step(sn++, `عند t=${tAsk}`, `v=${fmt(v_ask,3)}\\,m/s,\\;x=${fmt(x_ask,3)}\\,m`);
    }

    return lawsSection(
      lawCard('N',     'N=mg\\cos\\theta') +
      lawCard('a_net', 'a=g\\sin\\theta-\\mu g\\cos\\theta') +
      lawCard('vf',    'v_f^2=v_0^2+2a_{net}d')
    ) +
    `<div style="margin:14px 0 4px"><div class="laws-title">📐 تحليل السرعة الابتدائية</div>` +
    vecDisplay(vx0, vy0, v0, 'x', 'y', '|v₀|', 'm/s', 'm/s', 'm/s') +
    `</div>` +
    stepsSection(sH) +
    resultBox([
      {name:'N القوة العمودية', val:fmt(N,3),     unit:'N'},
      {name:'a_net التسارع',   val:fmt(a_net,3), unit:'m/s²'},
      ...(vf !== null ? [{name:'vf', val:fmt(vf,3), unit:'m/s'}] : []),
      ...(d  !== null ? [{name:'d',  val:fmt(d,3),  unit:'m'}]   : []),
      ...(tAsk !== null && v_ask !== null
        ? [{name:`v عند t=${tAsk}`, val:fmt(Math.abs(v_ask),3), unit:'m/s'}]
        : []),
    ]);
  }

  /* ────────────────────────────────────────
     إصابة هدف محدد
  ──────────────────────────────────────── */
  if (sub === '2d_target') {
    const v0  = getVal('v0');
    const R   = getVal('R');
    const hy  = getVal('hy') ?? 0;
    const g   = getVal('g')  ?? 9.8;

    if (!v0) return errorBox('أدخل السرعة الابتدائية v₀');
    if (!R)  return errorBox('أدخل المسافة الأفقية R');

    const v_min = Math.sqrt(g * (hy + Math.sqrt(R * R + hy * hy)));
    const k     = (g * R * R) / (2 * v0 * v0);
    let angles  = [];

    if (v0 >= v_min) {
      const Aq = k, Bq = -R, Cq = k + hy;
      const disc = Bq * Bq - 4 * Aq * Cq;
      if (disc >= 0) {
        const t1  = (-Bq + Math.sqrt(disc)) / (2 * Aq);
        const t2  = (-Bq - Math.sqrt(disc)) / (2 * Aq);
        const th1 = Math.atan(t1) * 180 / Math.PI;
        const th2 = Math.atan(t2) * 180 / Math.PI;
        if (th1 > 0 && th1 < 90) angles.push(th1);
        if (th2 > 0 && th2 < 90 && Math.abs(th2 - th1) > 0.01) angles.push(th2);
        angles.sort((a, b) => a - b);
      }
    }

    const flightTimes = angles.map(th => R / (v0 * Math.cos(th * Math.PI / 180)));
    let sH = '', sn = 1;
    sH += step(sn++, 'المعطيات',            `v_0=${v0}\\,m/s,\\;R=${R}\\,m,\\;h_y=${hy}\\,m`);
    sH += step(sn++, 'أقل سرعة مطلوبة',    `v_{min}=${fmt(v_min,3)}\\,m/s`);
    if (v0 >= v_min && angles.length > 0) {
      angles.forEach((th, i) =>
        sH += step(sn++, `الزاوية ${i + 1}`,
          `\\theta_${i+1}=${fmt(th,2)}°,\\;t=${fmt(flightTimes[i],3)}\\,s`)
      );
    }

    let resultHTML = '';
    if (v0 >= v_min && angles.length > 0) {
      resultHTML = `<div class="result-box" style="border-color:rgba(16,185,129,.5);">
        <div class="result-box-label" style="color:var(--c4)">✅ الزوايا الممكنة</div>
        <div class="result-values">`;
      angles.forEach((th, i) => {
        resultHTML += `<div class="result-val" style="border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);">
          <div class="result-val-name" style="color:var(--c4)">${i === 0 ? 'الزاوية الأولى (منخفضة)' : 'الزاوية الثانية (مرتفعة)'}</div>
          <div class="result-val-num" style="color:var(--c4);font-size:1.4rem">${fmt(th,2)}°</div>
        </div>`;
      });
      resultHTML += '</div></div>';
    } else {
      const theta_opt = 0.5 * (Math.PI / 2 + Math.atan2(hy, R)) * 180 / Math.PI;
      resultHTML = `<div class="result-box" style="border-color:rgba(255,71,87,.5);background:rgba(255,71,87,.06);">
        <div class="result-box-label" style="color:var(--c5)">❌ السرعة غير كافية</div>
        <div class="result-values">
          <div class="result-val" style="border-color:rgba(255,71,87,.4);">
            <div class="result-val-name" style="color:var(--c5)">أقل سرعة مطلوبة</div>
            <div class="result-val-num" style="color:var(--c5)">${fmt(v_min,3)} m/s</div>
          </div>
          <div class="result-val" style="border-color:rgba(16,185,129,.4);">
            <div class="result-val-name" style="color:var(--c4)">الزاوية المثلى</div>
            <div class="result-val-num" style="color:var(--c4)">${fmt(theta_opt,2)}°</div>
          </div>
        </div>
      </div>`;
    }

    return lawsSection(
      lawCard('v_min', 'v_{min}=\\sqrt{g(h_y+\\sqrt{R^2+h_y^2})}')
    ) + stepsSection(sH) + resultHTML;
  }

  /* ────────────────────────────────────────
     الحركة الدائرية
  ──────────────────────────────────────── */
  if (sub === '2d_circ') {
    const r = getVal('r');
    const v = getVal('v');
    const m = getVal('m');

    if (!r || !v) return errorBox('أدخل r وv');

    const ac = v * v / r;
    const Fc = m ? m * v * v / r : null;
    const T  = 2 * Math.PI * r / v;

    let sH = '';
    sH += step(1, 'المعطيات',         `r=${r}\\,m,\\;v=${v}\\,m/s`);
    sH += step(2, 'التسارع المركزي',  `a_c=v^2/r=${fmt(ac,3)}\\,m/s^2`);
    if (m) sH += step(3, 'القوة المركزية', `F_c=mv^2/r=${fmt(Fc,3)}\\,N`);
    sH += step(m ? 4 : 3, 'الدورة الزمنية', `T=2\\pi r/v=${fmt(T,3)}\\,s`);

    return lawsSection(
      lawCard('a_c', 'a_c=v^2/r') +
      (m ? lawCard('F_c', 'F_c=mv^2/r') : '') +
      lawCard('T', 'T=2\\pi r/v')
    ) + stepsSection(sH) + resultBox([
      {name:'aₒ',  val:fmt(ac,3), unit:'m/s²'},
      ...(m ? [{name:'Fc', val:fmt(Fc,3), unit:'N'}] : []),
      {name:'T',   val:fmt(T,3),  unit:'s'},
    ]);
  }

  return errorBox('اختر نوع المسألة');
}
</script>
