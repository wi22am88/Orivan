<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الكهرومغناطيسية | ELECTROMAGNETISM</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
/* ══════════════════════════════════════════
   CSS VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --bg:    #020817;
  --bg2:   #030d1f;
  --c1:    #00d4ff;
  --c2:    #7c3aed;
  --c3:    #f59e0b;
  --c4:    #10b981;
  --c5:    #ff4757;
  --text:  #e2e8f0;
  --muted: #64748b;
  --card:  rgba(15,23,42,0.9);
  --border:rgba(0,212,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;overflow-x:hidden;}

/* ══════════════════════════════════════════
   BACKGROUND & DECORATIONS
══════════════════════════════════════════ */
#bg-canvas{position:fixed;inset:0;z-index:0;}
.grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:50px 50px;}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
.corner{position:fixed;width:36px;height:36px;z-index:10;pointer-events:none;}
.corner.tl{top:14px;left:14px;border-top:2px solid var(--c1);border-left:2px solid var(--c1);}
.corner.tr{top:14px;right:14px;border-top:2px solid var(--c2);border-right:2px solid var(--c2);}
.corner.bl{bottom:14px;left:14px;border-bottom:2px solid var(--c4);border-left:2px solid var(--c4);}
.corner.br{bottom:14px;right:14px;border-bottom:2px solid var(--c3);border-right:2px solid var(--c3);}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(2,8,23,0.85);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.logo{font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:900;color:var(--c1);letter-spacing:3px;text-shadow:0 0 10px rgba(0,212,255,.5);}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.8rem;text-decoration:none;cursor:pointer;border:1px solid rgba(255,255,255,.08);padding:7px 16px;border-radius:8px;transition:all .2s;background:none;}
.back-btn:hover{color:var(--c1);border-color:var(--c1);}
.header-title{font-size:.85rem;color:var(--text);letter-spacing:1px;}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.wrapper{position:relative;z-index:5;max-width:860px;margin:0 auto;padding:40px 24px 80px;}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.page-hero{text-align:center;margin-bottom:48px;animation:fadeUp .7s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.page-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:100px;padding:5px 16px;font-size:.65rem;letter-spacing:3px;color:var(--c1);margin-bottom:20px;}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--c1);box-shadow:0 0 8px var(--c1);animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page-hero h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;}
.page-hero p{color:var(--muted);font-size:.95rem;max-width:500px;margin:0 auto;line-height:1.8;}

/* ══════════════════════════════════════════
   SOLVER PANEL
══════════════════════════════════════════ */
.solver-panel{background:var(--card);border-radius:20px;border:1px solid var(--border);overflow:hidden;backdrop-filter:blur(12px);animation:fadeUp .7s .2s ease both;}
.solver-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:14px;}
.solver-topic-icon{font-size:1.5rem;}
.solver-topic-name{font-weight:700;color:#f1f5f9;font-size:1rem;}
.solver-topic-desc{font-size:.75rem;color:var(--muted);}
.solver-body{padding:24px;}

/* ══════════════════════════════════════════
   INPUTS
══════════════════════════════════════════ */
.inputs-label{font-size:.7rem;letter-spacing:2px;color:var(--muted);font-family:'Orbitron',sans-serif;margin-bottom:14px;}
.inputs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-group label{font-size:.75rem;color:#94a3b8;}
.input-group label span{color:var(--c1);font-size:.7rem;margin-right:4px;}
.input-field{background:#020617;border:1.5px solid #1e293b;color:white;padding:12px 14px;border-radius:10px;outline:none;font-family:'Tajawal',sans-serif;font-size:.9rem;transition:.25s;}
.input-field:focus{border-color:var(--c1);box-shadow:0 0 10px rgba(0,212,255,.2);}
.input-field::placeholder{color:#334155;font-size:.8rem;}
.input-select{background:#020617;border:1.5px solid #1e293b;color:white;padding:12px 14px;border-radius:10px;outline:none;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;transition:.25s;}
.input-select:focus{border-color:var(--c1);}
.input-select option{background:#0f172a;}

/* ══════════════════════════════════════════
   SOLVE BUTTON
══════════════════════════════════════════ */
.solve-btn{width:100%;padding:16px;background:linear-gradient(90deg,var(--c1),var(--c2));color:#fff;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:1rem;font-family:'Tajawal',sans-serif;letter-spacing:1px;transition:.3s ease;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.solve-btn:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,212,255,.2);}
.solve-btn:active{transform:translateY(0);}

/* ══════════════════════════════════════════
   INFO BADGE (تجاذب / تنافر)
══════════════════════════════════════════ */
.nature-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:700;margin-top:12px;}
.nature-badge.attract{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);color:var(--c4);}
.nature-badge.repel{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.3);color:var(--c5);}

/* ══════════════════════════════════════════
   RESULT SECTION
══════════════════════════════════════════ */
.result-section{margin-top:28px;display:none;animation:fadeUp .5s ease both;}
.result-section.show{display:block;}
.result-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent);margin-bottom:24px;}

/* ══════════════════════════════════════════
   LAWS SECTION
══════════════════════════════════════════ */
.laws-section{margin-bottom:24px;}
.laws-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.laws-title::after{content:'';flex:1;height:1px;background:rgba(0,212,255,.2);}
.law-card{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.law-badge{font-family:'Orbitron',sans-serif;font-size:.5rem;letter-spacing:2px;color:var(--c1);background:rgba(0,212,255,.1);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.law-latex{flex:1;overflow-x:auto;direction:ltr;}
.law-latex .katex{font-size:.95rem!important;}
.law-desc{font-size:.72rem;color:var(--muted);margin-top:3px;}

/* ══════════════════════════════════════════
   STEPS SECTION
══════════════════════════════════════════ */
.steps-title{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:3px;color:var(--c4);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.steps-title::after{content:'';flex:1;height:1px;background:rgba(16,185,129,.2);}
.step{background:rgba(15,23,42,.8);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:40px 1fr;gap:12px;align-items:start;}
.step-num{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--c4);background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-label{font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.step-math{overflow-x:auto;direction:ltr;}
.step-math .katex{font-size:.95rem!important;}
.step-note{font-size:.7rem;color:var(--c3);margin-top:6px;font-style:italic;}

/* ══════════════════════════════════════════
   RESULT BOX & ERROR BOX
══════════════════════════════════════════ */
.result-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px 24px;margin-top:16px;box-shadow:0 0 20px rgba(16,185,129,.06);}
.result-box-label{font-family:'Orbitron',sans-serif;font-size:.55rem;letter-spacing:3px;color:var(--c4);margin-bottom:12px;}
.result-values{display:flex;flex-wrap:wrap;gap:12px;}
.result-val{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 16px;}
.result-val-name{font-size:.65rem;color:var(--muted);margin-bottom:4px;}
.result-val-num{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--c4);font-weight:700;}
.error-box{background:rgba(255,71,87,.06);border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:14px 16px;color:var(--c5);font-size:.82rem;margin-top:16px;}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:768px){
  .inputs-grid{grid-template-columns:1fr;}
  .result-values{flex-direction:column;}
}
@media(max-width:480px){
  header{padding:10px 14px;}
  .wrapper{padding:24px 14px 60px;}
}
</style>
</head>
<body>

<!-- ══ BACKGROUND ══ -->
<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scanlines"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- ══ HEADER ══ -->
<header>
  <a class="back-btn" href="classical.html">← رجوع</a>
  <div class="header-title">الكهرومغناطيسية</div>
  <div class="logo">PHYS·LAB</div>
</header>

<!-- ══ MAIN ══ -->
<div class="wrapper">

  <!-- Hero -->
  <section class="page-hero">
    <div class="page-badge"><div class="badge-dot"></div>الكهرومغناطيسية · ELECTROMAGNETISM</div>
    <h1>⚡ الكهرومغناطيسية</h1>
    <p>قوانين كولوم، المجال الكهربائي، الدوائر الكهربائية — حل المسائل خطوة بخطوة</p>
  </section>

  <!-- Solver Panel -->
  <div class="solver-panel">
    <div class="solver-header">
      <div class="solver-topic-icon">⚡</div>
      <div>
        <div class="solver-topic-name">الكهرومغناطيسية</div>
        <div class="solver-topic-desc">قوانين كولوم، الكهرباء، المغناطيسية</div>
      </div>
    </div>

    <div class="solver-body">
      <!-- Subtype selector -->
      <div class="input-group" style="margin-bottom:20px;">
        <label>نوع المسألة</label>
        <select class="input-select" id="subtype-em" onchange="onSubtypeChange()">
          <option value="em_coulomb">قانون كولوم</option>
          <option value="em_field">المجال الكهربائي E</option>
          <option value="em_circuit">الدوائر الكهربائية (V, I, R)</option>
        </select>
      </div>

      <!-- Inputs area -->
      <div class="inputs-label">// أدخل المعطيات المعروفة</div>
      <div id="inputs-area"></div>

      <!-- Solve button -->
      <button class="solve-btn" onclick="triggerSolve()">
        <span>⚡</span> احسب وأظهر الحل الكامل
      </button>

      <!-- Result -->
      <div class="result-section" id="result-em">
        <div class="result-divider"></div>
        <div id="result-content-em"></div>
      </div>
    </div>
  </div>

</div><!-- end .wrapper -->


<script>
/* ══════════════════════════════════════════
   CANVAS BACKGROUND
══════════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H, orbs;

function initCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  orbs = [
    {x:W*.2,  y:H*.25, r:320, color:'rgba(0,212,255,',  speed:.0003,  phase:0},
    {x:W*.8,  y:H*.55, r:380, color:'rgba(124,58,237,', speed:.0004,  phase:2},
    {x:W*.5,  y:H*.85, r:260, color:'rgba(245,158,11,', speed:.00035, phase:4},
  ];
}

function drawCanvas() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#020817';
  ctx.fillRect(0, 0, W, H);
  for (const o of orbs) {
    o.phase += o.speed;
    const ox = o.x + Math.sin(o.phase) * 70;
    const oy = o.y + Math.cos(o.phase * .7) * 50;
    const g  = ctx.createRadialGradient(ox, oy, 0, ox, oy, o.r);
    g.addColorStop(0,  o.color + '0.06)');
    g.addColorStop(.5, o.color + '0.02)');
    g.addColorStop(1,  o.color + '0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(ox, oy, o.r, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(drawCanvas);
}
window.addEventListener('resize', initCanvas);
initCanvas();
requestAnimationFrame(drawCanvas);


/* ══════════════════════════════════════════
   INPUT DEFINITIONS
══════════════════════════════════════════ */
const INPUTS = {
  'em_coulomb': [
    {id:'q1', label:'شحنة q₁', unit:'C', placeholder:'مثال: 2e-6'},
    {id:'q2', label:'شحنة q₂', unit:'C', placeholder:'مثال: 3e-6'},
    {id:'r',  label:'المسافة r', unit:'m', placeholder:'مثال: 0.1'},
  ],
  'em_field': [
    {id:'q', label:'الشحنة q',  unit:'C', placeholder:'مثال: 1e-6'},
    {id:'r', label:'المسافة r', unit:'m', placeholder:'مثال: 0.05'},
  ],
  'em_circuit': [
    {id:'V', label:'الجهد V',    unit:'V', placeholder:'اتركه فارغاً إذا مجهولاً'},
    {id:'I', label:'التيار I',   unit:'A', placeholder:'اتركه فارغاً إذا مجهولاً'},
    {id:'R', label:'المقاومة R', unit:'Ω', placeholder:'اتركه فارغاً إذا مجهولة'},
  ],
};


/* ══════════════════════════════════════════
   BUILD INPUTS HTML
══════════════════════════════════════════ */
function buildInputsHTML(subtypeId) {
  const inputs = INPUTS[subtypeId];
  if (!inputs) return '';
  let html = '<div class="inputs-grid">';
  for (const inp of inputs) {
    html += `
      <div class="input-group">
        <label><span>[${inp.unit}]</span>${inp.label}</label>
        <input class="input-field" type="text" id="inp-${inp.id}"
               placeholder="${inp.placeholder}" autocomplete="off">
      </div>`;
  }
  html += '</div>';
  return html;
}


/* ══════════════════════════════════════════
   SUBTYPE CHANGE
══════════════════════════════════════════ */
function onSubtypeChange() {
  const sub = document.getElementById('subtype-em').value;
  document.getElementById('inputs-area').innerHTML = buildInputsHTML(sub);
  const res = document.getElementById('result-em');
  if (res) res.classList.remove('show');
}

// تهيئة عند التحميل
onSubtypeChange();


/* ══════════════════════════════════════════
   GET VALUE HELPER
══════════════════════════════════════════ */
function getVal(key) {
  const el = document.getElementById('inp-' + key);
  if (!el) return null;
  const v = el.value.trim();
  if (v === '') return null;
  return parseFloat(v.replace(/e/gi, 'e'));
}


/* ══════════════════════════════════════════
   TRIGGER SOLVE
══════════════════════════════════════════ */
function triggerSolve() {
  const sub    = document.getElementById('subtype-em').value;
  const result = solveEM(sub);
  const resEl  = document.getElementById('result-em');
  const contEl = document.getElementById('result-content-em');
  contEl.innerHTML = result;
  resEl.classList.add('show');
  resEl.scrollIntoView({behavior:'smooth', block:'nearest'});
}


/* ══════════════════════════════════════════
   KATEX RENDER HELPER
══════════════════════════════════════════ */
function K(latex, block = false) {
  const el = document.createElement('span');
  try {
    katex.render(latex, el, {throwOnError:false, displayMode:block, strict:false});
  } catch(e) {
    el.textContent = latex;
  }
  return el.outerHTML;
}


/* ══════════════════════════════════════════
   FORMATTING HELPERS
══════════════════════════════════════════ */
function fmt(n, decimals = 4) {
  if (n === null || n === undefined || isNaN(n)) return '؟';
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  if (Math.abs(n) >= 1e6 || (Math.abs(n) < 1e-3 && n !== 0)) return n.toExponential(3);
  return parseFloat(n.toFixed(decimals)).toString();
}

function lawCard(badge, latex, desc = '') {
  return `<div class="law-card">
    <span class="law-badge">${badge}</span>
    <div>
      <div class="law-latex">${K(latex)}</div>
      ${desc ? `<div class="law-desc">${desc}</div>` : ''}
    </div>
  </div>`;
}

function step(num, label, latex, note = '') {
  return `<div class="step">
    <div class="step-num">${String(num).padStart(2, '0')}</div>
    <div class="step-content">
      <div class="step-label">${label}</div>
      <div class="step-math">${K(latex)}</div>
      ${note ? `<div class="step-note">${note}</div>` : ''}
    </div>
  </div>`;
}

function resultBox(values) {
  const valsHtml = values.map(v =>
    `<div class="result-val">
      <div class="result-val-name">${v.name}</div>
      <div class="result-val-num">${v.val} ${v.unit || ''}</div>
    </div>`
  ).join('');
  return `<div class="result-box">
    <div class="result-box-label">// النتائج النهائية</div>
    <div class="result-values">${valsHtml}</div>
  </div>`;
}

function errorBox(msg) {
  return `<div class="error-box">⚠️ ${msg}</div>`;
}

function lawsSection(cards) {
  return `<div class="laws-section">
    <div class="laws-title">القوانين المستخدمة</div>
    ${cards}
  </div>`;
}

function stepsSection(steps) {
  return `<div>
    <div class="steps-title">خطوات الحل</div>
    ${steps}
  </div>`;
}


/* ══════════════════════════════════════════
   SOLVER: ELECTROMAGNETISM
══════════════════════════════════════════ */
const k_coulomb = 8.99e9; // ثابت كولوم k = 8.99×10⁹ N·m²/C²

function solveEM(sub) {

  /* ────────────────────────────────────────
     قانون كولوم
  ──────────────────────────────────────── */
  if (sub === 'em_coulomb') {
    const q1 = getVal('q1');
    const q2 = getVal('q2');
    const r  = getVal('r');

    if (!q1 || !q2 || !r) return errorBox('أدخل الشحنتين والمسافة');

    const F    = k_coulomb * Math.abs(q1) * Math.abs(q2) / (r * r);
    const type = q1 * q2 > 0 ? 'تنافر' : 'تجاذب';
    const isRepel = q1 * q2 > 0;

    return lawsSection(
      lawCard('كولوم', 'F=k\\dfrac{|q_1||q_2|}{r^2}',
        'k = 8.99×10⁹ N·m²/C²')
    ) + stepsSection(
      step(1, 'المعطيات',
        `q_1=${fmt(q1)}\\,C,\\;q_2=${fmt(q2)}\\,C,\\;r=${r}\\,m`) +
      step(2, 'تطبيق قانون كولوم',
        `F=\\frac{k|q_1||q_2|}{r^2}=\\frac{8.99\\times10^9\\times${fmt(Math.abs(q1))}\\times${fmt(Math.abs(q2))}}{${r}^2}`) +
      step(3, 'القوة',
        `F=${fmt(F, 4)}\\,N`) +
      step(4, 'طبيعة التفاعل',
        `q_1 \\times q_2 ${isRepel ? '> 0' : '< 0'} \\Rightarrow \\text{${type}}`)
    ) + resultBox([
      {name:'القوة F',       val:fmt(F, 4),  unit:'N'},
      {name:'طبيعة التفاعل', val:type,       unit:''},
    ]) +
    `<div class="nature-badge ${isRepel ? 'repel' : 'attract'}">
      ${isRepel ? '↔ قوة تنافر' : '↙↗ قوة تجاذب'}
    </div>`;
  }

  /* ────────────────────────────────────────
     المجال الكهربائي E
  ──────────────────────────────────────── */
  if (sub === 'em_field') {
    const q = getVal('q');
    const r = getVal('r');

    if (!q || !r) return errorBox('أدخل الشحنة والمسافة');

    const E = k_coulomb * Math.abs(q) / (r * r);

    return lawsSection(
      lawCard('المجال الكهربائي', 'E=k\\dfrac{|q|}{r^2}',
        'k = 8.99×10⁹ N·m²/C²')
    ) + stepsSection(
      step(1, 'المعطيات',
        `q=${fmt(q)}\\,C,\\;r=${r}\\,m`) +
      step(2, 'تطبيق القانون',
        `E=\\frac{k|q|}{r^2}=\\frac{8.99\\times10^9\\times${fmt(Math.abs(q))}}{${r}^2}`) +
      step(3, 'شدة المجال',
        `E=${fmt(E, 4)}\\,N/C`)
    ) + resultBox([
      {name:'شدة المجال E', val:fmt(E, 4), unit:'N/C'},
    ]);
  }

  /* ────────────────────────────────────────
     الدوائر الكهربائية — قانون أوم + القدرة
  ──────────────────────────────────────── */
  let V = getVal('V');
  let I = getVal('I');
  let R = getVal('R');

  if ([V, I, R].filter(x => x !== null).length < 2)
    return errorBox('أدخل قيمتين على الأقل من (V, I, R)');

  let stepH = '';
  let stepN = 2;

  if (V === null) {
    V = I * R;
    stepH = step(stepN++, 'الجهد',
      `V=IR=${fmt(I)}\\times${fmt(R)}=${fmt(V, 3)}\\,V`);
  } else if (I === null) {
    I = V / R;
    stepH = step(stepN++, 'التيار',
      `I=\\frac{V}{R}=\\frac{${fmt(V)}}{${fmt(R)}}=${fmt(I, 3)}\\,A`);
  } else if (R === null) {
    R = V / I;
    stepH = step(stepN++, 'المقاومة',
      `R=\\frac{V}{I}=\\frac{${fmt(V)}}{${fmt(I)}}=${fmt(R, 3)}\\,\\Omega`);
  }

  const P = V * I;
  const E_per_sec = P; // طاقة في الثانية = القدرة

  return lawsSection(
    lawCard('أوم',    'V=IR') +
    lawCard('القدرة', 'P=VI') +
    lawCard('الطاقة', 'E=Pt')
  ) + stepsSection(
    step(1, 'المعطيات',
      `V=${fmt(V)}\\,V,\\;I=${fmt(I)}\\,A,\\;R=${fmt(R)}\\,\\Omega`) +
    stepH +
    step(stepN++, 'القدرة الكهربائية',
      `P=VI=${fmt(V, 3)}\\times${fmt(I, 3)}=${fmt(P, 3)}\\,W`)
  ) + resultBox([
    {name:'الجهد V',    val:fmt(V, 3), unit:'V'},
    {name:'التيار I',   val:fmt(I, 3), unit:'A'},
    {name:'المقاومة R', val:fmt(R, 3), unit:'Ω'},
    {name:'القدرة P',   val:fmt(P, 3), unit:'W'},
  ]);
}
</script>
