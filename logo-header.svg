<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 46" width="280" height="46">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="gc" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gp" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="ib" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#060f1e"/>
    </radialGradient>
  </defs>

  <!-- ══ ICON ══ -->
  <g transform="translate(23, 23)">
    <!-- Outer hex -->
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10"
      fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.5"/>
    <!-- Inner hex filled -->
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7"
      fill="url(#ib)" stroke="url(#g1)" stroke-width="1.5" filter="url(#gc)"/>
    <!-- Orbitals -->
    <ellipse cx="0" cy="0" rx="8" ry="3.2" fill="none"
      stroke="#00d4ff" stroke-width="1" opacity="0.95" filter="url(#gc)"/>
    <ellipse cx="0" cy="0" rx="8" ry="3.2" fill="none"
      stroke="#7c3aed" stroke-width="1" opacity="0.9"
      transform="rotate(60)" filter="url(#gp)"/>
    <ellipse cx="0" cy="0" rx="8" ry="3.2" fill="none"
      stroke="#00d4ff" stroke-width="1" opacity="0.5"
      transform="rotate(120)"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="2.5" fill="#00d4ff" filter="url(#gc)"/>
    <!-- Corner nodes -->
    <circle cx="0"   cy="-20" r="1.4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="17"  cy="-10" r="1.4" fill="#7c3aed" opacity="0.9"/>
    <circle cx="17"  cy="10"  r="1.4" fill="#f59e0b" opacity="0.9"/>
    <circle cx="0"   cy="20"  r="1.4" fill="#10b981" opacity="0.9"/>
    <circle cx="-17" cy="10"  r="1.4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="-17" cy="-10" r="1.4" fill="#7c3aed" opacity="0.9"/>
  </g>

  <!-- ══ DIVIDER ══ -->
  <line x1="50" y1="7" x2="50" y2="39"
    stroke="url(#g1)" stroke-width="1" opacity="0.4"/>

  <!-- ══ TEXT ══ -->
  <!-- Arabic name -->
  <text x="270" y="20"
    font-family="'Tajawal', Arial, sans-serif"
    font-size="15" font-weight="800"
    text-anchor="end"
    direction="rtl"
    fill="url(#g1)"
    filter="url(#gc)">البوابة التعليمية الذكية</text>

  <!-- English subtitle -->
  <text x="270" y="36"
    font-family="'Orbitron', 'Courier New', monospace"
    font-size="6.5" font-weight="700"
    text-anchor="end"
    fill="#7c3aed"
    letter-spacing="2.5"
    opacity="0.85">SMART LEARNING GATEWAY</text>
</svg>
