<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسار الرياضيات - الخيارات</title>
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --blue-glow: #3b82f6;
            --purple-glow: #a855f7;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 50px;
            background: linear-gradient(135deg, var(--blue-glow), var(--purple-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cards-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .option-card {
            background: var(--card-bg);
            width: 280px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .option-card:hover {
            transform: translateY(-15px);
            border-color: var(--purple-glow);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .option-card h2 {
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .option-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--blue-glow);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="main-container">
    <h1>مسار الرياضيات</h1>
    <p style="color: #94a3b8; margin-bottom: 30px;">اختر الأداة التي تريد استخدامها:</p>
    
    <div class="cards-wrapper">
        <a href="math/Calculator.html" class="option-card"> <!-- يمكن استبدال # برابط الصفحة الفعلية -->
            <div class="icon">🧮</div>
            <h2>آلة حاسبة</h2>
            <p>حسابات رياضية متقدمة، دوال مثلثية، لوغاريتمات، وأكثر.</p>
        </a>

        <a href="math/solve.html" class="option-card"> <!-- يمكن استبدال # برابط الصفحة الفعلية -->
            <div class="icon">⚙️</div>
            <h2>حل المعادلات المعقدة</h2>
            <p>إدخال معادلات خطية، تربيعية، أو نظم معادلات والحصول على الحلول.</p>
        </a>
    </div>
</div>

</body>
</html>
