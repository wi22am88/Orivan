<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <!-- Gradient: cyan to purple -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient: purple to gold -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter: cyan -->
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter: purple -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter: strong for icon -->
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for background hex -->
    <clipPath id="hexClip">
      <polygon points="50,10 88,30 88,70 50,90 12,70 12,30" />
    </clipPath>

    <!-- Background gradient for icon -->
    <radialGradient id="iconBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020817;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- ═══════════ BACKGROUND ═══════════ -->
  <rect width="520" height="180" fill="#020817" rx="14"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="0.7">
    <line x1="0" y1="45" x2="520" y2="45"/>
    <line x1="0" y1="90" x2="520" y2="90"/>
    <line x1="0" y1="135" x2="520" y2="135"/>
    <line x1="130" y1="0" x2="130" y2="180"/>
    <line x1="260" y1="0" x2="260" y2="180"/>
    <line x1="390" y1="0" x2="390" y2="180"/>
  </g>

  <!-- Top scan line -->
  <rect x="0" y="0" width="520" height="2" fill="url(#grad1)" opacity="0.6" rx="1"/>
  <!-- Bottom scan line -->
  <rect x="0" y="178" width="520" height="2" fill="url(#grad2)" opacity="0.6" rx="1"/>

  <!-- Corner brackets -->
  <!-- TL -->
  <polyline points="18,28 18,18 28,18" fill="none" stroke="#00d4ff" stroke-width="2" filter="url(#glow-cyan)"/>
  <!-- TR -->
  <polyline points="492,28 492,18 482,18" fill="none" stroke="#7c3aed" stroke-width="2" filter="url(#glow-purple)"/>
  <!-- BL -->
  <polyline points="18,152 18,162 28,162" fill="none" stroke="#10b981" stroke-width="2"/>
  <!-- BR -->
  <polyline points="492,152 492,162 482,162" fill="none" stroke="#f59e0b" stroke-width="2"/>

  <!-- ═══════════ ICON: Hexagonal Neural Hub ═══════════ -->
  <g transform="translate(44, 90)">

    <!-- Outer hex ring -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
      fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Middle hex ring -->
    <polygon points="0,-40 34,-20 34,20 0,40 -34,20 -34,-20"
      fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>

    <!-- Inner hex filled -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
      fill="url(#iconBg)" stroke="url(#grad1)" stroke-width="1.8" filter="url(#glow-cyan)"/>

    <!-- Central atom / brain symbol -->
    <!-- Core dot -->
    <circle cx="0" cy="0" r="5" fill="#00d4ff" filter="url(#glow-strong)"/>

    <!-- 3 orbital rings at angles -->
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none"
      stroke="#00d4ff" stroke-width="1.2" opacity="0.9"
      transform="rotate(0)" filter="url(#glow-cyan)"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none"
      stroke="#7c3aed" stroke-width="1.2" opacity="0.9"
      transform="rotate(60)" filter="url(#glow-purple)"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none"
      stroke="#00d4ff" stroke-width="1.2" opacity="0.6"
      transform="rotate(120)"/>

    <!-- 6 corner node dots -->
    <circle cx="0" cy="-52" r="2.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="45" cy="-26" r="2.5" fill="#7c3aed" opacity="0.8"/>
    <circle cx="45" cy="26" r="2.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="0" cy="52" r="2.5" fill="#10b981" opacity="0.8"/>
    <circle cx="-45" cy="26" r="2.5" fill="#00d4ff" opacity="0.8"/>
    <circle cx="-45" cy="-26" r="2.5" fill="#7c3aed" opacity="0.8"/>

    <!-- Connecting lines from corners to center -->
    <line x1="0" y1="-52" x2="0" y2="-30" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="45" y1="-26" x2="26" y2="-15" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
    <line x1="45" y1="26" x2="26" y2="15" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="52" x2="0" y2="30" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
    <line x1="-45" y1="26" x2="-26" y2="15" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-45" y1="-26" x2="-26" y2="-15" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- ═══════════ DIVIDER LINE ═══════════ -->
  <line x1="112" y1="30" x2="112" y2="150"
    stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══════════ TEXT BLOCK ═══════════ -->
  <g transform="translate(130, 0)">

    <!-- Arabic Title -->
    <text x="195" y="74"
      font-family="'Tajawal', 'Arial', sans-serif"
      font-size="30"
      font-weight="800"
      text-anchor="middle"
      direction="rtl"
      fill="url(#grad1)"
      filter="url(#glow-cyan)">البوابة التعليمية الذكية</text>

    <!-- Decorative accent bar under title -->
    <rect x="60" y="80" width="270" height="2" rx="1" fill="url(#grad1)" opacity="0.5"/>

    <!-- Small triangle accent -->
    <polygon points="195,83 200,90 190,90" fill="#00d4ff" opacity="0.7"/>

    <!-- English subtitle — Orbitron style lettering -->
    <text x="195" y="110"
      font-family="'Orbitron', 'Courier New', monospace"
      font-size="10.5"
      font-weight="700"
      text-anchor="middle"
      fill="#7c3aed"
      letter-spacing="4"
      filter="url(#glow-purple)">SMART LEARNING GATEWAY</text>

    <!-- Status line -->
    <g transform="translate(120, 125)">
      <!-- Dot 1 -->
      <circle cx="0" cy="0" r="3" fill="#10b981"/>
      <text x="10" y="4"
        font-family="'Orbitron', monospace"
        font-size="7.5"
        fill="#64748b"
        letter-spacing="2">PHYS</text>

      <!-- Separator -->
      <line x1="52" y1="-5" x2="52" y2="5" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>

      <!-- Dot 2 -->
      <circle cx="60" cy="0" r="3" fill="#7c3aed"/>
      <text x="70" y="4"
        font-family="'Orbitron', monospace"
        font-size="7.5"
        fill="#64748b"
        letter-spacing="2">MATH</text>

      <!-- Separator -->
      <line x1="112" y1="-5" x2="112" y2="5" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>

      <!-- Dot 3 -->
      <circle cx="120" cy="0" r="3" fill="#f59e0b"/>
      <text x="130" y="4"
        font-family="'Orbitron', monospace"
        font-size="7.5"
        fill="#64748b"
        letter-spacing="2">CHEM</text>

      <!-- Separator -->
      <line x1="172" y1="-5" x2="172" y2="5" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>

      <!-- Dot 4 -->
      <circle cx="180" cy="0" r="3" fill="#00d4ff"/>
      <text x="190" y="4"
        font-family="'Orbitron', monospace"
        font-size="7.5"
        fill="#64748b"
        letter-spacing="2">PROG</text>
    </g>

    <!-- Version tag -->
    <text x="370" y="155"
      font-family="'Orbitron', monospace"
      font-size="7"
      fill="#00d4ff"
      opacity="0.45"
      letter-spacing="2">v2.0</text>

    <!-- AI tag top-right -->
    <g transform="translate(340, 28)">
      <rect x="0" y="0" width="42" height="18" rx="9"
        fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
      <text x="21" y="13"
        font-family="'Orbitron', monospace"
        font-size="7.5"
        font-weight="700"
        text-anchor="middle"
        fill="#00d4ff"
        letter-spacing="1.5"
        opacity="0.9">AI·EDU</text>
    </g>

  </g>
</svg>
